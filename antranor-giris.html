    <div class="login-modal-grid">
      <section class="login-mini-card" aria-label="Antrenor yeni hesap alani">
        <h4>Yeni AntrenÃ¶r HesabÄ± OluÅŸtur</h4>
        <form class="login-mini-form" id="registerForm">
          <label>Ad Soyad<input type="text" name="name" placeholder="AntrenÃ¶r ad soyad" required></label>
          <label>E-posta<input type="email" name="email" placeholder="ornek@mail.com" required></label>
          <label>Åifre<input type="password" name="password" placeholder="Åifre oluÅŸturun" required minlength="6"></label>
          <button class="btn" type="submit">KayÄ±t Ol</button>
          <div id="registerMsg"></div>
        </form>

      <section class="login-mini-card" aria-label="Antrenor giris alani">
        <h4>AntrenÃ¶r GiriÅŸi</h4>

  </main>

  <script>
    (function () {
      const API_BASE = "http://127.0.0.1:8000/api";
      const ROLE = "coach";

      const registerForm = document.getElementById("registerForm");
      const loginForm = document.getElementById("loginForm");
      const registerMsg = document.getElementById("registerMsg");
      const loginMsg = document.getElementById("loginMsg");

      function showMessage(el, text, isError = false) {
        el.innerHTML = `<div class="msg ${isError ? 'error' : 'success'}">${text}</div>`;
        setTimeout(() => { el.innerHTML = ""; }, 5000);
      }

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = registerForm.querySelector("button");
        btn.disabled = true;
        registerMsg.innerHTML = "";

        const formData = new FormData(registerForm);
        const data = {
          name: formData.get("name"),
          email: formData.get("email"),
          password: formData.get("password"),
          role: ROLE,
        };

        try {
          const response = await fetch(`${API_BASE}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify(data),
          });

          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.message || "KayÄ±t baÅŸarÄ±sÄ±z");
          }

          showMessage(registerMsg, "âœ… KayÄ±t baÅŸarÄ±lÄ±! YÃ¶nlendiriliyorsunuz...");
          localStorage.setItem("nextscout_token", payload.data.token);
          setTimeout(() => { window.location.href = "index.html"; }, 1500);
        } catch (error) {
          showMessage(registerMsg, `âŒ ${error.message}`, true);
          btn.disabled = false;
        }
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = loginForm.querySelector("button");
        btn.disabled = true;
        loginMsg.innerHTML = "";

        const formData = new FormData(loginForm);
        const data = {
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const response = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify(data),
          });

          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.message || "GiriÅŸ baÅŸarÄ±sÄ±z");
          }

          showMessage(loginMsg, "âœ… GiriÅŸ baÅŸarÄ±lÄ±! YÃ¶nlendiriliyorsunuz...");
          localStorage.setItem("nextscout_token", payload.data.token);
          setTimeout(() => { window.location.href = "index.html"; }, 1500);
        } catch (error) {
          showMessage(loginMsg, `âŒ ${error.message}`, true);
          btn.disabled = false;
        }
      });
    })();
  </script>
