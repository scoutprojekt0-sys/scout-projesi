<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sana Uygun Firsatlar | NextScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        #08131d;
      color: #f5fbff;
      padding: 24px;
    }
    .container { max-width: 1240px; margin: 0 auto; }
    .hero, .empty, .match-card {
      border: 1px solid #2b4660;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      box-shadow: 0 18px 36px rgba(8, 19, 29, 0.34);
    }
    .hero {
      position: relative;
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    .hero::before, .match-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .eyebrow {
      color: #ffb787;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .close-btn {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 126, 34, 0.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
    }
    h1 { font-size: 30px; margin-bottom: 8px; }
    .hero p { color: #9bb5cb; line-height: 1.65; max-width: 780px; }
    .status { margin: 0 0 16px; color: #9bb5cb; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .match-card {
      position: relative;
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .match-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .club { font-size: 18px; font-weight: 800; line-height: 1.3; }
    .role { margin-top: 4px; color: #9bb5cb; font-size: 13px; }
    .score {
      min-width: 64px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      background: rgba(249, 115, 22, 0.12);
      border: 1px solid rgba(251, 146, 60, 0.24);
      color: #fde68a;
      font-size: 12px;
      font-weight: 800;
    }
    .reason { color: #f5fbff; font-size: 13px; line-height: 1.6; }
    .meta { color: #9bb5cb; font-size: 12px; line-height: 1.5; }
    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,126,34,.6);
      background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }
    .empty { padding: 20px; color: #9bb5cb; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="hero-top">
        <div class="eyebrow">Kisisel Eslesme</div>
        <a class="close-btn" href="index.html" id="closeBtn" aria-label="Kapat" title="Kapat"><i class="fas fa-xmark"></i></a>
      </div>
      <h1>Sana Uygun Firsatlar</h1>
      <p>Profiline, pozisyonuna ve mevcut durumuna gore one cikan kulup ihtiyaclarini tek ekranda incele.</p>
    </section>

    <div class="status" id="statusText">Kisisel eslesmeler yukleniyor...</div>
    <div class="grid" id="matchesGrid"></div>
  </div>

  <script>
    const grid = document.getElementById('matchesGrid');
    const statusText = document.getElementById('statusText');
    document.getElementById('closeBtn').addEventListener('click', (event) => {
      event.preventDefault();
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.href = 'index.html';
    });

    function getApiBaseUrl() {
      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
        return window.location.origin + '/api';
      }
      const params = new URLSearchParams(window.location.search);
      return params.get('api_base') || 'http://localhost:8000/api';
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderRows(rows) {
      if (!rows.length) {
        grid.innerHTML = '<div class="empty">Henuz sana ozel hesaplanmis firsat bulunmuyor. Profilini guncelledikce bu alan dolacak.</div>';
        statusText.textContent = 'Sonuc bulunamadi.';
        return;
      }
      grid.innerHTML = rows.map((item) => `
        <article class="match-card">
          <div class="match-top">
            <div>
              <div class="club">${esc(item.club_name || 'Kulup')}</div>
              <div class="role">${esc(item.position_needed || 'Oyuncu')} • %${Number(item.match_score || 0)} Uyum</div>
            </div>
            <span class="score">%${Number(item.match_score || 0)}</span>
          </div>
          <div class="reason">${esc(item.reason || 'Profil kriterleriyle uyumlu')}</div>
          <div class="meta">${esc(item.city || '-')} • ${esc(item.title || 'Acik firsat')}</div>
          <a class="open-btn" href="discover-opportunities.html?position=${encodeURIComponent(item.position_needed || '')}">
            <i class="fas fa-arrow-right"></i>
            Firsati Ac
          </a>
        </article>
      `).join('');
      statusText.textContent = `${rows.length} kisisel eslesme listelendi.`;
    }

    async function loadMatches() {
      const token = (localStorage.getItem('nextscout_token') || '').trim();
      const user = (() => { try { return JSON.parse(localStorage.getItem('nextscout_user') || 'null'); } catch (e) { return null; } })();
      if (!token || !user || String(user.role || '').toLowerCase() !== 'player') {
        grid.innerHTML = '<div class="empty">Bu sayfa sadece oyuncu hesaplari icin kisisel firsat gosterir.</div>';
        statusText.textContent = 'Oyuncu hesabi gerekli.';
        return;
      }

      try {
        const response = await fetch(`${getApiBaseUrl()}/discovery/matches-for-user`, {
          headers: {
            'Accept': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
        });
        const payload = await response.json();
        const rows = Array.isArray(payload?.data) ? payload.data : [];
        renderRows(rows);
      } catch (error) {
        grid.innerHTML = '<div class="empty">Kisisel eslesmeler su anda alinamiyor.</div>';
        statusText.textContent = 'Baglanti hatasi.';
      }
    }

    loadMatches();
  </script>
</body>
</html>
