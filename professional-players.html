    let allPlayers = [...mockPlayers];

    function renderPlayers(players) {
      if (!players.length) {
        playersGrid.innerHTML = '<div class="player-card" style="padding:16px;">Oyuncu bulunamadı.</div>';
        return;
      }
      playersGrid.innerHTML = players.map(player => `
        <div class="player-card">
          <div class="player-avatar">⚽</div>
          <div class="player-content">
            <div class="player-name">${player.name}</div>
            <div class="player-position">${player.position}</div>

            <div class="player-info">
              <div class="info-item">
                <span class="info-label">Yaş</span>
                <span class="info-value">${player.age}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Boy</span>
                <span class="info-value">${player.height}cm</span>
              </div>
              <div class="info-item">
                <span class="info-label">Branş</span>
                <span class="info-value" style="font-size: 12px; text-transform: capitalize;">${player.sport || '-'}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Lig</span>
                <span class="info-value" style="font-size: 12px;">${player.league}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Kulüp</span>
                <span class="info-value" style="font-size: 12px;">${player.club}</span>
              </div>
            </div>

            <div class="player-rating">
              <span class="rating-stars">★★★★★</span>
              <span class="rating-value">${player.rating}/10</span>
            </div>

            <div class="player-actions">
              <button onclick="viewProfile(${player.id})">Profil</button>
              <button onclick="addToFavorite(${player.id})">❤️</button>
              <button onclick="contact(${player.id})">İletişim</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadPlayersFromApi() {
      try {
        const apiBase = getApiBaseUrl();
        const params = new URLSearchParams(window.location.search);
        const apiQuery = new URLSearchParams();

        const transferCategory = (params.get("transfer_category") || "").trim();
        const scoutRadar = (params.get("scout_radar") || "").trim();
        const q = (params.get("q") || "").trim();

        if (transferCategory) apiQuery.set("transfer_category", transferCategory);
        if (scoutRadar) apiQuery.set("scout_radar", scoutRadar);
        if (q) apiQuery.set("q", q);

        const selectedSport = (sportFilter?.value || "").trim();
        if (selectedSport) {
          apiQuery.set("sport", selectedSport);
        }

        const url = apiQuery.toString()
          ? `${apiBase}/public/players?${apiQuery.toString()}`
          : `${apiBase}/public/players`;

        const res = await fetch(url, { headers: { "Accept": "application/json" } });
        const data = await res.json();
        if (!res.ok || !data.ok || !Array.isArray(data.data)) return;

        allPlayers = data.data.map((p) => ({
          id: p.id,
          name: p.name || "Oyuncu",
          position: p.position || "Oyuncu",
          age: p.age || "-",
          league: p.league || "-",
          club: p.club || "-",
          sport: p.sport || p.branch || "futbol",
          rating: p.rating || 0,
          height: p.height || "-",
          nationality: p.nationality || "-",
          contract_status: p.contract_status || "active",
          seeking_club: Boolean(p.seeking_club),
          radar_new: Boolean(p.radar_new),
          radar_rising: Boolean(p.radar_rising),
          radar_hidden: Boolean(p.radar_hidden),
        }));
      } catch (e) {
        // Fallback mock data kullanılacak
      }
    }

    function getTransferCategoryFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const category = (params.get("transfer_category") || "").toLowerCase();
      if (category === "sozlesmeli") return "contracted";
      if (category === "bosta") return "free";
      if (category === "kulup-ariyor") return "seeking";
      return "";
    }

    function getScoutRadarCategoryFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const category = (params.get("scout_radar") || "").toLowerCase();
      if (category === "yeni-eslesenler") return "new";
      if (category === "yukselenler") return "rising";
      if (category === "gizli-yetenek") return "hidden";
      return "";
    }

    function parseAgeRange(value) {
      const txt = (value || "").trim();
      if (!txt) return null;
      const parts = txt.split("-").map(x => parseInt(x.trim(), 10)).filter(x => !Number.isNaN(x));
      if (parts.length !== 2) return null;
      return { min: Math.min(parts[0], parts[1]), max: Math.max(parts[0], parts[1]) };
    }

    function filterPlayers() {
      let filtered = [...allPlayers];

      if (positionFilter.value) {
        filtered = filtered.filter(p => p.position.toLowerCase() === positionFilter.value.toLowerCase());
      }

      if (sportFilter.value) {
        filtered = filtered.filter((p) => String(p.sport || "").toLowerCase() === sportFilter.value);
      }

      if (leagueFilter.value) {
        filtered = filtered.filter(p => p.league.toLowerCase().includes(leagueFilter.value));
      }

      if (ratingFilter.value) {
        filtered = filtered.filter(p => p.rating >= parseFloat(ratingFilter.value));
      }

      const ageRange = parseAgeRange(ageFilter.value);
      if (ageRange) {
        filtered = filtered.filter(p => {
          const age = parseInt(p.age, 10);
          if (Number.isNaN(age)) return false;
          return age >= ageRange.min && age <= ageRange.max;
        });
      }

      const transferCategory = getTransferCategoryFromQuery();
      if (transferCategory === "contracted") {
        filtered = filtered.filter((p) => String(p.contract_status || "active") === "active");
      } else if (transferCategory === "free") {
        filtered = filtered.filter((p) => String(p.contract_status || "") === "free");
      } else if (transferCategory === "seeking") {
        filtered = filtered.filter((p) => Boolean(p.seeking_club));
      }

      const scoutCategory = getScoutRadarCategoryFromQuery();
      if (scoutCategory === "new") {
        filtered = filtered.filter((p) => Boolean(p.radar_new));
      } else if (scoutCategory === "rising") {
        filtered = filtered.filter((p) => Boolean(p.radar_rising));
      } else if (scoutCategory === "hidden") {
        filtered = filtered.filter((p) => Boolean(p.radar_hidden));
      }

      renderPlayers(filtered);
    }

    function viewProfile(id) {
      window.location.href = `player-profile.html?user_id=${encodeURIComponent(id)}`;
    }

    function addToFavorite(id) {
      const player = allPlayers.find(p => p.id === id);
      if (!player) return;

      const key = "nextscout_favorite_players";
      const current = JSON.parse(localStorage.getItem(key) || "[]");
      const alreadyExists = current.some(p => p.id === player.id);

      if (alreadyExists) {
        alert(`${player.name} zaten favorilerde.`);
        return;
      }

      current.unshift({
        id: player.id,
        name: player.name,
        position: player.position,
        age: player.age,
        league: player.league,
        club: player.club,
        rating: player.rating,
        height: player.height,
        nationality: player.nationality,
        createdAt: new Date().toISOString()
      });

      localStorage.setItem(key, JSON.stringify(current.slice(0, 500)));
      alert(`✅ ${player.name} favorilere eklendi`);
    }

    function contact(id) {
      const player = allPlayers.find(p => p.id === id);
      alert(`${player.name} ile iletişime geçiyorsunuz...`);
    }

    // Event listeners
