    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #FFFDF5 0%, #EFF6FF 100%); color: #0F172A; min-height: 100vh; }
        .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: #FFFFFF; border-bottom: 1px solid #DBEAFE; }
        .brand { font-family: 'Poppins', sans-serif; font-size: 24px; color: #1D4ED8; text-decoration: none; }
        .btn { border: 1px solid #BFDBFE; background: #EFF6FF; color: #1E3A8A; padding: 9px 14px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 13px; }
        .page { max-width: 1160px; margin: 26px auto; padding: 0 20px; }
        .hero { background: #FFFFFF; border: 1px solid #DBEAFE; border-radius: 18px; padding: 24px; margin-bottom: 18px; box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08); }
        .hero h1 { font-size: 30px; margin-bottom: 8px; }
        .hero p { color: #475569; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .card { background: #FFFFFF; border: 1px solid #DBEAFE; border-radius: 14px; padding: 16px; }
        .name { font-size: 19px; font-weight: 800; margin-bottom: 8px; color: #1E3A8A; }
        .line { color: #475569; font-size: 14px; margin-bottom: 8px; }
        .tags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
        .tag { background: #F1F5F9; border: 1px solid #CBD5E1; color: #334155; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 700; }
        .empty { background: #FFFFFF; border: 1px solid #DBEAFE; border-radius: 12px; padding: 16px; color: #64748B; }
    </style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="./index.html">NextScout</a>
    <div style="display:flex; gap:10px;">
        <a class="btn" href="./index.html"><i class="fa-solid fa-arrow-left"></i> Anasayfa</a>
        <a class="btn" href="./manager-needs.html">Menajer Ilanlari</a>
    </div>
</header>

<main class="page">
    <section class="hero">
        <h1><i class="fa-solid fa-bolt"></i> Beni Kesfedin</h1>
        <p>Bu sayfada sadece oyuncu ozellikleri gorunur. Fiyatlandirma gosterilmez.</p>
    </section>

    <section class="cards" id="boostCards"></section>
</main>

<script>
    function getApiBaseUrl() {
        const query = new URLSearchParams(window.location.search);
        const fromQuery = (query.get('api_base') || '').trim();
        if (fromQuery) return fromQuery.replace(/\/$/, '');
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        return '/api';
    }

    async function loadProfiles() {
        const apiBase = getApiBaseUrl();
        const response = await fetch(`${apiBase}/discovery/boosts`, {
            headers: { Accept: 'application/json' },
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        return Array.isArray(payload?.data) ? payload.data : [];
    }

    async function renderProfiles() {
        const root = document.getElementById('boostCards');
        let rows = [];
        try {
            rows = (await loadProfiles()).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        } catch (error) {
            rows = [];
        }
        if (!rows.length) {
            root.innerHTML = '<div class="empty">Henuz boost kaydi yok.</div>';
            return;
        }

        root.innerHTML = rows.map((p) => `
            <article class="card">
                <div class="name">${p.name || 'Oyuncu'}</div>
                <div class="line"><strong>Pozisyon:</strong> ${p.position || '-'}</div>
                <div class="line"><strong>Sehir:</strong> ${p.city || '-'}</div>
                <div class="line"><strong>Tanitim:</strong> ${p.summary || '-'}</div>
                <div class="line"><strong>Gecerlilik:</strong> ${p.expires_at ? new Date(p.expires_at).toLocaleString('tr-TR') : '-'}</div>
                <div class="tags">
                    <span class="tag">${p.package_label || 'Boost'}</span>
                    <span class="tag">Sponsorlu Yetenek</span>
                </div>
            </article>
        `).join('');
    }

    renderProfiles();
</script>
    <script src="assets/js/core-stability.js"></script>
</body>
</html>
