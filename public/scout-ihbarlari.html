<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout İhbarları | NextScout</title>
  <meta name="description" content="Son scout ihbarlarını tek ekranda inceleyin. Kulüp, menajer ve antrenör tarafı için canlı ihbar listesi.">
  <meta name="theme-color" content="#08131d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08131d;
      --panel: rgba(12, 24, 36, 0.94);
      --panel-2: rgba(18, 36, 52, 0.96);
      --line: rgba(99, 138, 174, 0.2);
      --text: #f5fbff;
      --muted: #9bb5cb;
      --primary: #ff5a1f;
      --primary-2: #ff7e22;
      --accent: #60a5fa;
      --shadow: 0 22px 44px rgba(3, 12, 20, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(96, 165, 250, 0.16), transparent 30%),
        radial-gradient(circle at 90% 0%, rgba(255, 126, 34, 0.14), transparent 28%),
        linear-gradient(160deg, #040d15, var(--bg));
      padding: 24px 16px 40px;
    }

    .page {
      width: min(1240px, 100%);
      margin: 0 auto;
    }

    .hero,
    .filters,
    .list-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      box-shadow: var(--shadow);
      border-radius: 24px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px;
      margin-bottom: 16px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-2), var(--accent));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 126, 34, 0.08);
      border: 1px solid rgba(255, 126, 34, 0.18);
      color: #ffba8a;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .hero-actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 15px;
      border-radius: 14px;
      border: 1px solid rgba(99, 138, 174, 0.18);
      background: rgba(17, 34, 51, 0.74);
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
    }

    .filters {
      padding: 16px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1.3fr .9fr .8fr auto;
      gap: 10px;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(99, 138, 174, 0.18);
      background: rgba(5, 14, 24, 0.78);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }

    .list-card {
      padding: 18px;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .list-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
    }

    .list-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .tip-list {
      display: grid;
      gap: 12px;
    }

    .tip-item {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(99, 138, 174, 0.14);
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.48), rgba(10, 22, 33, 0.78));
    }

    .tip-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .tip-name {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .tip-desc {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .tip-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.14);
      border: 1px solid rgba(96, 165, 250, 0.22);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      padding: 20px;
      border-radius: 18px;
      border: 1px dashed rgba(99, 138, 174, 0.26);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="eyebrow">Canlı Scout Akışı</span>
      <h1>Scout İhbarları</h1>
      <p>Kulüp, menajer ve antrenör tarafı için son gelen scout ihbarlarını tek ekranda listele. Durum, skor, şehir ve pozisyon bilgileriyle hızlı tarama yap.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="./index.html">Ana Sayfaya Dön</a>
        <a class="btn" href="./scout-et.html">Yeni İhbar Gönder</a>
      </div>
    </section>

    <section class="filters">
      <input id="tipSearch" type="text" placeholder="Oyuncu, şehir veya pozisyon ara">
      <select id="tipStatus">
        <option value="">Tüm Durumlar</option>
        <option value="pending">Beklemede</option>
        <option value="screened">Tarandı</option>
        <option value="shortlisted">Kısa Liste</option>
        <option value="approved">Onaylandı</option>
      </select>
      <select id="tipSource">
        <option value="">Tüm Kaynaklar</option>
        <option value="guest">Misafir</option>
        <option value="account">Hesaplı</option>
      </select>
      <button class="btn" type="button" id="tipRefreshBtn">Yenile</button>
    </section>

    <section class="list-card">
      <div class="list-head">
        <h2 class="list-title">Son Gelen İhbarlar</h2>
        <div class="list-meta" id="tipListMeta">Yükleniyor...</div>
      </div>
      <div class="tip-list" id="tipList">
        <div class="empty">İhbarlar yükleniyor...</div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = `${window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : window.location.origin}/api`;
    let allTips = [];

    function formatStatus(value) {
      const status = (value || '').toString().trim().toLowerCase();
      if (status === 'screened') return 'Tarandı';
      if (status === 'shortlisted') return 'Kısa Liste';
      if (status === 'approved') return 'Onaylandı';
      return 'Beklemede';
    }

    function formatDate(value) {
      if (!value) return 'Bugün';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Bugün';
      return date.toLocaleDateString('tr-TR', { day: '2-digit', month: 'long', hour: '2-digit', minute: '2-digit' });
    }

    function renderTips() {
      const root = document.getElementById('tipList');
      const meta = document.getElementById('tipListMeta');
      const q = (document.getElementById('tipSearch')?.value || '').toString().trim().toLocaleLowerCase('tr-TR');
      const status = (document.getElementById('tipStatus')?.value || '').toString().trim();
      const source = (document.getElementById('tipSource')?.value || '').toString().trim();

      const rows = allTips.filter((row) => {
        const text = `${row.player_name || ''} ${row.city || ''} ${row.position || ''}`.toLocaleLowerCase('tr-TR');
        const sourceMatch = !source || (source === 'guest' ? row.is_guest : !row.is_guest);
        return (!q || text.includes(q)) && (!status || row.status === status) && sourceMatch;
      });

      if (meta) meta.textContent = `${rows.length} ihbar gösteriliyor`;

      if (!rows.length) {
        root.innerHTML = '<div class="empty">Filtreye uyan ihbar bulunamadı.</div>';
        return;
      }

      root.innerHTML = rows.map((row) => `
        <article class="tip-item">
          <div class="tip-top">
            <div>
              <h3 class="tip-name">${row.player_name || '-'}</h3>
              <div class="tip-desc">${row.city || '-'}${row.position ? ` / ${row.position}` : ''}</div>
            </div>
            <span class="pill">${formatStatus(row.status)}</span>
          </div>
          <div class="tip-meta">
            <span class="pill">${row.is_guest ? 'Misafir ihbarı' : 'Hesaplı ihbar'}</span>
            <span class="pill">Skor: ${row.final_score || 0}</span>
            <span class="pill">${formatDate(row.created_at)}</span>
          </div>
        </article>
      `).join('');
    }

    async function loadTips() {
      const root = document.getElementById('tipList');
      const meta = document.getElementById('tipListMeta');
      if (root) root.innerHTML = '<div class="empty">İhbarlar yükleniyor...</div>';
      if (meta) meta.textContent = 'Yükleniyor...';

      try {
        const response = await fetch(`${API_BASE}/scout-tips/feed?limit=50`, {
          headers: { Accept: 'application/json' }
        });
        const payload = await response.json().catch(() => ({}));
        allTips = Array.isArray(payload?.data) ? payload.data : [];
        renderTips();
      } catch (error) {
        if (root) root.innerHTML = '<div class="empty">İhbarlar alınamadı.</div>';
        if (meta) meta.textContent = 'Bağlantı hatası';
      }
    }

    document.getElementById('tipSearch')?.addEventListener('input', renderTips);
    document.getElementById('tipStatus')?.addEventListener('change', renderTips);
    document.getElementById('tipSource')?.addEventListener('change', renderTips);
    document.getElementById('tipRefreshBtn')?.addEventListener('click', loadTips);

    loadTips();
  </script>
</body>
</html>
