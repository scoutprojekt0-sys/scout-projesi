<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorumlar - NextScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #08131d;
      --panel: #0f1f2e;
      --panel-2: #12293d;
      --line: #2b4660;
      --ink: #f5fbff;
      --muted: #9bb5cb;
      --cta: #ff5a1f;
      --cta-2: #ff7e22;
      --accent: #8fd3ff;
      --ok: #34d399;
      --warn: #fbbf24;
      --shadow: 0 18px 36px rgba(8, 19, 29, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 18px 14px 28px; }
    .hero,
    .card {
      position: relative;
      background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      border-radius: 0 !important;
    }
    .hero::before,
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, var(--accent) 100%);
    }
    .hero { padding: 24px; margin-bottom: 14px; }
    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(143, 211, 255, 0.22);
      background: rgba(255, 255, 255, 0.05);
      color: #dbeafe;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .hero h1 {
      margin: 14px 0 8px;
      font-family: Poppins, Inter, sans-serif;
      font-size: 34px;
      line-height: 1.08;
      color: #dbeafe;
    }
    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(255, 126, 34, 0.55);
      background: linear-gradient(135deg, var(--cta) 0%, var(--cta-2) 100%);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(255, 90, 31, 0.28);
    }
    .btn.secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #dbeafe;
      border-color: rgba(143, 211, 255, 0.2);
      box-shadow: none;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .summary-card {
      padding: 15px 16px;
      border: 1px solid rgba(96, 165, 250, 0.14);
      background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(15,23,42,.18) 100%);
      border-radius: 0 !important;
    }
    .summary-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .summary-value {
      font-size: 28px;
      font-weight: 900;
      color: #f8fbff;
    }
    .card { padding: 18px; }
    .section-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 800;
      color: #dbeafe;
    }
    .review-list {
      display: grid;
      gap: 14px;
    }
    .review-item {
      padding: 18px;
      border: 1px solid rgba(96, 165, 250, 0.14);
      background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(15,23,42,.18) 100%);
      position: relative;
      border-radius: 0 !important;
    }
    .review-item::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, var(--cta) 0%, var(--accent) 100%);
    }
    .review-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .review-author {
      display: grid;
      gap: 4px;
    }
    .review-author strong { color: #f5fbff; font-size: 15px; }
    .review-author span,
    .review-meta,
    .empty,
    .status-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .review-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 14px;
    }
    .review-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 11px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(255,255,255,.06);
      color: #dbeafe;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 999px;
    }
    .review-pill.sentiment-olumlu { color: #bbf7d0; }
    .review-pill.sentiment-notr { color: #bfdbfe; }
    .review-pill.sentiment-dikkat { color: #fde68a; }
    .review-body { color: #e2e8f0; font-size: 14px; line-height: 1.72; }
    .reply-box {
      margin-top: 14px;
      padding: 14px 15px;
      border: 1px solid rgba(96, 165, 250, 0.2);
      background: linear-gradient(180deg, rgba(11,59,138,.18) 0%, rgba(15,23,42,.16) 100%);
      display: grid;
      gap: 10px;
      border-radius: 0 !important;
    }
    textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      padding: 12px 13px;
      border: 1px solid rgba(148,163,184,.18);
      background: linear-gradient(180deg, rgba(7,17,28,.92) 0%, rgba(15,23,42,.88) 100%);
      color: var(--ink);
      font: inherit;
      border-radius: 0 !important;
    }
    textarea:focus {
      outline: none;
      border-color: rgba(96,165,250,.42);
      box-shadow: 0 0 0 4px rgba(59,130,246,.14);
    }
    .reply-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .reply-preview {
      margin-top: 12px;
      padding: 14px 15px;
      border: 1px solid rgba(96,165,250,.2);
      background: linear-gradient(180deg, rgba(11,59,138,.18) 0%, rgba(15,23,42,.16) 100%);
      border-radius: 0 !important;
    }
    .reply-preview .review-meta { margin-bottom: 6px; }
    @media (max-width: 900px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero-top, .toolbar { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 640px) {
      .wrap { padding: 12px 10px 20px; }
      .hero { padding: 16px; }
      .hero h1 { font-size: 26px; }
      .card { padding: 14px; }
      .summary-grid { grid-template-columns: 1fr; }
      .reply-actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="hero-kicker"><i class="fas fa-comments"></i><span>Yorum Merkezi</span></div>
          <h1 id="pageTitle">Profiline Gelen Yorumlar</h1>
          <p id="pageDesc">Profiline birakilan yorumlari oku, yanit ver ve sureci dashboard tarafindan yonet.</p>
        </div>
        <a class="btn secondary" href="javascript:history.length > 1 ? history.back() : window.location.href='index.html'"><i class="fas fa-arrow-left"></i><span>Geri Don</span></a>
      </div>
    </section>

    <div class="summary-grid" id="summaryGrid">
      <div class="summary-card"><div class="summary-label">Toplam</div><div class="summary-value">0</div></div>
      <div class="summary-card"><div class="summary-label">Yanitsiz</div><div class="summary-value">0</div></div>
      <div class="summary-card"><div class="summary-label">Olumlu Oran</div><div class="summary-value">%0</div></div>
      <div class="summary-card"><div class="summary-label">Rol</div><div class="summary-value" id="roleValue">-</div></div>
    </div>

    <section class="card">
      <div class="toolbar">
        <h2 class="section-title">Gelen Yorumlar</h2>
        <div class="status-note" id="statusNote">Yorumlar yukleniyor...</div>
      </div>
      <div class="review-list" id="reviewList"></div>
    </section>
  </div>

  <script>
    function getToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function getApiBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function getAuthHeaders(withJson) {
      const token = getToken();
      const headers = { 'Accept': 'application/json' };
      if (withJson) headers['Content-Type'] = 'application/json';
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return headers;
    }

    function getCurrentUserFromStorage() {
      try {
        return JSON.parse(localStorage.getItem('nextscout_user') || 'null');
      } catch (error) {
        return null;
      }
    }

    async function resolveCurrentUser() {
      const stored = getCurrentUserFromStorage();
      if (stored?.id) return stored;
      try {
        const res = await fetch(`${getApiBaseUrl()}/auth/me`, { headers: getAuthHeaders(false) });
        const payload = await res.json().catch(() => null);
        const me = payload?.data?.user || payload?.data || payload?.user || null;
        if (me?.id) {
          const merged = { ...(stored || {}), ...me };
          localStorage.setItem('nextscout_user', JSON.stringify(merged));
          return merged;
        }
      } catch (error) {}
      return stored || null;
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function labelMap() {
      return {
        birlikte_calistik: 'Birlikte calistik',
        rakiptik: 'Rakiptik',
        izledim: 'Izledim',
        temsil_sureci: 'Temsil sureci',
        kulup_sureci: 'Kulup sureci',
        teknik_ekip: 'Teknik ekip',
        calisti: 'Birlikte calistik',
        gorusuldu: 'Gorusme yapildi',
        gozlendi: 'Surec izlendi',
        diger: 'Diger',
        olumlu: 'Olumlu',
        notr: 'Notr',
        dikkat: 'Dikkat'
      };
    }

    function roleLabel(role) {
      const map = {
        player: 'Oyuncu',
        scout: 'Scout',
        coach: 'Antrenor',
        club: 'Kulup',
        team: 'Kulup',
        manager: 'Menajer',
        lawyer: 'Avukat'
      };
      return map[String(role || '').toLowerCase()] || 'Kullanici';
    }

    function setSummary(rows, role) {
      const total = rows.length;
      const unanswered = rows.filter((row) => !row?.reply?.body).length;
      const positive = rows.filter((row) => row?.sentiment === 'olumlu').length;
      const positiveRate = total ? Math.round((positive / total) * 100) : 0;
      const grid = document.getElementById('summaryGrid');
      if (!grid) return;
      grid.innerHTML = `
        <div class="summary-card"><div class="summary-label">Toplam</div><div class="summary-value">${total}</div></div>
        <div class="summary-card"><div class="summary-label">Yanitsiz</div><div class="summary-value">${unanswered}</div></div>
        <div class="summary-card"><div class="summary-label">Olumlu Oran</div><div class="summary-value">%${positiveRate}</div></div>
        <div class="summary-card"><div class="summary-label">Rol</div><div class="summary-value">${esc(roleLabel(role))}</div></div>
      `;
    }

    function buildReplyBox(review) {
      if (review?.reply?.body) {
        return `
          <div class="reply-preview">
            <div class="review-meta">${esc(review?.reply?.author_name || 'Profil sahibi')} yaniti</div>
            <div class="review-body">${esc(review.reply.body)}</div>
          </div>
        `;
      }
      return `
        <div class="reply-box">
          <div class="review-meta">Bu yorum henuz yanitlanmamis.</div>
          <textarea id="replyInput-${Number(review.id) || 0}" placeholder="Bu yoruma dashboard uzerinden yanit ver..."></textarea>
          <div class="reply-actions">
            <button class="btn" type="button" onclick="submitReviewReply(${Number(review.id) || 0})"><i class="fas fa-paper-plane"></i><span>Yaniti Gonder</span></button>
          </div>
        </div>
      `;
    }

    function renderReviews(rows) {
      const root = document.getElementById('reviewList');
      if (!root) return;
      if (!rows.length) {
        root.innerHTML = '<div class="empty">Profiline gelmis yorum bulunmuyor.</div>';
        return;
      }

      const labels = labelMap();
      root.innerHTML = rows.map((review) => `
        <article class="review-item">
          <div class="review-head">
            <div class="review-author">
              <strong>${esc(review?.author_name || 'Kullanici')}</strong>
              <span>${esc(review?.author_role || 'rol belirtilmedi')}</span>
            </div>
            <div class="review-meta">${esc(formatDate(review?.created_at))}</div>
          </div>
          <div class="review-tags">
            <span class="review-pill">${esc(labels[review?.relationship_type] || review?.relationship_type || '-')}</span>
            <span class="review-pill sentiment-${esc(review?.sentiment || 'notr')}">${esc(labels[review?.sentiment] || review?.sentiment || '-')}</span>
          </div>
          <div class="review-body">${esc(review?.body || '')}</div>
          ${buildReplyBox(review)}
        </article>
      `).join('');
    }

    async function fetchOwnReviews() {
      const user = await resolveCurrentUser();
      const statusNote = document.getElementById('statusNote');
      if (!user?.id) {
        if (statusNote) statusNote.textContent = 'Yorumlari gormek icin giris yapmalisin.';
        renderReviews([]);
        return;
      }

      const title = document.getElementById('pageTitle');
      const desc = document.getElementById('pageDesc');
      if (title) title.textContent = `${roleLabel(user.role)} profiline gelen yorumlar`;
      if (desc) desc.textContent = 'Profiline birakilan yorumlari oku, gerekli oldugunda dashboardtan yanit ver.';

      try {
        const response = await fetch(`${getApiBaseUrl()}/profiles/${encodeURIComponent(user.id)}/reviews?per_page=50`, {
          headers: getAuthHeaders(false)
        });
        const data = await response.json().catch(() => null);
        const rows = Array.isArray(data?.data?.data)
          ? data.data.data
          : Array.isArray(data?.data?.items)
          ? data.data.items
          : Array.isArray(data?.data)
          ? data.data
          : [];
        setSummary(rows, user.role);
        renderReviews(rows);
        if (statusNote) statusNote.textContent = rows.length ? `${rows.length} yorum yuklendi.` : 'Henuz yorum yok.';
      } catch (error) {
        if (statusNote) statusNote.textContent = 'Yorumlar su an yuklenemiyor.';
        renderReviews([]);
      }
    }

    async function submitReviewReply(reviewId) {
      const input = document.getElementById(`replyInput-${Number(reviewId) || 0}`);
      const statusNote = document.getElementById('statusNote');
      const body = String(input?.value || '').trim();
      if (body.length < 2) {
        if (statusNote) statusNote.textContent = 'Yanit en az 2 karakter olmali.';
        return;
      }
      try {
        const response = await fetch(`${getApiBaseUrl()}/profile-reviews/${encodeURIComponent(reviewId)}/reply`, {
          method: 'POST',
          headers: getAuthHeaders(true),
          body: JSON.stringify({ body })
        });
        const data = await response.json().catch(() => null);
        if (!response.ok || !data?.ok) {
          throw new Error(data?.message || 'Yanit kaydedilemedi.');
        }
        if (statusNote) statusNote.textContent = data?.message || 'Yanit kaydedildi.';
        await fetchOwnReviews();
      } catch (error) {
        if (statusNote) statusNote.textContent = error?.message || 'Yanit kaydedilemedi.';
      }
    }

    fetchOwnReviews();
  </script>
</body>
</html>
