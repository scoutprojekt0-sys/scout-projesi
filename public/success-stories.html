<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Başarı Hikayeleri - NextScout</title>
  <meta name="description" content="NextScout başarı hikayeleri sayfası: admin onaylı oyuncu, menajer, kulüp ve antrenör başarı paylaşımları.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://nextscout.pro/success-stories.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:site_name" content="NextScout">
  <meta property="og:title" content="Başarı Hikayeleri - NextScout">
  <meta property="og:description" content="NextScout başarı hikayeleri sayfası: admin onaylı oyuncu, menajer, kulüp ve antrenör başarı paylaşımları.">
  <meta property="og:url" content="https://nextscout.pro/success-stories.html">
  <meta property="og:image" content="https://nextscout.pro/assets/img/og-default.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Başarı Hikayeleri - NextScout">
  <meta name="twitter:description" content="NextScout başarı hikayeleri sayfası: admin onaylı oyuncu, menajer, kulüp ve antrenör başarı paylaşımları.">
  <meta name="twitter:image" content="https://nextscout.pro/assets/img/og-default.jpg">
  <meta name="theme-color" content="#0B3B8A">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #08131d;
      --card: #0f1f2e;
      --line: #2b4660;
      --text: #f5fbff;
      --muted: #9bb5cb;
      --primary: #ff7e22;
      --shadow: 0 18px 36px rgba(8, 19, 29, .34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .head::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      max-width: 760px;
      line-height: 1.6;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(255, 126, 34, 0.45);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(219, 234, 254, 0.92) 100%);
      color: #16325c;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(8, 19, 29, .24);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%);
      color: #fff;
      border-color: rgba(255, 126, 34, .6);
      box-shadow: 0 16px 28px rgba(255, 90, 31, .28);
    }

    .btn-secondary {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(219, 234, 254, 0.92) 100%);
      color: #16325c;
      border: 1px solid rgba(255, 126, 34, .45);
    }

    .table-wrap {
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .table-wrap::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      font-size: 13px;
      border-bottom: 1px solid #2f3a48;
      vertical-align: top;
    }

    th {
      background: rgba(255, 255, 255, .04);
      color: #cbd5e1;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    td {
      color: #e2e8f0;
    }

    .story-player {
      display: grid;
      gap: 4px;
    }

    .story-player strong,
    .story-topic {
      color: #f8fafc;
    }

    .story-sport,
    .story-date {
      color: var(--muted);
      font-size: 12px;
    }

    .story-topic {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    .story-text {
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.65;
      white-space: normal;
      word-break: break-word;
    }

    .inline-btn {
      border: 1px solid rgba(96, 165, 250, .24);
      background: rgba(255, 255, 255, .04);
      color: #dbeafe;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .inline-btn:hover {
      border-color: #ff7e22;
      background: rgba(255, 255, 255, .06);
      color: #fff;
    }

    .empty,
    .error {
      padding: 18px;
      color: var(--muted);
    }

    .head,
    .table-wrap,
    .btn,
    .btn-primary,
    .btn-secondary,
    .inline-btn,
    .empty,
    table,
    tr,
    td,
    th {
      border-radius: 0 !important;
    }

    @media (max-width: 840px) {
      .wrap { padding: 14px 10px 32px; }

      .head {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 16px 14px;
      }

      .title { font-size: 24px; }

      .header-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .btn {
        width: 100%;
      }

      .table-wrap {
        padding: 8px;
      }

      table, thead, tbody, tr, td {
        display: block;
        width: 100%;
      }

      thead {
        display: none;
      }

      tr {
        background: #2b3440;
        border: 1px solid #475569;
        padding: 10px;
        margin-bottom: 10px;
      }

      td {
        border-bottom: 1px solid #3a4758;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 8px 4px;
      }

      td:last-child {
        border-bottom: none;
      }

      td::before {
        content: attr(data-label);
        color: #94a3b8;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .25px;
        min-width: 78px;
      }

      td > div {
        flex: 1;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/css/mobile-unified.css">
  <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Başarı Hikayeleri</h1>
        <div class="sub">Admin onaylı oyuncu, menajer, kulüp ve antrenör başarı paylaşımlarının tamamı burada listelenir.</div>
      </div>
      <div class="header-actions">
        <a class="btn btn-primary" href="index.html"><i class="fas fa-house"></i><span>Ana Sayfa</span></a>
        <a class="btn btn-secondary" href="player-dashboard.html"><i class="fas fa-table-columns"></i><span>Dashboard</span></a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Oyuncu</th>
            <th>Konu</th>
            <th>Hikaye</th>
          </tr>
        </thead>
        <tbody id="storiesRoot">
          <tr>
            <td colspan="3" class="empty">Hikayeler yükleniyor...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function getAPIBaseURL() {
        const params = new URLSearchParams(window.location.search);
        const explicit = (params.get('api') || '').trim();
        if (explicit) return explicit.replace(/\/$/, '');
        const host = (window.location.hostname || '').toString().trim().toLowerCase();
        const port = (window.location.port || '').toString().trim();
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        if ((host === '127.0.0.1' || host === 'localhost') && port && port !== '8000') {
          return 'http://127.0.0.1:8000/api';
        }
        return `${window.location.origin}/api`;
      }

    const API_BASE_URL = getAPIBaseURL();

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function deriveTopic(item) {
      const explicit = String(item?.story_subject || item?.subject || '').trim();
      if (explicit) return explicit;
      const story = String(item?.story_text || '').trim();
      if (!story) return 'Basari hikayesi';
      const firstSentence = story.split(/[.!?]/).map((part) => part.trim()).find(Boolean) || story;
      return firstSentence.slice(0, 80);
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return new Intl.DateTimeFormat('tr-TR', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
      }).format(date);
    }

    function buildStoryPreview(story, limit = 300) {
      const text = String(story || '').trim();
      if (text.length <= limit) {
        return { preview: text, full: text, truncated: false };
      }

      return {
        preview: `${text.slice(0, limit).trimEnd()}...`,
        full: text,
        truncated: true,
      };
    }

    async function loadStories() {
      const root = document.getElementById('storiesRoot');
      if (!root) return;

      try {
        const response = await fetch(`${API_BASE_URL}/success-stories?limit=100&_t=${Date.now()}`, {
          headers: { Accept: 'application/json' },
          cache: 'no-store',
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const payload = await response.json();
        const items = Array.isArray(payload?.data) ? payload.data : [];

        if (!items.length) {
          root.innerHTML = '<tr><td colspan="3" class="empty">Henüz onaylı başarı hikayesi yok.</td></tr>';
          return;
        }

        root.innerHTML = items.map((item) => {
          const fullName = esc(item?.full_name || 'Oyuncu');
          const sport = esc(item?.sport || '-');
          const topic = esc(deriveTopic(item));
          const storyMeta = buildStoryPreview(item?.story_text || '');
          const previewText = esc(storyMeta.preview);
          const fullText = esc(storyMeta.full);
          const createdAt = formatDate(item?.created_at);

          return `
            <tr>
              <td data-label="Oyuncu">
                <div class="story-player">
                  <strong>${fullName}</strong>
                  <span class="story-sport">${sport}</span>
                  ${createdAt ? `<span class="story-date">${createdAt}</span>` : ''}
                </div>
              </td>
              <td data-label="Konu">
                <div class="story-topic">${topic}</div>
              </td>
              <td data-label="Hikaye">
                <div>
                  <div class="story-text" data-story-text data-preview="${previewText}" data-full="${fullText}" data-expanded="0">${previewText}</div>
                  ${storyMeta.truncated ? '<button type="button" class="inline-btn" data-story-toggle>Devamını Oku</button>' : ''}
                </div>
              </td>
            </tr>
          `;
        }).join('');
      } catch (error) {
        root.innerHTML = '<tr><td colspan="3" class="error">Başarı hikayeleri şu an yüklenemiyor.</td></tr>';
      }
    }

    document.addEventListener('click', (event) => {
      const button = event.target.closest('[data-story-toggle]');
      if (!button) return;

      const wrapper = button.parentElement;
      const textEl = wrapper ? wrapper.querySelector('[data-story-text]') : null;
      if (!textEl) return;

      const expanded = textEl.getAttribute('data-expanded') === '1';
      textEl.textContent = expanded ? (textEl.getAttribute('data-preview') || '') : (textEl.getAttribute('data-full') || '');
      textEl.setAttribute('data-expanded', expanded ? '0' : '1');
      button.textContent = expanded ? 'Devamını Oku' : 'Daha Az Göster';
    });

    loadStories();
  </script>
</body>
</html>
