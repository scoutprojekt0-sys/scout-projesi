<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Calisma Alani Listesi</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 18px 40px; }
    .head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .head h1 { margin:0; font-size: 26px; }
    .head p { margin:6px 0 0; color:#94a3b8; font-size:14px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 14px; border-radius:10px; border:1px solid #475569; color:#e2e8f0; text-decoration:none; background:#1e293b; font-weight:700; }
    .toolbar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .input { flex:1; min-width:240px; padding:11px 12px; border-radius:10px; border:1px solid #475569; background:#111827; color:#e2e8f0; }
    .badge { display:inline-flex; padding:5px 9px; border-radius:999px; background:#1d4ed8; color:#dbeafe; font-size:12px; font-weight:700; }
    .list { display:grid; gap:12px; }
    .item { border:1px solid #334155; background:#111827; border-radius:14px; padding:16px; }
    .item-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .item-title { font-size:18px; font-weight:800; color:#f8fafc; }
    .item-copy { margin-top:8px; color:#cbd5e1; line-height:1.6; }
    .meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; color:#94a3b8; font-size:13px; }
    .empty { border:1px dashed #475569; border-radius:14px; padding:22px; color:#94a3b8; text-align:center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="head">
      <div>
        <div class="badge" id="pageScope">Benim</div>
        <h1 id="pageTitle">Scout Teknik Notlari</h1>
        <p id="pageSummary">Calisma alanindaki tum kayitlari burada gorursun.</p>
      </div>
      <a class="btn" href="scout-dashboard.html">Scout Dashboarda Don</a>
    </div>

    <div class="toolbar">
      <input class="input" id="searchInput" type="text" placeholder="Oyuncu, etiket, not veya karar ara...">
      <a class="btn" id="backToWorkspace" href="scout-dashboard.html">Calisma Alanini Ac</a>
    </div>

    <div class="list" id="listRoot">
      <div class="empty">Kayitlar yukleniyor...</div>
    </div>
  </div>

  <script>
    function getApiBaseUrl() {
      const stored = (localStorage.getItem('nextscout_api_base') || '').trim();
      if (stored) return stored.replace(/\/$/, '');
      return `${window.location.origin}/api`;
    }

    function getAuthHeaders() {
      const token = (localStorage.getItem('nextscout_token') || '').trim();
      if (!token || token === 'local-session-token') return null;
      return { Accept: 'application/json', Authorization: `Bearer ${token}` };
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString('tr-TR');
    }

    function formatAuthor(row) {
      const name = String(row?.author_name || '').trim();
      const role = String(row?.author_role || '').trim();
      if (!name && !role) return '-';
      return `${name || 'Bilinmeyen'}${role ? ` • ${role}` : ''}`;
    }

    const params = new URLSearchParams(window.location.search);
    const type = ['notes', 'clips', 'evaluations'].includes(params.get('type')) ? params.get('type') : 'notes';
    const scope = params.get('scope') === 'team' ? 'team' : 'mine';

    const config = {
      notes: {
        title: 'Scout Teknik Notlari',
        summary: 'Kaydedilen teknik notlarin tam listesi.',
        endpoint: '/staff/player-notes',
        placeholder: 'Oyuncu, etiket veya not ara...',
        render(row) {
          return `
            <article class="item">
              <div class="item-head">
                <div>
                  <div class="item-title">${escapeHtml(row.player || '-')}</div>
                  <div class="item-copy">${escapeHtml(row.body || '')}</div>
                </div>
                <div class="badge">${escapeHtml(row.tag || 'Not')}</div>
              </div>
              <div class="meta">
                <span>Pozisyon: ${escapeHtml(row.position || '-')}</span>
                <span>Odak: ${escapeHtml(row.focus || '-')}</span>
                <span>Yazan: ${escapeHtml(formatAuthor(row))}</span>
                <span>Tarih: ${escapeHtml(formatDate(row.created_at))}</span>
              </div>
            </article>
          `;
        },
      },
      clips: {
        title: 'Scout Klip Notlari',
        summary: 'Kaydedilen klip notlarinin tam listesi.',
        endpoint: '/staff/player-clips',
        placeholder: 'Oyuncu, video veya klip notu ara...',
        render(row) {
          return `
            <article class="item">
              <div class="item-head">
                <div>
                  <div class="item-title">${escapeHtml(row.player || '-')}</div>
                  <div class="item-copy">${escapeHtml(row.body || '')}</div>
                </div>
                <a class="btn" href="${escapeHtml(row.url || '#')}" target="_blank" rel="noopener noreferrer">Videoyu Ac</a>
              </div>
              <div class="meta">
                <span>Zaman: ${escapeHtml(row.stamp || '00:00')}</span>
                <span>Yazan: ${escapeHtml(formatAuthor(row))}</span>
                <span>Tarih: ${escapeHtml(formatDate(row.created_at))}</span>
              </div>
            </article>
          `;
        },
      },
      evaluations: {
        title: 'Scout Degerlendirmeleri',
        summary: 'Kaydedilen teknik degerlendirmelerin tam listesi.',
        endpoint: '/staff/player-evaluations',
        placeholder: 'Oyuncu, pozisyon veya karar notu ara...',
        render(row) {
          return `
            <article class="item">
              <div class="item-head">
                <div>
                  <div class="item-title">${escapeHtml(row.player_name || '-')}</div>
                  <div class="item-copy">${escapeHtml(row.decision_note || 'Karar notu yok.')}</div>
                </div>
                <div class="badge">${escapeHtml(row.average ?? '-')}</div>
              </div>
              <div class="meta">
                <span>Pozisyon: ${escapeHtml(row.position || '-')}</span>
                <span>Metrik: ${Array.isArray(row.scores) ? row.scores.length : 0}</span>
                <span>Yazan: ${escapeHtml(formatAuthor(row))}</span>
                <span>Kayit: ${escapeHtml(row.saved_at || '-')}</span>
              </div>
            </article>
          `;
        },
      },
    };

    async function fetchRows(search = '') {
      const headers = getAuthHeaders();
      if (!headers) throw new Error('Oturum bulunamadi.');
      const query = new URLSearchParams({ per_page: '100', scope });
      if (search) query.set('search', search);
      const response = await fetch(`${getApiBaseUrl()}${config[type].endpoint}?${query.toString()}`, { headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload?.ok === false) throw new Error(payload?.message || 'Kayitlar alinamadi.');
      return Array.isArray(payload?.data?.data) ? payload.data.data : (Array.isArray(payload?.data) ? payload.data : []);
    }

    async function renderList() {
      const root = document.getElementById('listRoot');
      const search = String(document.getElementById('searchInput')?.value || '').trim();
      root.innerHTML = '<div class="empty">Kayitlar yukleniyor...</div>';
      try {
        const rows = await fetchRows(search);
        if (!rows.length) {
          root.innerHTML = '<div class="empty">Kayit bulunmuyor.</div>';
          return;
        }
        root.innerHTML = rows.map((row) => config[type].render(row)).join('');
      } catch (error) {
        root.innerHTML = `<div class="empty">${escapeHtml(error.message || 'Kayitlar alinamadi.')}</div>`;
      }
    }

    document.getElementById('pageTitle').textContent = config[type].title;
    document.getElementById('pageSummary').textContent = config[type].summary;
    document.getElementById('pageScope').textContent = scope === 'team' ? 'Ekip' : 'Benim';
    document.getElementById('searchInput').placeholder = config[type].placeholder;
    document.getElementById('backToWorkspace').href = `scout-dashboard.html#workspace-${type}`;
    document.getElementById('searchInput').addEventListener('input', renderList);
    renderList();
  </script>
</body>
</html>
