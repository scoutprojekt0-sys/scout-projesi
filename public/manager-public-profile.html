<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Public Profil - NextScout</title>
  <meta name="robots" content="noindex,follow">
  <style>
    :root {
      --bg:#08131d;--ink:#f5fbff;--muted:#9bb5cb;--line:#2b4660;--cta:#ff5a1f;--cta2:#ff7e22;--shadow:0 18px 36px rgba(8,19,29,.34);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      min-height:100vh;
    }
    .wrap { max-width:1100px; margin:0 auto; padding:18px 14px 24px; }
    .head {
      position:relative; display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      margin-bottom:14px; border:1px solid var(--line); border-radius:22px;
      background:linear-gradient(180deg, rgba(18,41,61,.98), rgba(15,31,46,.98));
      padding:24px; box-shadow:var(--shadow); overflow:hidden;
    }
    .head::before {
      content:""; position:absolute; inset:0 0 auto 0; height:4px;
      background:linear-gradient(90deg,var(--cta),var(--cta2),#60a5fa);
    }
    .title { margin:0; font-size:30px; font-weight:800; }
    .sub { margin-top:8px; color:var(--muted); font-size:14px; }
    .btn {
      display:inline-flex; align-items:center; gap:7px; text-decoration:none;
      border:1px solid rgba(255,126,34,.45);
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(219,234,254,.92));
      color:#16325c; padding:7px 12px; border-radius:12px; font-size:12px; font-weight:800;
    }
    .card {
      background:linear-gradient(180deg, rgba(18,41,61,.98), rgba(15,31,46,.98));
      border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:18px;
      position:relative; overflow:hidden;
    }
    .card::before {
      content:""; position:absolute; inset:0 0 auto 0; height:4px;
      background:linear-gradient(90deg,var(--cta),var(--cta2),#60a5fa);
    }
    .hero { display:flex; align-items:center; gap:12px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #334155; }
    .photo { width:88px; height:88px; border-radius:14px; object-fit:cover; border:1px solid var(--line); background:#0f172a; }
    .name { font-size:24px; font-weight:800; line-height:1.1; }
    .meta { margin-top:6px; color:#93c5fd; font-size:13px; font-weight:700; }
    .rows { display:grid; gap:0; }
    .row { display:flex; justify-content:space-between; gap:8px; padding:10px 0; border-bottom:1px solid #334155; font-size:13px; }
    .row:last-child { border-bottom:0; }
    .muted { color:var(--muted); }
    .row strong {
      display:inline-flex; align-items:center; min-height:28px; padding:0 10px;
      border:1px solid rgba(96,165,250,.22); background:rgba(255,255,255,.05); border-radius:6px;
    }
    .bio {
      margin-top:12px; border:1px solid rgba(148,163,184,.18); border-radius:10px;
      background:rgba(255,255,255,.04); padding:10px; color:#dbeafe; line-height:1.6; font-size:13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Manager Public Profili</h1>
        <div class="sub">Uyelere acik manager gorunumu.</div>
      </div>
      <a class="btn" href="professional-players.html">Geri</a>
    </div>

    <div class="card">
      <div class="hero">
        <img id="photo" class="photo" alt="Manager Fotograf">
        <div>
          <div id="name" class="name">-</div>
          <div id="branch" class="meta">-</div>
        </div>
      </div>

      <div class="rows">
        <div class="row"><span class="muted">Ajans</span><strong id="agency">-</strong></div>
        <div class="row"><span class="muted">Bolge</span><strong id="region">-</strong></div>
        <div class="row"><span class="muted">Uzmanlik</span><strong id="specialization">-</strong></div>
        <div class="row"><span class="muted">Durum</span><strong id="status">-</strong></div>
        <div class="row"><span class="muted">Sehir</span><strong id="city">-</strong></div>
        <div class="row"><span class="muted">Ulke</span><strong id="country">-</strong></div>
        <div class="row"><span class="muted">Telefon</span><strong id="phone">-</strong></div>
      </div>

      <div id="bio" class="bio">Manager bilgisi henuz doldurulmadi.</div>
    </div>
  </div>

  <script>
    function getApiBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function render(p) {
      document.getElementById('photo').src = p.photo || 'https://via.placeholder.com/120x120?text=Manager';
      document.getElementById('name').textContent = p.name || 'Manager';
      document.getElementById('branch').textContent = p.branch || 'Manager';
      document.getElementById('agency').textContent = p.agency || '-';
      document.getElementById('region').textContent = p.region || '-';
      document.getElementById('specialization').textContent = p.specialization || '-';
      document.getElementById('status').textContent = p.status || '-';
      document.getElementById('city').textContent = p.city || '-';
      document.getElementById('country').textContent = p.country || '-';
      document.getElementById('phone').textContent = p.phone || '-';
      document.getElementById('bio').textContent = p.bio || 'Manager bilgisi henuz doldurulmadi.';
    }

    async function fetchPublicProfileById(userId) {
      const res = await fetch(`${getApiBaseUrl()}/staff/${encodeURIComponent(userId)}`, {
        headers: { Accept: 'application/json' },
      });
      if (!res.ok) return null;
      const payload = await res.json().catch(() => null);
      const data = payload?.data || {};
      return {
        photo: data.profile_photo_url || '',
        name: data.name || '',
        branch: data.branch || '',
        agency: data.organization || '',
        region: data.region || data.area || '',
        specialization: data.specialization || data.expertise || '',
        status: data.status || '',
        city: data.city || '',
        country: data.country || '',
        phone: data.phone || '',
        bio: data.bio || '',
      };
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const userId = String(params.get('user_id') || '').trim();
      let profile = {};
      if (userId) {
        try {
          const loaded = await fetchPublicProfileById(userId);
          if (loaded) profile = loaded;
        } catch (e) {}
      }
      render(profile);
    }

    init();
  </script>
</body>
</html>
