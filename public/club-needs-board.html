<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextScout - Kul脙录plerin 脛掳htiya脙搂lar脛卤</title>
    <meta name="description" content="Kul脙录plerin a脙搂脛卤k oyuncu ihtiya脙搂lar脛卤n脛卤 tek merkezde listeleyen NextScout sayfas脛卤.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #08131d;
            --panel: #0f1f2e;
            --line: #2b4660;
            --text: #f5fbff;
            --muted: #9bb5cb;
            --cta: #ff5a1f;
            --cta-2: #ff7e22;
            --good: #2fd4b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
                radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
                var(--bg);
        }
        .page {
            max-width: 1180px;
            margin: 28px auto;
            padding: 0 20px 24px;
        }
        .hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
            border: 1px solid #2b4660;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(8, 19, 29, 0.34);
            margin-bottom: 14px;
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%);
        }
        .hero-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }
        .hero h1 {
            font-size: 30px;
            margin-bottom: 8px;
        }
        .hero p {
            color: var(--muted);
            max-width: 760px;
        }
        .close-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255, 126, 34, 0.45);
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
            color: #16325c;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24);
        }
        .filters {
            display: grid;
            grid-template-columns: 1.2fr .8fr .8fr auto;
            gap: 10px;
            margin-top: 16px;
        }
        .control {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #2b4660;
            background: rgba(255,255,255,.04);
            color: var(--text);
            font-size: 14px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #ff7e22;
            background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%);
            color: #fff;
            padding: 11px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 16px 28px rgba(255, 90, 31, 0.28);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }
        .stat-card,
        .need-card,
        .empty {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
            border: 1px solid #2b4660;
            box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28);
        }
        .stat-card::before,
        .need-card::before,
        .empty::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%);
        }
        .stat-card {
            padding: 16px;
        }
        .stat-k {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #9bb5cb;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .stat-v {
            font-size: 28px;
            font-weight: 800;
            color: #f8fbff;
        }
        .list {
            display: grid;
            gap: 12px;
        }
        .need-card {
            padding: 18px;
        }
        .need-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }
        .need-title {
            font-size: 20px;
            font-weight: 800;
            color: #f8fbff;
        }
        .need-club {
            font-size: 13px;
            color: #93c5fd;
            font-weight: 700;
            margin-top: 4px;
        }
        .need-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid rgba(47, 212, 176, 0.3);
            background: rgba(47, 212, 176, 0.14);
            color: #8ff0d8;
            font-size: 12px;
            font-weight: 800;
        }
        .need-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 12px;
        }
        .need-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            border: 1px solid #2b4660;
            background: rgba(255,255,255,.04);
            color: #d6e8f7;
            padding: 7px 10px;
            font-size: 12px;
            font-weight: 700;
        }
        .empty {
            padding: 16px;
            color: var(--muted);
        }
        @media (max-width: 900px) {
            .filters,
            .stats {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <div class="hero-head">
            <div>
                <h1><i class="fas fa-building-circle-check"></i> Kul脙录plerin A脙搂脛卤k 脛掳htiya脙搂lar脛卤</h1>
                <p>Kul脙录plerin bug脙录n arad脛卤脛鸥脛卤 pozisyonlar脛卤, 脜鸥ehir ve ihtiya脙搂 detaylar脛卤yla tek merkezde incele.</p>
            </div>
            <a class="close-btn" href="./index.html" onclick="if (history.length > 1) { event.preventDefault(); history.back(); }" aria-label="Kapat">
                <i class="fas fa-times"></i>
            </a>
        </div>
        <div class="filters">
            <input class="control" id="positionFilter" type="text" placeholder="Pozisyon ara">
            <input class="control" id="clubFilter" type="text" placeholder="Kul脙录p ad脛卤">
            <input class="control" id="cityFilter" type="text" placeholder="脜聻ehir">
            <button class="btn" id="applyFilter"><i class="fas fa-filter"></i> Filtrele</button>
        </div>
    </section>

    <section class="stats">
        <article class="stat-card">
            <div class="stat-k">Toplam 脛掳htiya脙搂</div>
            <div class="stat-v" id="needsTotal">0</div>
        </article>
        <article class="stat-card">
            <div class="stat-k">Kul脙录p Say脛卤s脛卤</div>
            <div class="stat-v" id="clubsTotal">0</div>
        </article>
        <article class="stat-card">
            <div class="stat-k">脙鈥搉e 脙鈥∶劼眐an Pozisyon</div>
            <div class="stat-v" id="topPosition">-</div>
        </article>
    </section>

    <section class="list" id="needsList"></section>
</main>

<script>
    const API_BASE = (() => {
        const host = (window.location.hostname || '').toString().trim().toLowerCase();
        const port = (window.location.port || '').toString().trim();
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        if ((host === '127.0.0.1' || host === 'localhost') && port && port !== '8000') return 'http://127.0.0.1:8000/api';
        return '/api';
    })();
    let allNeeds = [];

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function normalizePosition(value) {
        return String(value || '').trim() || 'Pozisyon belirtilmedi';
    }

    function formatDate(value) {
        const dt = new Date(value || '');
        if (Number.isNaN(dt.getTime())) return 'Bug脙录n';
        return dt.toLocaleDateString('tr-TR');
    }

    function updateStats(rows) {
        const totalEl = document.getElementById('needsTotal');
        const clubsEl = document.getElementById('clubsTotal');
        const topPositionEl = document.getElementById('topPosition');
        if (!totalEl || !clubsEl || !topPositionEl) return;

        totalEl.textContent = String(rows.length);
        clubsEl.textContent = String(new Set(rows.map((row) => (row?.club_name || '').toString().trim()).filter(Boolean)).size);

        const counts = new Map();
        rows.forEach((row) => {
            const position = normalizePosition(row?.position || row?.player_position || row?.need_position || row?.role);
            counts.set(position, (counts.get(position) || 0) + 1);
        });
        const top = [...counts.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || '-';
        topPositionEl.textContent = top;
    }

    function renderNeeds(rows) {
        const root = document.getElementById('needsList');
        if (!root) return;

        updateStats(rows);

        if (!rows.length) {
            root.innerHTML = '<article class="empty">Bu filtreyle e脜鸥le脜鸥en kul脙录p ihtiyac脛卤 bulunamad脛卤.</article>';
            return;
        }

        root.innerHTML = rows.map((row) => {
            const position = normalizePosition(row?.position || row?.player_position || row?.need_position || row?.role);
            const club = escapeHtml((row?.club_name || 'Kul脙录p').toString().trim());
            const city = escapeHtml((row?.city || row?.location || '脜聻ehir belirtilmedi').toString().trim());
            const status = escapeHtml((row?.status || 'Aktif').toString().trim());
            const note = escapeHtml((row?.note || row?.description || 'Kul脙录p bu pozisyon i脙搂in aktif aray脛卤脜鸥ta.').toString().trim());
            const created = formatDate(row?.created_at);
            const age = row?.age_min || row?.age_max ? `${row?.age_min || '-'}-${row?.age_max || '-'}` : 'Esnek';
            const foot = escapeHtml((row?.dominant_side || 'Ayak fark etmez').toString().trim());

            return `
                <article class="need-card">
                    <div class="need-head">
                        <div>
                            <div class="need-title">${escapeHtml(position)}</div>
                            <div class="need-club">${club}</div>
                        </div>
                        <div class="need-badge"><i class="fas fa-circle"></i><span>${status}</span></div>
                    </div>
                    <div class="need-meta">
                        <span><i class="fas fa-location-dot"></i> ${city}</span>
                        <span><i class="fas fa-calendar-days"></i> ${created}</span>
                        <span><i class="fas fa-user"></i> Ya脜鸥: ${age}</span>
                    </div>
                    <div class="need-tags">
                        <span class="tag">${foot}</span>
                        <span class="tag">${note}</span>
                    </div>
                </article>
            `;
        }).join('');
    }

    function applyFilters() {
        const position = (document.getElementById('positionFilter')?.value || '').trim().toLocaleLowerCase('tr-TR');
        const club = (document.getElementById('clubFilter')?.value || '').trim().toLocaleLowerCase('tr-TR');
        const city = (document.getElementById('cityFilter')?.value || '').trim().toLocaleLowerCase('tr-TR');

        const filtered = allNeeds.filter((row) => {
            const positionValue = normalizePosition(row?.position || row?.player_position || row?.need_position || row?.role).toLocaleLowerCase('tr-TR');
            const clubValue = (row?.club_name || '').toString().trim().toLocaleLowerCase('tr-TR');
            const cityValue = (row?.city || row?.location || '').toString().trim().toLocaleLowerCase('tr-TR');
            return (!position || positionValue.includes(position))
                && (!club || clubValue.includes(club))
                && (!city || cityValue.includes(city));
        }).sort((a, b) => {
            const aPosition = normalizePosition(a?.position || a?.player_position || a?.need_position || a?.role).toLocaleLowerCase('tr-TR');
            const bPosition = normalizePosition(b?.position || b?.player_position || b?.need_position || b?.role).toLocaleLowerCase('tr-TR');
            const aCity = (a?.city || a?.location || '').toString().trim().toLocaleLowerCase('tr-TR');
            const bCity = (b?.city || b?.location || '').toString().trim().toLocaleLowerCase('tr-TR');
            const aScore = (position && aPosition === position ? 4 : 0) + (city && aCity === city ? 2 : 0);
            const bScore = (position && bPosition === position ? 4 : 0) + (city && bCity === city ? 2 : 0);
            if (bScore !== aScore) return bScore - aScore;
            return new Date(b?.created_at || 0).getTime() - new Date(a?.created_at || 0).getTime();
        });

        renderNeeds(filtered);
    }

    async function loadNeeds() {
        try {
            const query = new URLSearchParams(window.location.search);
            const presetPosition = (query.get('position') || '').trim();
            const presetCity = (query.get('city') || '').trim();
            const heroTitle = document.querySelector('.hero h1');
            const heroSummary = document.querySelector('.hero p');
            if (presetPosition && presetCity) {
                if (heroTitle) heroTitle.innerHTML = '<i class="fas fa-location-dot"></i> Sehir Mac Merkezi';
                if (heroSummary) heroSummary.textContent = `${presetCity} icin one cikan ${presetPosition} ihtiyaclarini bu akista inceleyebilirsin.`;
            }
            const response = await fetch(`${API_BASE}/club-needs?limit=300`, { headers: { Accept: 'application/json' } });
            const payload = await response.json();
            allNeeds = Array.isArray(payload?.data) ? payload.data : [];

            if (presetPosition) {
                const positionInput = document.getElementById('positionFilter');
                if (positionInput) positionInput.value = presetPosition;
            }
            if (presetCity) {
                const cityInput = document.getElementById('cityFilter');
                if (cityInput) cityInput.value = presetCity;
            }

            applyFilters();
        } catch (error) {
            allNeeds = [];
            renderNeeds([]);
        }
    }

    document.getElementById('applyFilter')?.addEventListener('click', applyFilters);
    ['positionFilter', 'clubFilter', 'cityFilter'].forEach((id) => {
        document.getElementById(id)?.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') applyFilters();
        });
    });

    loadNeeds();
</script>
<script src="assets/js/core-stability.js"></script>
</body>
</html>
