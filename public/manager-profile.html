  <style>
    :root {
      --bg:#08131d;
      --ink:#f5fbff;
      --muted:#9bb5cb;
      --line:#2b4660;
      --panel:#0f1f2e;
      --panel-soft:#12293d;
      --primary:#60a5fa;
      --primary-strong:#16325c;
      --success:#14b8a6;
      --cta:#ff5a1f;
      --cta-2:#ff7e22;
      --shadow:0 18px 36px rgba(8,19,29,.34);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--ink);
      min-height:100vh;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 24px}
    .head{
      position:relative;
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;
      border:1px solid var(--line);border-radius:0 !important;background:linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);padding:24px;
      box-shadow:var(--shadow);overflow:hidden;
    }
    .head::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,var(--cta) 0%,var(--cta-2) 55%,#60a5fa 100%)}
    .title{margin:0;font-size:32px;font-weight:800;font-family:Poppins,Inter,sans-serif;color:#dbeafe;line-height:1.1}
    .sub{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.7}
    .head-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:1px solid rgba(255,126,34,.45);background:linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);color:#16325c;padding:10px 14px;border-radius:12px;
      text-decoration:none;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;
      transition:all .2s ease;line-height:1;box-shadow:0 12px 24px rgba(8,19,29,.24);
      border-radius:0 !important;
    }
    .btn:hover{transform:translateY(-1px);border-color:rgba(255,126,34,.6)}
    .btn-primary{background:linear-gradient(135deg,var(--cta) 0%,var(--cta-2) 100%);color:#fff;border-color:rgba(255,126,34,.6);box-shadow:0 16px 28px rgba(255,90,31,.28)}
    .btn-secondary{background:linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);color:#16325c;border:1px solid rgba(255,126,34,.45)}
    .home-btn{
      background:linear-gradient(135deg,var(--cta) 0%,var(--cta-2) 100%);
      border:1px solid rgba(255,126,34,.6);
      color:#fff;
      border-radius:0 !important;
      padding:10px 14px;
      box-shadow:0 16px 28px rgba(255,90,31,.28);
    }
    .layout{display:grid;grid-template-columns:1.8fr 1fr;gap:12px}
    .card{
      position:relative;background:linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);border:1px solid var(--line);border-radius:0 !important;box-shadow:var(--shadow);padding:18px;overflow:hidden;
    }
    .card::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,var(--cta) 0%,var(--cta-2) 55%,#60a5fa 100%)}
    .section-title{margin:0 0 10px 0;font-size:16px;font-weight:800;color:#dbeafe}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{display:flex;flex-direction:column;gap:6px}
    .label{font-size:12px;font-weight:700;color:#cbd5e1}
    .input,.textarea,.select{
      border:1px solid var(--line);border-radius:0 !important;padding:10px 12px;font-size:13px;background:rgba(255,255,255,.04);color:#f8fafc;
    }
    .input::placeholder,.textarea::placeholder{color:#94a3b8}
    .input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(96,165,250,.16)}
    .textarea{min-height:100px;resize:vertical}
    .full{grid-column:1/-1}
    .act{display:flex;gap:8px;margin-top:12px}
    .photo-box{display:flex;flex-direction:column;align-items:center;gap:10px}
    .photo{width:132px;height:132px;border-radius:0 !important;border:1px solid var(--line);object-fit:cover;background:rgba(255,255,255,.04)}
    .row{display:flex;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid rgba(148,163,184,.14);font-size:13px}
    .row:last-child{border-bottom:0}
    .muted{color:var(--muted)}
    .ok{color:#34d399;font-size:12px;min-height:16px;margin-top:8px;font-weight:700}
    .preview-modal{
      position:fixed;inset:0;background:rgba(2,6,23,.62);backdrop-filter:blur(4px);
      display:none;align-items:center;justify-content:center;padding:14px;z-index:9999;
    }
    .preview-modal.show{display:flex}
    .preview-card{
      width:min(560px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);border:1px solid var(--line);
      border-radius:0 !important;box-shadow:0 24px 50px rgba(2,6,23,.45);position:relative;
    }
    .preview-card::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,var(--cta) 0%,var(--cta-2) 55%,#60a5fa 100%)}
    .preview-head{
      display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--line);
    }
    .preview-title{margin:0;font-size:18px;font-weight:800;color:#dbeafe}
    .preview-close{
      width:34px;height:34px;border-radius:0 !important;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#dbeafe;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;
    }
    .preview-body{padding:14px;display:grid;gap:12px}
    .preview-top{
      display:flex;align-items:center;gap:12px;padding:10px;border:1px solid var(--line);border-radius:0 !important;background:rgba(255,255,255,.04);
    }
    .preview-photo{
      width:78px;height:78px;border-radius:0 !important;border:1px solid var(--line);object-fit:cover;background:#111827;flex:0 0 auto;
    }
    .preview-name{font-size:17px;font-weight:800;color:#f8fafc}
    .preview-branch{font-size:12px;color:#93c5fd;font-weight:700}
    .preview-bio{

    }
    .preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .preview-item{
      border:1px solid var(--line);border-radius:0 !important;background:rgba(255,255,255,.04);padding:9px 10px;
    }
    .preview-k{font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:700;margin-bottom:4px}
    .preview-v{font-size:13px;color:#f8fafc;font-weight:700;word-break:break-word}
    .review-shell{display:grid;gap:16px}
    .review-list{display:grid;gap:14px}
    .review-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .review-summary-card{padding:14px 15px;border-radius:0 !important;border:1px solid rgba(96,165,250,.14);background:linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(15,23,42,.18) 100%)}
    .review-summary-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#9bb5cb;margin-bottom:8px}
    .review-summary-value{font-size:26px;font-weight:900;color:#f8fbff}
    .review-item{
      position:relative;padding:18px;border-radius:0 !important;border:1px solid rgba(96,165,250,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(15,23,42,.18) 100%);box-shadow:0 18px 32px rgba(2,6,23,.16)
    }
    .review-item::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:linear-gradient(180deg,#ff7e22 0%,#60a5fa 100%)}
    .review-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
    .review-author{display:grid;gap:4px}
    .review-author strong{font-size:15px;color:#f5fbff}
    .review-author span,.review-empty,.review-meta{font-size:12px;color:var(--muted);line-height:1.6}
    .review-tags{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 14px}
    .review-pill{
      display:inline-flex;align-items:center;min-height:28px;padding:0 11px;border-radius:0 !important;border:1px solid rgba(148,163,184,.16);
      background:rgba(255,255,255,.06);color:#dbeafe;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase
    }
    .review-pill.sentiment-olumlu{color:#bbf7d0}
    .review-pill.sentiment-notr{color:#bfdbfe}
    .review-pill.sentiment-dikkat{color:#fde68a}
    .review-body{color:#e2e8f0;font-size:14px;line-height:1.72}
    .review-reply{
      margin-top:12px;padding:14px 15px;border-radius:0 !important;background:linear-gradient(180deg, rgba(11,59,138,.18) 0%, rgba(15,23,42,.16) 100%);
      border:1px solid rgba(96,165,250,.2);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)
    }

    @media (max-width:900px){
      .layout{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .review-summary-grid{grid-template-columns:1fr}
    }
    @media (max-width:768px){
      .wrap{padding:10px 10px 18px}
      .head{padding:12px;gap:10px;flex-direction:column}
      .title{font-size:24px}
      .sub{font-size:12px}
      .head-actions{width:100%;justify-content:flex-start}
      .btn{padding:9px 12px}
      .card{padding:12px}
      .section-title{font-size:15px}
      .act{display:grid;grid-template-columns:1fr 1fr}
      .photo{width:120px;height:120px}
      .row{font-size:12px}
      .preview-card{max-height:94vh;border-radius:14px}
      .preview-grid{grid-template-columns:1fr}
    }
    @media (max-width:480px){
      .act{grid-template-columns:1fr}
      .btn{width:100%;justify-content:center}
      .head-actions .btn{width:auto}
      .input,.textarea,.select{font-size:16px}
    }

  <script>
    function getApiBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function getToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function authHeaders() {
      const token = getToken();
      if (!token) return null;
      return {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': `Bearer ${token}`,
      };
    }

    function defaults(){
      return { name:'Manager', agency:'', city:'', country:'T�rkiye', phone:'', branch:'Futbol', bio:'', photo:'' };
    }

    function setForm(p){
      document.getElementById('name').value = p.name || '';
      document.getElementById('agency').value = p.agency || '';
      document.getElementById('city').value = p.city || '';
      document.getElementById('country').value = p.country || '';
      document.getElementById('phone').value = p.phone || '';
      document.getElementById('branch').value = p.branch || '';
      document.getElementById('bio').value = p.bio || '';
      document.getElementById('photoPreview').src = p.photo || 'https://via.placeholder.com/120x120?text=Manager';
    }

    function readForm(current){
      return {
        name: document.getElementById('name').value.trim(),
        agency: document.getElementById('agency').value.trim(),
        city: document.getElementById('city').value.trim(),
        country: document.getElementById('country').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        branch: document.getElementById('branch').value,
        bio: document.getElementById('bio').value.trim(),
        photo: current.photo || ''
      };
    }

    function renderSummary(p){
      document.getElementById('sumName').textContent = p.name || '-';
      document.getElementById('sumBranch').textContent = p.branch || '-';
      document.getElementById('sumAgency').textContent = p.agency || '-';
      document.getElementById('sumCity').textContent = p.city || '-';
      document.getElementById('sumCountry').textContent = p.country || '-';
    }

    function renderPublicPreviewModal(p){
      const photo = p.photo || 'https://via.placeholder.com/120x120?text=Manager';
      document.getElementById('previewPhoto').src = photo;
      document.getElementById('previewName').textContent = p.name || '-';
      document.getElementById('previewBranch').textContent = p.branch || '-';
      document.getElementById('previewBio').textContent = p.bio || 'Tanitim metni yok.';
      document.getElementById('previewAgency').textContent = p.agency || '-';
      document.getElementById('previewCity').textContent = p.city || '-';
      document.getElementById('previewCountry').textContent = p.country || '-';
      document.getElementById('previewPhone').textContent = p.phone || '-';
    }

    function openPublicPreviewModal(){
      const modal = document.getElementById('publicPreviewModal');
      if (!modal) return;
      profile = readForm(profile);
      renderPublicPreviewModal(profile);
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closePublicPreviewModal(){
      const modal = document.getElementById('publicPreviewModal');
      if (!modal) return;
      modal.classList.remove('show');
      document.body.style.overflow = '';
    }

    async function resolveCurrentUserId() {
      const headers = authHeaders();
      if (!headers) return 0;
      const res = await fetch(`${getApiBaseUrl()}/auth/me`, {
        headers: { 'Accept': 'application/json', 'Authorization': headers.Authorization },
      });
      if (!res.ok) return 0;
      const payload = await res.json();
      return Number(payload?.data?.id || 0);
    }

    async function loadBackendProfile() {
      const headers = authHeaders();
      if (!headers) return null;
      const userId = await resolveCurrentUserId();
      if (!userId) return null;
      const res = await fetch(`${getApiBaseUrl()}/staff/${encodeURIComponent(userId)}`, { headers: { 'Accept': 'application/json', 'Authorization': headers.Authorization } });
      if (!res.ok) return null;
      const payload = await res.json();
      const data = payload?.data || {};
      return {
        name: data.name || '',
        agency: data.organization || '',
        city: data.city || '',
        country: data.country || '',
        phone: data.phone || '',
        branch: data.branch || '',
        bio: data.bio || '',
        photo: data.profile_photo_url || '',
      };
    }

    async function saveBackendProfile(p) {
      const headers = authHeaders();
      if (!headers) return false;
      const userId = await resolveCurrentUserId();
      if (!userId) return false;
      const body = {
        name: p.name,
        city: p.city,
        phone: p.phone,
        organization: p.agency,
        experience_years: null,
        bio: p.bio,
        country: p.country,
        branch: p.branch,
        profile_photo_url: p.photo || '',
      };
      const res = await fetch(`${getApiBaseUrl()}/staff/${encodeURIComponent(userId)}`, {
        method: 'PUT',
        headers,
        body: JSON.stringify(body),
      });
      return res.ok;
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatReviewDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function reviewLabelMap() {
      return {
        calisti: 'Birlikte calistik',
        gorusuldu: 'Gorusme yapildi',
        gozlendi: 'Surec izlendi',
        diger: 'Diger',
        olumlu: 'Olumlu',
        notr: 'Notr',
        dikkat: 'Dikkat',
      };
    }

    function renderManagerProfileReviews(items) {
      const root = document.getElementById('managerReviewList');
      const summary = document.getElementById('managerReviewSummary');
      if (!root) return;
      const rows = Array.isArray(items) ? items : [];
      if (summary) {
        const total = rows.length;
        const positive = rows.filter((row) => row?.sentiment === 'olumlu').length;
        const positiveRate = total ? Math.round((positive / total) * 100) : 0;
        const score = total ? Math.min(10, Math.max(1, ((positive * 10) + ((total - positive) * 5)) / (total * 10) * 10)).toFixed(1) : '0.0';
        summary.innerHTML = `
          <div class="review-summary-card"><div class="review-summary-label">Toplam</div><div class="review-summary-value">${total}</div></div>
          <div class="review-summary-card"><div class="review-summary-label">Olumlu Oran</div><div class="review-summary-value">%${positiveRate}</div></div>
          <div class="review-summary-card"><div class="review-summary-label">Guven Skoru</div><div class="review-summary-value">${score}/10</div></div>
        `;
      }
      if (!rows.length) {
        root.innerHTML = '<div class="review-empty">Bu menajer profili icin henuz yayinlanmis yorum yok.</div>';
        return;
      }

      const labels = reviewLabelMap();
      root.innerHTML = rows.map((review) => `
        <article class="review-item">
          <div class="review-head">
            <div class="review-author">
              <strong>${esc(review?.author_name || 'Kullanici')}</strong>
              <span>${esc(review?.author_role || 'rol belirtilmedi')}</span>
            </div>
            <div class="review-meta">${esc(formatReviewDate(review?.created_at))}</div>
          </div>
          <div class="review-tags">
            <span class="review-pill">${esc(labels[review?.relationship_type] || review?.relationship_type || '-')}</span>
            <span class="review-pill sentiment-${esc(review?.sentiment || 'notr')}">${esc(labels[review?.sentiment] || review?.sentiment || '-')}</span>
          </div>
          <div class="review-body">${esc(review?.body || '')}</div>
          ${review?.reply?.body ? `
            <div class="review-reply">
              <div class="review-meta">${esc(review?.reply?.author_name || 'Profil sahibi')} yaniti</div>
              <div class="review-body">${esc(review.reply.body)}</div>
            </div>
          ` : ''}
        </article>
      `).join('');
    }

    async function loadManagerProfileReviews() {
      const root = document.getElementById('managerReviewList');
      if (!root) return;
      const params = new URLSearchParams(window.location.search);
      let targetId = Number(params.get('user_id') || params.get('id') || 0);
      if (!targetId) targetId = await resolveCurrentUserId();
      if (!targetId) return;

      root.innerHTML = '<div class="review-empty">Yorumlar yukleniyor...</div>';
      try {
        const res = await fetch(`${getApiBaseUrl()}/profiles/${encodeURIComponent(targetId)}/reviews`, {
          headers: { 'Accept': 'application/json' },
        });
        const data = await res.json().catch(() => null);
        const items = Array.isArray(data?.data?.data)
          ? data.data.data
          : Array.isArray(data?.data?.items)
          ? data.data.items
          : Array.isArray(data?.data)
          ? data.data
          : [];
        renderManagerProfileReviews(items);
      } catch (error) {
        root.innerHTML = '<div class="review-empty">Yorumlar su an alinamiyor.</div>';
      }
    }

    let profile = defaults();

    function applyTurkishTextFixes() {
      document.title = 'Manager Profili - NextScout';
      const mapTexts = [
        ['.sub', 'İsim ve foto dahil profil bilgilerini düzenle.'],
        ['#openPublicPreviewBtn span', 'Public Görünüm'],
        ['label[for="name"]', 'İsim Soyisim'],
        ['label[for="agency"]', 'Şirket / Ajans'],
        ['label[for="city"]', 'Şehir'],
        ['label[for="country"]', 'Ülke'],
        ['label[for="branch"]', 'Branş'],
        ['label[for="bio"]', 'Hakkımda'],
        ['#resetBtn span', 'Sıfırla'],
        ['#clearPhotoBtn span', 'Fotoğrafı Kaldır'],
        ['#sumName', '-'],
        ['.preview-title', 'Public Profil Önizleme']
      ];
      mapTexts.forEach(([selector, text]) => {
        const el = document.querySelector(selector);
        if (el) el.textContent = text;
      });
      document.querySelectorAll('.row .muted, .preview-k').forEach((el) => {
        el.textContent = (el.textContent || '')
          .replace('Isim', 'İsim')
          .replace('Brans', 'Branş')
          .replace('Sehir', 'Şehir')
          .replace('Ulke', 'Ülke')
          .replace('Ajans', 'Ajans');
      });
      document.querySelectorAll('input[placeholder], textarea[placeholder], option').forEach((el) => {
        if (el.tagName === 'OPTION') {
          el.textContent = (el.textContent || '')
            .replace('Seciniz', 'Seçiniz')
            .replace('Coklu Brans', 'Çoklu Branş');
          return;
        }
        const placeholder = el.getAttribute('placeholder') || '';
        el.setAttribute('placeholder', placeholder
          .replace('Ornek Sports Management', 'Örnek Sports Management')
          .replace('Istanbul', 'İstanbul')
          .replace('Turkiye', 'Türkiye')
          .replace('Tï¿½rkiye', 'Türkiye')
          .replace('Kisa manager tanitimi...', 'Kısa menajer tanıtımı...'));
      });
    }

    async function init() {
      const remote = await loadBackendProfile();
      if (remote) {
        profile = Object.assign(defaults(), remote);
      }
      setForm(profile);
      renderSummary(profile);
      applyTurkishTextFixes();
      await loadManagerProfileReviews();
    }

    document.getElementById('managerForm')?.addEventListener('submit', async function(e){
      e.preventDefault();
      profile = readForm(profile);
      if(!profile.name){
        document.getElementById('saveMsg').textContent = 'İsim zorunlu.';
        return;
      }

      let backendSaved = false;
      try {
        backendSaved = await saveBackendProfile(profile);
      } catch (error) {
        backendSaved = false;
      }

      renderSummary(profile);
      renderPublicPreviewModal(profile);
      document.getElementById('saveMsg').textContent = backendSaved ? 'Profil backend kaydedildi.' : 'Profil kaydedilemedi.';
      setTimeout(() => { document.getElementById('saveMsg').textContent = ''; }, 1800);
    });

    document.getElementById('resetBtn')?.addEventListener('click', function(){
      profile = defaults();
      setForm(profile);
      renderSummary(profile);
      renderPublicPreviewModal(profile);
      document.getElementById('saveMsg').textContent = 'Profil sıfırlandı.';
      setTimeout(() => { document.getElementById('saveMsg').textContent = ''; }, 1500);
    });

    document.getElementById('photoInput')?.addEventListener('change', async function(e){
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async function(evt){
        profile.photo = String((evt.target && evt.target.result) || '');
        document.getElementById('photoPreview').src = profile.photo || 'https://via.placeholder.com/120x120?text=Manager';
        renderPublicPreviewModal(profile);
        try { await saveBackendProfile(profile); } catch (error) {}
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('clearPhotoBtn')?.addEventListener('click', async function(){
      profile.photo = '';
      document.getElementById('photoPreview').src = 'https://via.placeholder.com/120x120?text=Manager';
      document.getElementById('photoInput').value = '';
      renderPublicPreviewModal(profile);
      try { await saveBackendProfile(profile); } catch (error) {}
    });

    document.getElementById('openPublicPreviewBtn')?.addEventListener('click', openPublicPreviewModal);

    init();
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
