<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextScout - Profesyonel Ä°lan MasasÄ±</title>
    <meta name="description" content="NextScout profesyonel ilan masasÄ±: menajer ve antrenÃ¶r ilanlarÄ±nÄ± tek merkezde gÃ¶sterir.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
          --bg: #08131d;
          --panel: #0f1f2e;
          --line: #2b4660;
          --text: #f5fbff;
          --muted: #9bb5cb;
          --cta: #ff5a1f;
          --cta-2: #ff7e22;
          --good: #2fd4b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          margin: 0;
          color: var(--text);
          font-family: "Space Grotesk", sans-serif;
          background:
            radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
            radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
            var(--bg);
          min-height: 100vh;
        }
        .btn, a.btn, button.btn { display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; border: 1px solid rgba(255, 126, 34, 0.45) !important; background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%) !important; color: #16325c !important; padding: 10px 16px !important; border-radius: 12px !important; text-decoration: none !important; font-weight: 800 !important; font-size: 13px !important; cursor: pointer !important; box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24) !important; }
        .btn.primary, a.btn.primary, button.btn.primary { background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%) !important; border-color: #ff7e22 !important; color: #ffffff !important; }
        .page { max-width: 1180px; margin: 26px auto; padding: 0 20px; }
        .hero { position:relative; overflow:hidden; background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 22px; padding: 24px; box-shadow: 0 18px 36px rgba(8, 19, 29, 0.34); margin-bottom: 14px; }
        .hero::before { content:""; position:absolute; inset:0 0 auto 0; height:4px; background:linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%); }
        .hero-close { position: absolute; top: 18px; right: 18px; width: 42px; height: 42px; padding: 0 !important; }
        .hero h1 { font-size: 30px; margin-bottom: 8px; }
        .hero p { color: var(--muted); margin-bottom: 14px; }
        .filters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .control { width: 100%; padding: 10px 12px; border: 1px solid #2b4660; border-radius: 12px; background: rgba(255,255,255,.04); color: var(--text); font-size: 14px; }
        .list { display: grid; gap: 12px; margin-top: 14px; }
        .job { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 18px; padding: 18px; color: var(--text); box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28); }
        .job::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 4px; background: linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%); }
        .job-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
        .job-head h3 { font-size: 19px; color: #f8fbff; }
        .reward { background: linear-gradient(135deg, rgba(47, 212, 176, 0.2) 0%, rgba(47, 212, 176, 0.08) 100%); color: #8ff0d8; border: 1px solid rgba(47, 212, 176, 0.3); border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 800; }
        .meta { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 13px; margin-bottom: 12px; }
        .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
        .tag { background: rgba(255, 255, 255, 0.04); border: 1px solid #2b4660; color: #d6e8f7; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
        .empty { position:relative; overflow:hidden; background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 16px; padding: 16px; color: var(--muted); }
        .empty::before { content:""; position:absolute; inset:0 0 auto 0; height:4px; background:linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%); }
        @media (max-width: 1000px) { .filters { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .filters { grid-template-columns: 1fr; } .hero h1 { font-size: 22px; } }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <a href="index.html" class="btn hero-close" id="closeBtn" aria-label="Kapat" title="Kapat"><i class="fas fa-xmark"></i></a>
        <h1><i class="fa-solid fa-filter"></i> Profesyonel Ä°lan MasasÄ±</h1>
        <p>Menajer ve antrenÃ¶r ilanlarÄ± burada birlikte yayÄ±nlanÄ±r. Oyuncular filtreleyip kendine uygun akÄ±ÅŸÄ± tek sayfada gÃ¶rÃ¼r.</p>
        <div class="filters">
            <select class="control" id="positionFilter">
                <option value="">Pozisyon (TÃ¼mÃ¼)</option>
                <option value="CB">Stoper</option>
                <option value="LB">Sol Bek</option>
                <option value="RB">SaÄŸ Bek</option>
                <option value="AM">10 Numara</option>
                <option value="RW">SaÄŸ Kanat</option>
                <option value="LW">Sol Kanat</option>
                <option value="ST">Santrfor</option>
            </select>
            <input class="control" id="heightFilter" type="number" placeholder="Min boy (cm)">
            <input class="control" id="budgetMinFilter" type="number" placeholder="BÃ¼tÃ§e min (TL)">
            <input class="control" id="budgetMaxFilter" type="number" placeholder="BÃ¼tÃ§e max (TL)">
            <button class="btn primary" id="applyFilter"><i class="fa-solid fa-magnifying-glass"></i> Filtrele</button>
        </div>
    </section>

    <section class="list" id="jobList"></section>
</main>

<script>
    let allJobs = [];

    function getApiBaseUrl() {
        const query = new URLSearchParams(window.location.search);
        const fromQuery = (query.get('api_base') || '').trim();
        if (fromQuery) return fromQuery.replace(/\/$/, '');
        const host = (window.location.hostname || '').toString().trim().toLowerCase();
        const port = (window.location.port || '').toString().trim();
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        if ((host === '127.0.0.1' || host === 'localhost') && port && port !== '8000') return 'http://127.0.0.1:8000/api';
        return '/api';
    }

    async function loadJobs() {
        const apiBase = getApiBaseUrl();
        const [managerResponse, coachResponse] = await Promise.all([
            fetch(`${apiBase}/discovery/manager-needs`, { headers: { Accept: 'application/json' } }),
            fetch(`${apiBase}/discovery/coach-needs`, { headers: { Accept: 'application/json' } }),
        ]);
        if (!managerResponse.ok && !coachResponse.ok) throw new Error(`HTTP ${managerResponse.status}/${coachResponse.status}`);
        const managerPayload = managerResponse.ok ? await managerResponse.json() : { data: [] };
        const coachPayload = coachResponse.ok ? await coachResponse.json() : { data: [] };
        const managerRows = Array.isArray(managerPayload?.data) ? managerPayload.data.map((item) => ({ ...item, source_role: 'manager' })) : [];
        const coachRows = Array.isArray(coachPayload?.data) ? coachPayload.data.map((item) => ({ ...item, source_role: 'coach' })) : [];
        return [...managerRows, ...coachRows];
    }

    function money(v) {
        return `${(Number(v) || 0).toLocaleString('tr-TR')} TL`;
    }

    function render(data) {
        const root = document.getElementById('jobList');
        if (!data.length) {
            root.innerHTML = '<div class="empty">Kriterlere uygun ilan bulunamadÄ±.</div>';
            return;
        }

        root.innerHTML = data.map((job) => {
            const roleLabel = String(job.source_role || '').toLowerCase() === 'coach' ? 'ANTRENÃ–R Ä°lanÄ±' : 'MENAJER Ä°lanÄ±';
            const title = job.title || `${job.position || '-'} pozisyonu iÃ§in oyuncu aranÄ±yor`;
            const freeLabel = job.free_only === 'true' ? 'Bonservisi elinde' : (job.free_only === 'false' ? 'KulÃ¼bÃ¼nde olabilir' : 'Bonservis fark etmez');
            const ageLabel = `${job.age_min || '-'}-${job.age_max || '-'} yaÅŸ`;
            return `
                <article class="job">
                    <div class="job-head">
                        <h3>${title}</h3>
                        <span class="reward">${money(job.budget_min)} - ${money(job.budget_max)}</span>
                    </div>
                    <div class="meta">
                        <span><i class="fa-solid fa-user-tie"></i> ${roleLabel}: ${job.author_name || job.coach_name || '-'}</span>
                        <span><i class="fa-solid fa-location-dot"></i> ${job.city || 'Åehir belirtilmedi'}</span>
                        <span><i class="fa-solid fa-ruler-vertical"></i> Min ${job.min_height || '-'} cm</span>
                        <span><i class="fa-solid fa-user"></i> ${ageLabel}</span>
                    </div>
                    <div class="tags">
                        <span class="tag">${roleLabel}</span>
                        <span class="tag">${job.dominant_side || 'Ayak fark etmez'}</span>
                        <span class="tag">${freeLabel}</span>
                        <span class="tag">${job.description || 'Ek aÃ§Ä±klama yok'}</span>
                    </div>
                    <button class="btn primary" onclick="alert('BaÅŸvuru iletildi: ${title}')"><i class="fa-solid fa-paper-plane"></i> Bu GÃ¶reve BaÅŸvur</button>
                </article>
            `;
        }).join('');
    }

    document.getElementById('applyFilter')?.addEventListener('click', () => {
        const position = document.getElementById('positionFilter').value;
        const minHeight = Number(document.getElementById('heightFilter').value || 0);
        const budgetMin = Number(document.getElementById('budgetMinFilter').value || 0);
        const budgetMax = Number(document.getElementById('budgetMaxFilter').value || 0);

        const filtered = allJobs
            .filter((j) => (position ? j.position === position : true))
            .filter((j) => (minHeight ? Number(j.min_height || 0) >= minHeight : true))
            .filter((j) => (budgetMin ? Number(j.budget_min || 0) >= budgetMin : true))
            .filter((j) => (budgetMax ? Number(j.budget_max || 0) <= budgetMax : true))
            .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

        render(filtered);
    });

    async function init() {
        try {
            allJobs = await loadJobs();
        } catch (error) {
            allJobs = [];
        }
        render(allJobs.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)));
    }

    init();

    const closeBtn = document.getElementById('closeBtn');
    if (closeBtn) {
        closeBtn.addEventListener('click', function (event) {
            event.preventDefault();
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.href = 'index.html';
        });
    }
</script>
<script src="assets/js/core-stability.js"></script>
</body>
</html>
