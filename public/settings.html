<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayarlar - NextScout</title>

    <meta property="og:description" content="NextScout settings sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta property="og:url" content="https://nextscout.app/settings.html">
    <meta property="og:image" content="https://nextscout.app/assets/img/og-default.jpg">

    <meta name="twitter:title" content="Ayarlar - NextScout">
    <meta name="twitter:description" content="NextScout settings sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">

    <meta name="theme-color" content="#0B3B8A">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{
      --bg:#1f252d; --card:#232a33; --line:#334155; --line-soft:#475569;
      --text:#e2e8f0; --muted:#94a3b8; --primary:#60a5fa;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at 0% 0%, rgba(56,189,248,.16), transparent 34%),
        radial-gradient(circle at 100% 0%, rgba(96,165,250,.14), transparent 36%),
        var(--bg);
      color:var(--text);
      font-family:Inter,Segoe UI,Arial,sans-serif;
    }
    .wrap{max-width:980px;margin:0 auto;padding:20px 14px}
    .head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;
      border:1px solid var(--line);border-radius:14px;background:rgba(35,42,51,.9);padding:12px;
      box-shadow:0 12px 26px rgba(2,6,23,.24);
    }
    .title{margin:0;font-size:30px;font-weight:800;color:#dbeafe}
    .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .btn{
      border:1px solid var(--line-soft);background:#2b3440;color:#dbeafe;padding:10px 14px;border-radius:10px;
      text-decoration:none;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
    }
    .home-btn{
      background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);border:1px solid #2563eb;color:#fff;
    }
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;
      box-shadow:0 12px 24px rgba(2,6,23,.2);
    }
    .card h3{margin:0 0 10px 0;font-size:17px;color:#dbeafe}
    .row{display:grid;grid-template-columns:180px 1fr;gap:10px;align-items:center;margin:10px 0}
    .row label{font-size:13px;color:#cbd5e1;font-weight:700}
    input,select{
      width:100%;border:1px solid var(--line-soft);border-radius:10px;padding:10px 12px;font-size:14px;outline:none;
      background:#1f2937;color:#f8fafc;
    }
    input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(96,165,250,.18)}
    input::placeholder{color:#94a3b8}
    .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap}
    .btn-primary{background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);border-color:#2563eb;color:#fff}
    @media(max-width:760px){
      .wrap{padding:12px 10px 18px}
      .head{flex-direction:column;align-items:flex-start}
      .title{font-size:24px}
      .sub{font-size:12px}
      .row{grid-template-columns:1fr}
      .actions .btn{width:100%;justify-content:center}
    }
  </style>
    <link rel="stylesheet" href="assets/css/mobile-unified.css">
    <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Ayarlar</h1>
        <div class="sub">Hesap ve görünüm tercihlerini buradan yönetebilirsin.</div>
      </div>
      <a href="index.html" class="btn home-btn"><i class="fas fa-house"></i><span>Ana Sayfa</span></a>
    </div>

    <div class="card">
      <h3>Hesap Ayarları</h3>
      <div class="row"><label>Görünen İsim</label><input id="displayName" type="text" placeholder="Görünen isim"></div>
      <div class="row"><label>E-posta</label><input id="email" type="email" placeholder="mail@example.com"></div>
      <div class="row"><label>Dil</label>
        <select id="lang"><option value="tr">Türkçe</option><option value="en">English</option></select>
      </div>
    </div>

    <div class="card">
      <h3>Uygulama Tercihleri</h3>
      <div class="row"><label>Bildirimler</label><select id="notify"><option value="on">Açık</option><option value="off">Kapalı</option></select></div>
      <div class="row"><label>Profil Görünürlüğü</label><select id="visibility"><option value="public">Herkese Açık</option><option value="private">Sadece Bağlantılar</option></select></div>
      <div class="actions">
        <button class="btn" id="resetBtn">Sıfırla</button>
        <button class="btn btn-primary" id="saveBtn">Kaydet</button>
      </div>
    </div>

    <div class="card">
      <h3>Şifre Değiştir</h3>
      <div class="row"><label>Mevcut Şifre</label><input id="currentPassword" type="password" placeholder="Mevcut şifren"></div>
      <div class="row"><label>Yeni Şifre</label><input id="newPassword" type="password" placeholder="En az 6 karakter"></div>
      <div class="row"><label>Yeni Şifre (Tekrar)</label><input id="confirmPassword" type="password" placeholder="Yeni şifreyi tekrar yaz"></div>
      <div class="actions">
        <button class="btn btn-primary" id="changePasswordBtn">Şifreyi Güncelle</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE=(function(){
      const p=new URLSearchParams(window.location.search);
      const q=(p.get('api_base')||'').trim();
      if(q) return q.replace(/\/$/,'');
      if(window.location.protocol==='file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    })();

    function getToken(){ return (localStorage.getItem('nextscout_token')||'').trim(); }
    function getHeaders(extra={}){
      const token=getToken();
      const h={Accept:'application/json',...extra};
      if(token && token!=='local-session-token') h.Authorization=`Bearer ${token}`;
      return h;
    }
    async function fetchJson(url,options={}){
      const response=await fetch(url,{...options,headers:getHeaders(options.headers||{})});
      const payload=await response.json().catch(()=>({}));
      if(!response.ok) throw new Error(payload?.message||`HTTP ${response.status}`);
      return payload;
    }

    async function load(){
      const token=getToken();
      if(!token || token==='local-session-token'){
        nsAlert('Ayarlar icin giriş gerekli.');
        window.location.href='index.html';
        return;
      }
      const [mePayload, profilePayload, notifPayload]=await Promise.all([
        fetchJson(`${API_BASE}/auth/me`),
        fetchJson(`${API_BASE}/settings/profile`).catch(()=>null),
        fetchJson(`${API_BASE}/settings/notifications`).catch(()=>null)
      ]);

      const me=mePayload?.data||mePayload||{};
      const profile=profilePayload?.data||profilePayload||{};
      const notif=notifPayload?.data||notifPayload||{};

      document.getElementById('displayName').value=profile.display_name||profile.name||me.name||'';
      document.getElementById('email').value=profile.email||me.email||'';
      document.getElementById('lang').value=profile.lang||profile.language||'tr';
      document.getElementById('notify').value=(notif.enabled===false||notif.notifications===false)?'off':'on';
      document.getElementById('visibility').value=profile.visibility||'public';
    }

    async function save(){
      const data={
        display_name:document.getElementById('displayName').value.trim(),
        email:document.getElementById('email').value.trim(),
        language:document.getElementById('lang').value,
        visibility:document.getElementById('visibility').value
      };
      await fetchJson(`${API_BASE}/settings/profile`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
      });
      await fetchJson(`${API_BASE}/settings/notifications`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({enabled:document.getElementById('notify').value==='on'})
      });
      nsAlert('Ayarlar APIye kaydedildi.');
    }

    async function reset(){
      await load();
      nsAlert('Ayarlar APIden yeniden yüklendi.');
    }

    async function changePassword(){
      const current = document.getElementById('currentPassword').value;
      const next = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if(!current || !next || !confirm){
        nsAlert('Lütfen tüm şifre alanlarını doldur.');
        return;
      }
      if(next.length < 6){
        nsAlert('Yeni şifre en az 6 karakter olmalı.');
        return;
      }
      if(next !== confirm){
        nsAlert('Yeni şifreler eşleşmiyor.');
        return;
      }

      await fetchJson(`${API_BASE}/settings/password`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          current_password: current,
          new_password: next,
          new_password_confirmation: confirm
        })
      });
      document.getElementById('currentPassword').value='';
      document.getElementById('newPassword').value='';
      document.getElementById('confirmPassword').value='';
      nsAlert('Şifre APIde güncellendi.');
    }
    document.getElementById('saveBtn')?.addEventListener('click',()=>save().catch(e=>nsAlert(`Ayarlar kaydedilemedi: ${e.message}`)));
    document.getElementById('resetBtn')?.addEventListener('click',()=>reset().catch(e=>nsAlert(`Yukleme hatasi: ${e.message}`)));
    document.getElementById('changePasswordBtn')?.addEventListener('click',()=>changePassword().catch(e=>nsAlert(`Şifre güncellenemedi: ${e.message}`)));
    load().catch(e=>nsAlert(`Ayarlar alinamadi: ${e.message}`));
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
</html>
