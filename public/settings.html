  <style>
    :root{
      --bg:#08131d; --card:linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); --line:#2b4660; --line-soft:rgba(148, 163, 184, 0.18);
      --text:#f5fbff; --muted:#9bb5cb; --primary:#ff7e22; --accent:#60a5fa; --shadow:0 18px 36px rgba(8,19,29,.34);
    }
    *{box-sizing:border-box}
    html{
      min-height:100%;
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.18), transparent 0 30%),
        radial-gradient(circle at 88% 14%, rgba(249, 115, 22, 0.16), transparent 0 34%),
        radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.08), transparent 0 38%),
        linear-gradient(180deg, #08111f 0%, #0b172a 52%, #09111d 100%);
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.18), transparent 0 30%),
        radial-gradient(circle at 88% 14%, rgba(249, 115, 22, 0.16), transparent 0 34%),
        radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.08), transparent 0 38%),
        linear-gradient(180deg, #08111f 0%, #0b172a 52%, #09111d 100%);
      color:var(--text);
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }
    .wrap{max-width:980px;margin:0 auto;padding:24px 16px 40px}
    .head{
      position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:14px;
      border:1px solid var(--line);border-radius:22px;background:var(--card);padding:24px;
      box-shadow:var(--shadow);
    }
    .head::before{
      content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,#ff5a1f 0%,#ff7e22 55%,#60a5fa 100%);
    }
    .title{margin:0;font-size:30px;font-weight:800;color:#f8fafc;font-family:Poppins,Inter,sans-serif;letter-spacing:-0.02em}
    .sub{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.7}
    .head-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .btn{
      border:1px solid rgba(255,126,34,.45);background:linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);color:#16325c;padding:11px 16px;border-radius:12px;
      text-decoration:none;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;
      box-shadow:0 12px 24px rgba(8,19,29,.24);transition:transform .18s ease,border-color .18s ease,background .18s ease,color .18s ease;
    }
    .btn:hover{transform:translateY(-1px);border-color:rgba(255,126,34,.55);background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(219,234,254,0.96) 100%);color:#16325c}
    .home-btn{
      background:linear-gradient(135deg,#ff5a1f 0%,#ff7e22 100%);border:1px solid rgba(255, 126, 34, 0.6);color:#fff;
      box-shadow:0 16px 28px rgba(255,90,31,.28);
    }
    .dashboard-btn{
      background:linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color:#16325c;border:1px solid rgba(255,126,34,.45);box-shadow:0 12px 24px rgba(8,19,29,.24)
    }
    .card{
      position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;
      box-shadow:var(--shadow);
    }
    .card::before{
      content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,#ff5a1f 0%,#ff7e22 55%,#60a5fa 100%);
    }
    .card h3{margin:0 0 10px 0;font-size:18px;color:#f8fafc;font-family:Poppins,Inter,sans-serif}
    .row{display:grid;grid-template-columns:180px 1fr;gap:10px;align-items:center;margin:10px 0}
    .row label{font-size:13px;color:#cbd5e1;font-weight:700}
    input,select{
      width:100%;border:1px solid var(--line-soft);border-radius:12px;padding:11px 12px;font-size:14px;outline:none;
      background:rgba(15, 23, 42, 0.78);color:#f8fafc;
    }
    input:focus,select:focus{border-color:rgba(56, 189, 248, 0.42);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
    input::placeholder{color:#94a3b8}
    .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap}
    .btn-primary{background:linear-gradient(135deg,#f97316 0%,#fb923c 100%);border-color:rgba(255, 126, 34, 0.6);color:#fff}
    @media(max-width:760px){
      .wrap{padding:12px 10px 18px}
      .head{flex-direction:column;align-items:flex-start;padding:20px 18px;border-radius:22px}
      .head-actions{width:100%}
      .title{font-size:24px}
      .sub{font-size:12px}
      .row{grid-template-columns:1fr}
      .actions .btn{width:100%;justify-content:center}
      .head-actions .btn{width:100%}
    }
    .head,
    .card,
    .btn,
    input,
    select {
      border-radius: 0 !important;
    }

<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Ayarlar</h1>
        <div class="sub">Hesap ve g�r�n�m tercihlerini buradan y�netebilirsin.</div>
      </div>
      <div class="head-actions">
        <a href="index.html" class="btn home-btn"><i class="fas fa-house"></i><span>Ana Sayfa</span></a>
        <a href="player-dashboard.html" class="btn dashboard-btn" id="dashboardBtn"><i class="fas fa-table-columns"></i><span>Dashboard</span></a>
      </div>
    </div>

    <div class="card">
      <h3>Hesap Ayarlari</h3>
      <div class="row"><label>G�r�nen Isim</label><input id="displayName" type="text" placeholder="G�r�nen isim"></div>
      <div class="row"><label>E-posta</label><input id="email" type="email" placeholder="mail@example.com"></div>
      <div class="row"><label>Dil</label>
        <select id="lang"><option value="tr">T�rk�e</option><option value="en">English</option></select>
      </div>
    </div>

    <div class="card">
      <h3>Uygulama Tercihleri</h3>
      <div class="row"><label>Bildirimler</label><select id="notify"><option value="on">A�ik</option><option value="off">Kapali</option></select></div>
      <div class="row"><label>Profil G�r�n�rl�g�</label><select id="visibility"><option value="public">Herkese A�ik</option><option value="private">Sadece Baglantilar</option></select></div>
      <div class="actions">
        <button class="btn" id="resetBtn">Sıfırla</button>
        <button class="btn btn-primary" id="saveBtn">Kaydet</button>
      </div>
    </div>

    <div class="card">
      <h3>??ifre Degistir</h3>
      <div class="row"><label>Mevcut ??ifre</label><input id="currentPassword" type="password" placeholder="Mevcut sifren"></div>
      <div class="row"><label>Yeni ??ifre</label><input id="newPassword" type="password" placeholder="En az 6 karakter"></div>
      <div class="row"><label>Yeni ??ifre (Tekrar)</label><input id="confirmPassword" type="password" placeholder="Yeni sifreyi tekrar yaz"></div>
      <div class="actions">
        <button class="btn btn-primary" id="changePasswordBtn">??ifreyi G�ncelle</button>
      </div>
    </div>
  </div>

  <script>
    const USER_RAW = localStorage.getItem('nextscout_user');
    const USER = USER_RAW ? JSON.parse(USER_RAW) : {};
    const USER_ROLE = String((localStorage.getItem('nextscout_user_role') || USER?.role || '')).trim().toLowerCase();
    const API_BASE=(function(){
      const p=new URLSearchParams(window.location.search);
      const q=(p.get('api_base')||'').trim();
      if(q) return q.replace(/\/$/,'');
      if(window.location.protocol==='file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    })();

    (function syncDashboardButton(){
      const btn = document.getElementById('dashboardBtn');
      if(!btn) return;
      if(USER_ROLE === 'manager'){ btn.href = 'manager-dashboard.html'; return; }
      if(USER_ROLE === 'team' || USER_ROLE === 'club'){ btn.href = 'team-dashboard.html'; return; }
      if(USER_ROLE === 'coach'){ btn.href = 'coach-dashboard.html'; return; }
      if(USER_ROLE === 'scout'){ btn.href = 'scout-dashboard.html'; return; }
      btn.href = 'player-dashboard.html';
    })();

    function getToken(){ return (localStorage.getItem('nextscout_token')||'').trim(); }
    function getHeaders(extra={}){
      const token=getToken();
      const h={Accept:'application/json',...extra};
      if(token && token!=='local-session-token') h.Authorization=`Bearer ${token}`;
      return h;
    }
    async function fetchJson(url,options={}){
      const response=await fetch(url,{...options,headers:getHeaders(options.headers||{})});
      const payload=await response.json().catch(()=>({}));
      if(!response.ok) throw new Error(payload?.message||`HTTP ${response.status}`);
      return payload;
    }

    async function load(){
      const token=getToken();
      if(!token || token==='local-session-token'){
        nsAlert('Ayarlar icin giris gerekli.');
        window.location.href='index.html';
        return;
      }
      const [mePayload, profilePayload, notifPayload]=await Promise.all([
        fetchJson(`${API_BASE}/auth/me`),
        fetchJson(`${API_BASE}/settings/profile`).catch(()=>null),
        fetchJson(`${API_BASE}/settings/notifications`).catch(()=>null)
      ]);

      const me=mePayload?.data||mePayload||{};
      const profile=profilePayload?.data||profilePayload||{};
      const notif=notifPayload?.data||notifPayload||{};

      document.getElementById('displayName').value=profile.display_name||profile.name||me.name||'';
      document.getElementById('email').value=profile.email||me.email||'';
      document.getElementById('lang').value=profile.lang||profile.language||'tr';
      document.getElementById('notify').value=(notif.enabled===false||notif.notifications===false)?'off':'on';
      document.getElementById('visibility').value=profile.visibility||'public';
    }

    async function save(){
      const data={
        display_name:document.getElementById('displayName').value.trim(),
        email:document.getElementById('email').value.trim(),
        language:document.getElementById('lang').value,
        visibility:document.getElementById('visibility').value
      };
      await fetchJson(`${API_BASE}/settings/profile`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
      });
      await fetchJson(`${API_BASE}/settings/notifications`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({enabled:document.getElementById('notify').value==='on'})
      });
      nsAlert('Ayarlar APIye kaydedildi.');
    }

    async function reset(){
      await load();
      nsAlert('Ayarlar APIden yeniden y�klendi.');
    }

    async function changePassword(){
      const current = document.getElementById('currentPassword').value;
      const next = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if(!current || !next || !confirm){
        nsAlert('L�tfen t�m sifre alanlarini doldur.');
        return;
      }
      if(next.length < 6){
        nsAlert('Yeni sifre en az 6 karakter olmali.');
        return;
      }
      if(next !== confirm){
        nsAlert('Yeni sifreler eslesmiyor.');
        return;
      }

      await fetchJson(`${API_BASE}/settings/password`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          current_password: current,
          new_password: next,
          new_password_confirmation: confirm
        })
      });
      document.getElementById('currentPassword').value='';
      document.getElementById('newPassword').value='';
      document.getElementById('confirmPassword').value='';
      nsAlert('??ifre APIde g�ncellendi.');
    }
    document.getElementById('saveBtn')?.addEventListener('click',()=>save().catch(e=>nsAlert(`Ayarlar kaydedilemedi: ${e.message}`)));
    document.getElementById('resetBtn')?.addEventListener('click',()=>reset().catch(e=>nsAlert(`Yukleme hatasi: ${e.message}`)));
    document.getElementById('changePasswordBtn')?.addEventListener('click',()=>changePassword().catch(e=>nsAlert(`??ifre g�ncellenemedi: ${e.message}`)));
    load().catch(e=>nsAlert(`Ayarlar alinamadi: ${e.message}`));
    function applyTurkishTextFixes(){
      document.title='Ayarlar - NextScout';
      const title=document.querySelector('.title');
      if(title) title.textContent='Ayarlar';
      const sub=document.querySelector('.sub');
      if(sub) sub.textContent='Hesap ve görünüm tercihlerini buradan yönetebilirsin.';
      const cardTitles=document.querySelectorAll('.card h3');
      if(cardTitles[0]) cardTitles[0].textContent='Hesap Ayarları';
      if(cardTitles[1]) cardTitles[1].textContent='Uygulama Tercihleri';
      if(cardTitles[2]) cardTitles[2].textContent='Şifre Değiştir';
      document.querySelectorAll('.row label').forEach((el)=>{
        el.textContent=(el.textContent||'')
          .replace(/Gï¿½rï¿½nen Isim/g,'Görünen İsim')
          .replace(/Tï¿½rkï¿½e/g,'Türkçe')
          .replace(/Aï¿½ik/g,'Açık')
          .replace(/Gï¿½rï¿½nï¿½rlï¿½gï¿½/g,'Görünürlüğü')
          .replace(/\?\?ifre/g,'Şifre')
          .replace(/Baglantilar/g,'Bağlantılar');
      });
      document.querySelectorAll('input,select').forEach((el)=>{
        if(el.placeholder){
          el.placeholder=el.placeholder
            .replace(/Gï¿½rï¿½nen/g,'Görünen')
            .replace(/sifre/g,'şifre')
            .replace(/Mevcut sifren/g,'Mevcut şifren')
            .replace(/Yeni sifreyi tekrar yaz/g,'Yeni şifreyi tekrar yaz');
        }
      });
      const resetBtn=document.getElementById('resetBtn');
      if(resetBtn) resetBtn.textContent='Sıfırla';
      const saveBtn=document.getElementById('saveBtn');
      if(saveBtn) saveBtn.textContent='Kaydet';
      const changePasswordBtn=document.getElementById('changePasswordBtn');
      if(changePasswordBtn) changePasswordBtn.textContent='Şifreyi Güncelle';
    }
    applyTurkishTextFixes();
    (function applyTurkishTextFixesFinal(){
      const title=document.querySelector('.title');
      if(title) title.textContent='Ayarlar';
      const sub=document.querySelector('.sub');
      if(sub) sub.textContent='Hesap ve g\u00f6r\u00fcn\u00fcm tercihlerini buradan y\u00f6netebilirsin.';
      const cardTitles=document.querySelectorAll('.card h3');
      if(cardTitles[0]) cardTitles[0].textContent='Hesap Ayarlar\u0131';
      if(cardTitles[1]) cardTitles[1].textContent='Uygulama Tercihleri';
      if(cardTitles[2]) cardTitles[2].textContent='\u015eifre De\u011fi\u015ftir';
      const labels=document.querySelectorAll('.row label');
      if(labels[0]) labels[0].textContent='G\u00f6r\u00fcnen \u0130sim';
      if(labels[1]) labels[1].textContent='E-posta';
      if(labels[2]) labels[2].textContent='Dil';
      if(labels[3]) labels[3].textContent='Bildirimler';
      if(labels[4]) labels[4].textContent='Profil G\u00f6r\u00fcn\u00fcrl\u00fc\u011f\u00fc';
      if(labels[5]) labels[5].textContent='Mevcut \u015eifre';
      if(labels[6]) labels[6].textContent='Yeni \u015eifre';
      if(labels[7]) labels[7].textContent='Yeni \u015eifre (Tekrar)';
      const resetBtn=document.getElementById('resetBtn');
      if(resetBtn) resetBtn.textContent='S\u0131f\u0131rla';
      const saveBtn=document.getElementById('saveBtn');
      if(saveBtn) saveBtn.textContent='Kaydet';
      const changePasswordBtn=document.getElementById('changePasswordBtn');
      if(changePasswordBtn) changePasswordBtn.textContent='\u015eifreyi G\u00fcncelle';
      const lang=document.getElementById('lang');
      if(lang && lang.options[0]) lang.options[0].text='T\u00fcrk\u00e7e';
      const notify=document.getElementById('notify');
      if(notify && notify.options[0]) notify.options[0].text='A\u00e7\u0131k';
      if(notify && notify.options[1]) notify.options[1].text='Kapal\u0131';
      const visibility=document.getElementById('visibility');
      if(visibility && visibility.options[0]) visibility.options[0].text='Herkese A\u00e7\u0131k';
      if(visibility && visibility.options[1]) visibility.options[1].text='Sadece Ba\u011flant\u0131lar';
      const displayName=document.getElementById('displayName');
      if(displayName) displayName.placeholder='G\u00f6r\u00fcnen isim';
      const currentPassword=document.getElementById('currentPassword');
      if(currentPassword) currentPassword.placeholder='Mevcut \u015fifren';
      const confirmPassword=document.getElementById('confirmPassword');
      if(confirmPassword) confirmPassword.placeholder='Yeni \u015fifreyi tekrar yaz';
    })();
  </script>
