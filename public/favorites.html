<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #08131d;
      --card: #0f1f2e;
      --line: #2b4660;
      --line-soft: #3f5f80;
      --text: #f5fbff;
      --muted: #9bb5cb;
      --primary: #60a5fa;
      --danger: #dc2626;
      --cta: #ff5a1f;
      --cta-2: #ff7e22;
      --shadow: 0 18px 36px rgba(8,19,29,.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      min-height:100vh;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      color: var(--text);
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .header {
      position:relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .header::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,var(--cta) 0%,var(--cta-2) 55%,#60a5fa 100%)}
    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      font-family:Poppins,Inter,sans-serif;
      color: #dbeafe;
    }
    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
    }
    .close-btn {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,126,34,.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      padding: 0;
      border-radius: 12px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(8,19,29,.24);
    }
    .btn {
      border: 1px solid rgba(255,126,34,.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content:center;
      gap: 7px;
      line-height:1;
      box-shadow:0 12px 24px rgba(8,19,29,.24);
    }
    .btn:hover{border-color:rgba(255,126,34,.6)}
    .btn-primary{background:linear-gradient(135deg,var(--cta) 0%,var(--cta-2) 100%);border-color:rgba(255,126,34,.6);color:#fff;box-shadow:0 16px 28px rgba(255,90,31,.28)}
    .toolbar {
      position:relative;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .toolbar::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,var(--cta) 0%,var(--cta-2) 55%,#60a5fa 100%)}
    .count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .btn-danger {
      color: #fff;
      border-color: rgba(220,38,38,.35);
      background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }
    .card {
      position:relative;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,var(--cta) 0%,var(--cta-2) 55%,#60a5fa 100%)}
    .card-photo {
      height: 136px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #16325c 0%, #1d4f91 100%);
      border-bottom: 1px solid var(--line);
      color: #dbeafe;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .content {
      padding: 12px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .name {
      font-size: 16px;
      font-weight: 800;
      margin: 0;
      color: #f8fafc;
    }
    .pos-tag {
      font-size: 10px;
      font-weight: 700;
      color: #dbeafe;
      border: 1px solid rgba(255,126,34,.32);
      background: rgba(255,126,34,.08);
      border-radius: 999px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .meta {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .chip {
      font-size: 10px;
      color: #dbeafe;
      background: rgba(255,126,34,.08);
      border: 1px solid rgba(255,126,34,.28);
      border-radius: 8px;
      padding: 2px 6px;
      font-weight: 700;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .actions button {
      flex: 1;
      border: 1px solid rgba(255,126,34,.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .actions .remove {
      background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
      color: #fff;
      border-color: rgba(220,38,38,.35);
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      font-weight: 600;
      box-shadow:var(--shadow);
    }
    .auth-gate {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      padding: 28px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-top: 10px;
    }
    .auth-gate h2 { margin: 0; font-size: 24px; color: #dbeafe; }
    .auth-gate p { margin: 10px 0 0; color: var(--muted); }
    .auth-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .auth-actions .btn { min-width: 130px; text-align: center; }
    @media (max-width: 768px) {
      .wrap { padding: 12px 10px 18px; }
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .title { font-size: 23px; }
      .sub { font-size: 12px; }
      .toolbar {
        padding: 10px;
        gap: 8px;
      }
      .btn {
        padding: 9px 12px;
      }
      .grid { grid-template-columns: 1fr; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .actions { grid-template-columns: 1fr; }
      .btn { width: 100%; justify-content: center; }
      .header .btn { width: auto; }
    }
  </style>

</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Favorilerim</h1>
        <div class="sub">Favoriye ekledigin oyuncular burada listelenir.</div>
      </div>
      <button type="button" class="close-btn" onclick="goBackFromFavorites()" aria-label="Kapat" title="Kapat">×</button>
    </div>

    <div class="toolbar">
      <span class="count" id="countText">0 oyuncu</span>
      <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i><span>T�m�n� Temizle</span></button>
    </div>

    <div id="list"></div>
    <div id="authGate" style="display:none;"></div>
  </div>

  <script>
    const VIEW_LABELS = {
      players: 'oyuncu',
      managers: 'menajer',
      scouts: 'scout',
      clubs: 'kulup'
    };
    const VIEW_TITLES = {
      players: 'Favori Oyuncular',
      managers: 'Favori Menajerler',
      scouts: 'Favori Scoutlar',
      clubs: 'Favori Kulupler'
    };
    const VIEW_SUBS = {
      players: 'Favoriye ekledigin oyuncular burada listelenir.',
      managers: 'Favoriye ekledigin menajerler burada listelenir.',
      scouts: 'Favoriye ekledigin scoutlar burada listelenir.',
      clubs: 'Favoriye ekledigin kulupler burada listelenir.'
    };

    function getFavoritesView() {
      try {
        const params = new URLSearchParams(window.location.search);
        const raw = (params.get('view') || 'players').trim().toLowerCase();
        return VIEW_LABELS[raw] ? raw : 'players';
      } catch (error) {
        return 'players';
      }
    }

    function getFavoritesStorageKey() {
      const view = getFavoritesView();
      const map = {
        players: 'nextscout_favorite_players',
        managers: 'nextscout_favorite_managers',
        scouts: 'nextscout_favorite_scouts',
        clubs: 'nextscout_favorite_clubs'
      };
      return map[view] || 'nextscout_favorite_players';
    }

    const KEY = getFavoritesStorageKey();
    const listEl = document.getElementById('list');
    const countText = document.getElementById('countText');
    const clearBtn = document.getElementById('clearBtn');
    const authGate = document.getElementById('authGate');
    const toolbarEl = document.querySelector('.toolbar');
    const dashboardBtn = document.getElementById('dashboardBtn');

    function goBackFromFavorites() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.href = 'index.html';
    }

    function getUserRole() {
      const roleRaw = (localStorage.getItem('nextscout_user_role') || '').trim().toLowerCase();
      if (roleRaw) return roleRaw;
      try {
        const raw = localStorage.getItem('nextscout_user');
        const user = raw ? JSON.parse(raw) : null;
        return String(user?.role || '').trim().toLowerCase();
      } catch (error) {
        return '';
      }
    }

    function getDashboardHref(role) {
      const normalized = String(role || '').trim().toLowerCase();
      if (normalized === 'manager') return 'manager-dashboard.html';
      if (normalized === 'team' || normalized === 'club') return 'team-dashboard.html';
      if (normalized === 'coach') return 'coach-dashboard.html';
      if (normalized === 'scout') return 'scout-dashboard.html';
      return 'player-dashboard.html';
    }

    function isAuthenticated() {
      const token = (localStorage.getItem('nextscout_token') || '').trim();
      const userRaw = (localStorage.getItem('nextscout_user') || '').trim();
      return Boolean(token || userRaw);
    }

    function showAuthGate() {
      if (toolbarEl) toolbarEl.style.display = 'none';
      listEl.style.display = 'none';
      authGate.style.display = 'block';
      authGate.innerHTML = `
        <div class="auth-gate">
          <h2>Favorileri G�rmek I�in �ye Ol</h2>
          <p>Favori oyuncu, ilan ve takip listesini g�rmek i�in �nce giris yapmalisin.</p>
          <div class="auth-actions">
            <a class="btn" href="#" onclick="goLogin();return false;">Giris Yap</a>
            <a class="btn" href="#" onclick="goRegister();return false;">�ye Ol</a>
          </div>
        </div>
      `;
    }

    function goLogin() {
      localStorage.setItem('nextscout_open_login', '1');
      window.location.href = 'index.html';
    }

    function goRegister() {
      localStorage.setItem('nextscout_open_register', '1');
      window.location.href = 'index.html';
    }

    function loadFavorites() {
      try {
        const raw = localStorage.getItem(KEY);
        const data = raw ? JSON.parse(raw) : [];
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function saveFavorites(items) {
      localStorage.setItem(KEY, JSON.stringify(items));
    }

    function render() {
      const items = loadFavorites();
      const view = getFavoritesView();
      const label = VIEW_LABELS[view] || 'oyuncu';
      countText.textContent = `${items.length} ${label}`;

      if (!items.length) {
        listEl.innerHTML = `<div class="empty">Henuz favori ${label} eklenmedi.</div>`;
        return;
      }

      listEl.innerHTML = `
        <div class="grid">
          ${items.map(p => `
            <div class="card">
              <div class="card-photo">${((p.name || 'O').split(' ').map(s => s[0] || '').join('').slice(0,2) || 'OY').toUpperCase()}</div>
              <div class="content">
                <div class="top">
                  <h3 class="name">${p.name || '-'}</h3>
                  <span class="pos-tag">${p.position || '-'}</span>
                </div>
                <div class="meta">${p.club || '-'} � ${p.league || '-'}</div>
                <div class="stats">
                  <span class="chip">Yas ${p.age || '-'}</span>
                  <span class="chip">Boy ${p.height || '-'} cm</span>
                  <span class="chip">Favori ${p.rating || 0}</span>
                </div>
                <div class="actions">
                  <button onclick="contact('${p.id}')"><i class="fas fa-comments"></i> Iletisim</button>
                  <button class="remove" onclick="removeFav('${p.id}')"><i class="fas fa-xmark"></i> Kaldir</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function removeFav(id) {
      const items = loadFavorites().filter(x => String(x.id) !== String(id));
      saveFavorites(items);
      render();
    }

    function contact(id) {
      const item = loadFavorites().find(x => String(x.id) === String(id));
      if (!item) return;
      nsAlert(`${item.name} ile iletisim baslatiliyor...`);
    }

    clearBtn.addEventListener('click', () => {
      if (!confirm('T�m favorileri silmek istedigine emin misin?')) return;
      saveFavorites([]);
      render();
    });

    if (!isAuthenticated()) {
      showAuthGate();
    } else {
      render();
    }
    function showAuthGateFixed() {
      if (toolbarEl) toolbarEl.style.display = 'none';
      listEl.style.display = 'none';
      authGate.style.display = 'block';
      authGate.innerHTML = `
        <div class="auth-gate">
          <h2>Favorileri Görmek İçin Üye Ol</h2>
          <p>Favori oyuncu, ilan ve takip listesini görmek için önce giriş yapmalısın.</p>
          <div class="auth-actions">
            <a class="btn" href="#" onclick="goLogin();return false;">Giriş Yap</a>
            <a class="btn" href="#" onclick="goRegister();return false;">Üye Ol</a>
          </div>
        </div>
      `;
    }

    function applyTurkishTextFixes() {
      document.title = 'Favorilerim - NextScout';
      const sub = document.querySelector('.sub');
      if (sub) sub.textContent = 'Favoriye eklediğin oyuncular burada listelenir.';
      const clearSpan = document.querySelector('#clearBtn span');
      if (clearSpan) clearSpan.textContent = 'Tümünü Temizle';
      if (dashboardBtn) dashboardBtn.setAttribute('href', getDashboardHref(getUserRole()));
    }

    function applyFavoritesViewPresentation() {
      const view = getFavoritesView();
      document.title = `${VIEW_TITLES[view] || 'Favorilerim'} - NextScout`;
      const title = document.querySelector('.title');
      if (title) title.textContent = VIEW_TITLES[view] || 'Favorilerim';
      const sub = document.querySelector('.sub');
      if (sub) sub.textContent = VIEW_SUBS[view] || 'Favoriye ekledigin oyuncular burada listelenir.';
      const clearSpan = document.querySelector('#clearBtn span');
      if (clearSpan) clearSpan.textContent = 'Tumunu Temizle';
    }

    contact = function(id) {
      const item = loadFavorites().find(x => String(x.id) === String(id));
      if (!item) return;
      nsAlert(`${item.name} ile iletişim başlatılıyor...`);
    };

    const freshClearBtn = clearBtn ? clearBtn.cloneNode(true) : null;
    if (freshClearBtn && clearBtn?.parentNode) {
      clearBtn.parentNode.replaceChild(freshClearBtn, clearBtn);
      freshClearBtn.onclick = () => {
        if (!confirm('Tüm favorileri silmek istediğine emin misin?')) return;
        saveFavorites([]);
        render();
      };
    }

    applyTurkishTextFixes();
    applyFavoritesViewPresentation();
    isAuthenticated = function() { return true; };
    showAuthGate = function() {
      if (toolbarEl) toolbarEl.style.display = '';
      listEl.style.display = '';
      if (authGate) authGate.style.display = 'none';
    };
    showAuthGateFixed = function() {
      if (toolbarEl) toolbarEl.style.display = '';
      listEl.style.display = '';
      if (authGate) authGate.style.display = 'none';
    };
    if (authGate) authGate.style.display = 'none';
    render();

    function getApiBaseUrl() {
      const query = new URLSearchParams(window.location.search);
      const fromQuery = (query.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function getLeaderboardRole() {
      const view = getFavoritesView();
      const map = {
        players: 'player',
        managers: 'manager',
        scouts: 'scout',
        clubs: 'club'
      };
      return map[view] || 'player';
    }

    function mapLeaderboardRow(row) {
      return {
        id: row?.id || '',
        name: row?.name || '-',
        position: row?.position || row?.role_type || row?.role || '-',
        club: row?.club || row?.organization || row?.name || '-',
        league: row?.league || row?.city || '-',
        age: row?.age || '-',
        height: row?.height || row?.experience_years || '-',
        rating: row?.favorites_count || 0
      };
    }

    async function loadFavoritesLeaderboard() {
      try {
        const apiBase = getApiBaseUrl();
        const role = getLeaderboardRole();
        const response = await fetch(`${apiBase}/public/favorites/leaderboard?role=${encodeURIComponent(role)}&limit=24`, {
          headers: { Accept: 'application/json' }
        });
        if (!response.ok) return;
        const payload = await response.json();
        const rows = Array.isArray(payload?.data) ? payload.data : [];
        if (!rows.length) return;
        saveFavorites(rows.map(mapLeaderboardRow));
        render();
      } catch (error) {}
    }

    loadFavoritesLeaderboard();
  </script>
    <script src="assets/js/core-stability.js"></script>

</body>
