<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorilerim - NextScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #08131d;
      --panel: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --line: #2b4660;
      --text: #f5fbff;
      --muted: #9bb5cb;
      --accent: #ff7e22;
      --accent-strong: #ff5a1f;
      --chip: rgba(255, 255, 255, 0.06);
      --danger: #dc2626;
      --shadow: 0 18px 36px rgba(8, 19, 29, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }

    .wrap {
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      max-width: 760px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      margin-top: 0;
    }

    .toolbar,
    .quick-lists,
    .summary-bar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .toolbar::before,
    .quick-lists::before,
    .summary-bar::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .toolbar-input,
    .toolbar-select {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255, 126, 34, 0.24);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .toolbar-input {
      min-width: 220px;
    }

    .toolbar-select {
      min-width: 190px;
    }

    .toolbar-select option {
      color: #081421;
    }

    .btn {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255, 126, 34, 0.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24);
    }

    .btn.btn-primary {
      background: linear-gradient(135deg, var(--accent-strong) 0%, var(--accent) 100%);
      color: #fff;
      border-color: rgba(255, 126, 34, 0.6);
      box-shadow: 0 16px 28px rgba(255, 90, 31, 0.28);
    }

    .btn.btn-danger {
      background: linear-gradient(135deg, #b91c1c 0%, var(--danger) 100%);
      border-color: rgba(248, 113, 113, 0.28);
      color: #fff;
    }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .summary-card {
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--panel-soft);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .summary-card strong {
      display: block;
      font-size: 24px;
      margin-bottom: 6px;
    }

    .summary-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .quick-lists {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .quick-chip {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .quick-chip strong {
      color: #9cc6ff;
      font-size: 12px;
    }

    .quick-chip.active {
      background: linear-gradient(135deg, rgba(255, 126, 34, 0.22) 0%, rgba(255, 126, 34, 0.08) 100%);
      border-color: rgba(255, 126, 34, 0.38);
      color: #fff3e8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 18px 0;
    }

    .card-photo {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: linear-gradient(135deg, #16325c 0%, #1d4f91 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .content {
      padding: 16px 18px 18px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .name {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    .pos-tag,
    .list-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pos-tag {
      background: rgba(59, 130, 246, 0.16);
      color: #bdddff;
      border: 1px solid rgba(59, 130, 246, 0.26);
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .chip {
      min-height: 30px;
      border-radius: 999px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      background: var(--chip);
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: #d7e7ff;
      font-size: 12px;
      font-weight: 700;
    }

    .list-badge {
      background: rgba(255, 126, 34, 0.14);
      border: 1px solid rgba(255, 126, 34, 0.24);
      color: #ffd6b5;
    }

    .assign-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions button {
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255, 126, 34, 0.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .actions .remove {
      background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
      border-color: rgba(248, 113, 113, 0.24);
      color: #fff;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      box-shadow: var(--shadow);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .summary-bar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100% - 20px, 100%);
        padding-top: 14px;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar-group,
      .assign-row,
      .actions {
        grid-template-columns: 1fr;
      }

      .toolbar-group {
        width: 100%;
      }

      .toolbar-input,
      .toolbar-select,
      .btn,
      .actions button {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .summary-bar {
        grid-template-columns: 1fr;
      }
    }

    .header,
    .toolbar,
    .summary-bar,
    .quick-lists,
    .card,
    .btn,
    .actions button,
    .toolbar-input,
    .toolbar-select,
    .empty {
      border-radius: 0 !important;
    }
  </style>
  <link rel="stylesheet" href="assets/css/mobile-unified.css">
  <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Favorilerim</h1>
        <div class="sub">Favorilerini listelere ayir, hizli erisim sagla ve tum rollerde ayni mantikla yonet.</div>
      </div>
      <div class="header-actions">
        <a class="btn btn-primary" href="index.html"><i class="fas fa-house"></i><span>Ana Sayfa</span></a>
        <button type="button" class="btn" onclick="goBackFromFavorites()" aria-label="Geri Don" title="Geri Don"><i class="fas fa-arrow-left"></i><span>Geri Don</span></button>
      </div>
    </div>

    <div class="toolbar" id="toolbar">
      <span class="count" id="countText">0 kayit</span>
      <div class="toolbar-group">
        <input type="text" class="toolbar-input" id="newListName" placeholder="Orn: Izmir U19">
        <button type="button" class="btn" id="createListBtn"><i class="fas fa-plus"></i><span>Liste Olustur</span></button>
      </div>
      <div class="toolbar-group">
        <select class="toolbar-select" id="listFilter">
          <option value="all">Tum Favoriler</option>
        </select>
        <button type="button" class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i><span>Tumunu Temizle</span></button>
      </div>
    </div>

    <div class="summary-bar" id="summaryBar"></div>
    <div class="quick-lists" id="quickLists"></div>
    <div id="list"></div>
    <div id="authGate" style="display:none;"></div>
  </div>

  <script>
    const VIEW_LABELS = {
      players: 'oyuncu',
      managers: 'menajer',
      scouts: 'scout',
      clubs: 'kulup'
    };
    const VIEW_TITLES = {
      players: 'Favori Oyuncular',
      managers: 'Favori Menajerler',
      scouts: 'Favori Scoutlar',
      clubs: 'Favori Kulupler'
    };
    const VIEW_SUBS = {
      players: 'Favoriye ekledigin oyunculari listelere ayir, transfer ya da takip odakli klasorler olustur.',
      managers: 'Favoriye ekledigin menajerleri listelere ayir ve hizli erisim sagla.',
      scouts: 'Favoriye ekledigin scoutlari listelere ayir ve hizli erisim sagla.',
      clubs: 'Favoriye ekledigin kulupleri listelere ayir ve hizli erisim sagla.'
    };

    function getFavoritesView() {
      try {
        const params = new URLSearchParams(window.location.search);
        const raw = (params.get('view') || 'players').trim().toLowerCase();
        return VIEW_LABELS[raw] ? raw : 'players';
      } catch (error) {
        return 'players';
      }
    }

    function getFavoritesStorageKey(view) {
      const map = {
        players: 'nextscout_favorites',
        managers: 'nextscout_manager_favorites',
        scouts: 'nextscout_scout_favorites',
        clubs: 'nextscout_club_favorites'
      };
      return map[view] || 'nextscout_favorites';
    }

    const view = getFavoritesView();
    const LISTS_KEY = `nextscout_favorite_lists_${view}`;
    const ASSIGNMENTS_KEY = `nextscout_favorite_list_assignments_${view}`;
    let favoriteState = [];

    const countText = document.getElementById('countText');
    const listEl = document.getElementById('list');
    const summaryBar = document.getElementById('summaryBar');
    const quickLists = document.getElementById('quickLists');
    const listFilter = document.getElementById('listFilter');
    const clearBtn = document.getElementById('clearBtn');
    const createListBtn = document.getElementById('createListBtn');
    const newListNameInput = document.getElementById('newListName');
    let activeListId = 'all';

    function safeAlert(message) {
      if (typeof window.nsAlert === 'function') {
        window.nsAlert(message);
        return;
      }
      window.alert(message);
    }

    function goBackFromFavorites() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.href = 'index.html';
    }

    function getApiBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        const parsed = raw ? JSON.parse(raw) : fallback;
        if (Array.isArray(fallback)) return Array.isArray(parsed) ? parsed : fallback;
        return parsed && typeof parsed === 'object' ? parsed : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function getAuthHeaders() {
      const headers = { Accept: 'application/json' };
      const token = getToken();
      if (token) headers.Authorization = `Bearer ${token}`;
      return headers;
    }

    function loadFavorites() {
      return Array.isArray(favoriteState) ? favoriteState : [];
    }

    function saveFavorites(items) {
      favoriteState = Array.isArray(items) ? items : [];
    }

    function loadLists() {
      return loadJson(LISTS_KEY, []);
    }

    function saveLists(items) {
      saveJson(LISTS_KEY, items);
    }

    function loadAssignments() {
      return loadJson(ASSIGNMENTS_KEY, {});
    }

    function saveAssignments(items) {
      saveJson(ASSIGNMENTS_KEY, items);
    }

    function normalizeListName(value) {
      return String(value || '').trim().replace(/\s+/g, ' ');
    }

    function getListName(listId) {
      if (!listId) return '';
      const found = loadLists().find((entry) => String(entry.id) === String(listId));
      return found ? found.name : '';
    }

    function getRenderedFavorites() {
      const assignments = loadAssignments();
      return loadFavorites().map((item) => {
        const listId = assignments[String(item.id)] || item.listId || '';
        return {
          ...item,
          listId,
          listName: getListName(listId)
        };
      });
    }

    function createList(name) {
      const normalized = normalizeListName(name);
      if (!normalized) {
        safeAlert('Liste ismi gir.');
        return;
      }
      const lists = loadLists();
      if (lists.some((entry) => entry.name.toLowerCase() === normalized.toLowerCase())) {
        safeAlert('Bu isimde bir liste zaten var.');
        return;
      }
      const newList = {
        id: `list_${Date.now()}`,
        name: normalized,
        createdAt: new Date().toISOString()
      };
      lists.unshift(newList);
      saveLists(lists);
      activeListId = newList.id;
      newListNameInput.value = '';
      render();
    }

    function setFavoriteList(id, listId) {
      const assignments = loadAssignments();
      if (listId) assignments[String(id)] = listId;
      else delete assignments[String(id)];
      saveAssignments(assignments);
      render();
    }

    async function removeFavorite(id) {
      const item = loadFavorites().find((entry) => String(entry.id) === String(id));
      if (!item?.targetUserId) return;
      try {
        await fetch(`${getApiBaseUrl()}/favorites/${encodeURIComponent(item.targetUserId)}/toggle`, {
          method: 'POST',
          headers: getAuthHeaders()
        });
      } catch (error) {
        safeAlert('Favori kaldirilamadi.');
        return;
      }
      const nextItems = loadFavorites().filter((entry) => String(entry.id) !== String(id));
      const assignments = loadAssignments();
      delete assignments[String(id)];
      saveFavorites(nextItems);
      saveAssignments(assignments);
      render();
    }

    function contactFavorite(id) {
      const item = getRenderedFavorites().find((entry) => String(entry.id) === String(id));
      if (!item) return;
      safeAlert(`${item.name} ile iletisim baslatiliyor...`);
    }

    function applyPresentation() {
      document.title = `${VIEW_TITLES[view] || 'Favorilerim'} - NextScout`;
      const title = document.querySelector('.title');
      if (title) title.textContent = VIEW_TITLES[view] || 'Favorilerim';
      const sub = document.querySelector('.sub');
      if (sub) sub.textContent = VIEW_SUBS[view] || 'Favorilerini listelere ayir ve hizli erisim sagla.';
    }

    function renderSummary(allItems) {
      const lists = loadLists();
      const assignedCount = allItems.filter((entry) => entry.listId).length;
      const summaryItems = [
        { value: allItems.length, label: 'Toplam favori' },
        { value: lists.length, label: 'Olusturulan liste' },
        { value: assignedCount, label: 'Listeye alinan' },
        { value: allItems.length - assignedCount, label: 'Hizli karar bekleyen' }
      ];
      summaryBar.innerHTML = summaryItems.map((item) => `
        <div class="summary-card">
          <strong>${item.value}</strong>
          <span>${item.label}</span>
        </div>
      `).join('');
    }

    function renderFilterOptions(allItems) {
      const lists = loadLists();
      listFilter.innerHTML = [
        '<option value="all">Tum Favoriler</option>',
        '<option value="unlisted">Listeye Ayrilmayanlar</option>',
        ...lists.map((entry) => `<option value="${entry.id}">${entry.name}</option>`)
      ].join('');

      if (
        activeListId !== 'all' &&
        activeListId !== 'unlisted' &&
        !lists.some((entry) => String(entry.id) === String(activeListId))
      ) {
        activeListId = 'all';
      }

      listFilter.value = activeListId;
      countText.textContent = `${allItems.length} ${VIEW_LABELS[view] || 'kayit'}`;
    }

    function renderQuickLists(allItems) {
      const lists = loadLists();
      const quickItems = [
        { id: 'all', name: 'Tum Favoriler', count: allItems.length },
        { id: 'unlisted', name: 'Listeye Ayrilmayanlar', count: allItems.filter((entry) => !entry.listId).length },
        ...lists.map((entry) => ({
          id: entry.id,
          name: entry.name,
          count: allItems.filter((item) => String(item.listId) === String(entry.id)).length
        }))
      ];

      quickLists.innerHTML = quickItems.map((item) => `
        <button type="button" class="quick-chip ${activeListId === item.id ? 'active' : ''}" data-list-id="${item.id}">
          <span>${item.name}</span>
          <strong>${item.count}</strong>
        </button>
      `).join('');

      quickLists.querySelectorAll('[data-list-id]').forEach((button) => {
        button.addEventListener('click', () => {
          activeListId = button.getAttribute('data-list-id') || 'all';
          render();
        });
      });
    }

    function filterFavorites(items) {
      if (activeListId === 'all') return items;
      if (activeListId === 'unlisted') return items.filter((entry) => !entry.listId);
      return items.filter((entry) => String(entry.listId) === String(activeListId));
    }

    function buildAssignOptions(selectedId) {
      return [
        '<option value="">Liste Sec</option>',
        ...loadLists().map((entry) => `<option value="${entry.id}" ${String(selectedId) === String(entry.id) ? 'selected' : ''}>${entry.name}</option>`)
      ].join('');
    }

    function getInitials(name) {
      return ((name || 'O').split(' ').map((part) => part[0] || '').join('').slice(0, 2) || 'OY').toUpperCase();
    }

    function renderFavorites() {
      const allItems = getRenderedFavorites();
      const filteredItems = filterFavorites(allItems);

      renderSummary(allItems);
      renderFilterOptions(allItems);
      renderQuickLists(allItems);

      if (!filteredItems.length) {
        listEl.innerHTML = `<div class="empty">${activeListId === 'all' ? 'Henuz favori kaydi yok.' : 'Bu listede henuz kayit yok.'}</div>`;
        return;
      }

      listEl.innerHTML = `
        <div class="grid">
          ${filteredItems.map((item) => `
            <div class="card">
              <div class="card-head">
                <div class="card-photo">${getInitials(item.name)}</div>
                <div>
                  <div class="top">
                    <h3 class="name">${item.name || '-'}</h3>
                    <span class="pos-tag">${item.position || item.role || '-'}</span>
                  </div>
                  <div class="meta">${item.club || item.organization || '-'} • ${item.league || item.city || '-'}</div>
                </div>
              </div>
              <div class="content">
                <div class="stats">
                  <span class="chip">Yas ${item.age || '-'}</span>
                  <span class="chip">Boy ${item.height || '-'}</span>
                  <span class="chip">Favori ${item.rating || 0}</span>
                  ${item.listName ? `<span class="list-badge">${item.listName}</span>` : ''}
                </div>
                <div class="assign-row">
                  <select class="toolbar-select" data-assign-id="${item.id}">
                    ${buildAssignOptions(item.listId)}
                  </select>
                  <button type="button" class="btn" data-save-id="${item.id}">
                    <i class="fas fa-layer-group"></i><span>Listeye Kaydet</span>
                  </button>
                </div>
                <div class="actions">
                  <button type="button" onclick="contactFavorite('${item.id}')"><i class="fas fa-comments"></i> Iletisim</button>
                  <button type="button" class="remove" onclick="removeFavorite('${item.id}')"><i class="fas fa-xmark"></i> Kaldir</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      listEl.querySelectorAll('[data-save-id]').forEach((button) => {
        button.addEventListener('click', () => {
          const favoriteId = button.getAttribute('data-save-id');
          const select = listEl.querySelector(`[data-assign-id="${favoriteId}"]`);
          setFavoriteList(favoriteId, select ? select.value : '');
        });
      });
    }

    function getLeaderboardRole() {
      const map = {
        players: 'player',
        managers: 'manager',
        scouts: 'scout',
        clubs: 'club'
      };
      return map[view] || 'player';
    }

    function mapLeaderboardRow(row) {
      return {
        id: row?.id || '',
        targetUserId: row?.id || '',
        name: row?.name || '-',
        position: row?.position || row?.role_type || row?.role || '-',
        club: row?.club || row?.organization || row?.name || '-',
        league: row?.league || row?.city || '-',
        age: row?.age || '-',
        height: row?.height || row?.experience_years || '-',
        rating: row?.favorites_count || 0
      };
    }

    function mapFavoriteRow(row) {
      const target = row?.target_user || row?.targetUser || {};
      return {
        id: target?.id || row?.target_user_id || row?.id || '',
        targetUserId: target?.id || row?.target_user_id || '',
        name: target?.name || '-',
        position: target?.position || target?.role || '-',
        club: target?.club || target?.organization || target?.name || '-',
        league: target?.league || target?.city || '-',
        age: target?.age || '-',
        height: target?.height || '-',
        rating: target?.rating || 0,
        role: target?.role || '-',
        city: target?.city || '-',
      };
    }

    async function loadFavoritesFromApi() {
      if (!getToken()) return false;
      try {
        const response = await fetch(`${getApiBaseUrl()}/favorites`, {
          headers: getAuthHeaders()
        });
        if (!response.ok) return false;
        const payload = await response.json();
        const rows = Array.isArray(payload?.data?.data) ? payload.data.data : [];
        saveFavorites(rows.map(mapFavoriteRow));
        return true;
      } catch (error) {
        return false;
      }
    }

    async function loadFavoritesLeaderboard() {
      try {
        if (loadFavorites().length) return;
        const response = await fetch(`${getApiBaseUrl()}/public/favorites/leaderboard?role=${encodeURIComponent(getLeaderboardRole())}&limit=24`, {
          headers: { Accept: 'application/json' }
        });
        if (!response.ok) return;
        const payload = await response.json();
        const rows = Array.isArray(payload?.data) ? payload.data : [];
        if (!rows.length) return;
        saveFavorites(rows.map(mapLeaderboardRow));
        render();
      } catch (error) {}
    }

    function render() {
      renderFavorites();
    }

    createListBtn.addEventListener('click', () => createList(newListNameInput.value));
    newListNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        createList(newListNameInput.value);
      }
    });
    listFilter.addEventListener('change', () => {
      activeListId = listFilter.value || 'all';
      render();
    });
    clearBtn.addEventListener('click', () => {
      if (!window.confirm('Tum favorileri silmek istedigine emin misin?')) return;
      saveFavorites([]);
      saveAssignments({});
      activeListId = 'all';
      render();
    });

    window.goBackFromFavorites = goBackFromFavorites;
    window.removeFavorite = removeFavorite;
    window.contactFavorite = contactFavorite;

    async function initializeFavoritesPage() {
      applyPresentation();
      const loadedFromApi = await loadFavoritesFromApi();
      render();
      if (!loadedFromApi) {
        loadFavoritesLeaderboard();
      }
    }

    initializeFavoritesPage();
  </script>
  <script src="assets/js/core-stability.js"></script>
  <script src="assets/js/mobile-professional.js" defer></script>
</body>
</html>
