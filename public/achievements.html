<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Başarılarım - NextScout</title>
    <meta name="description" content="NextScout achievements sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://nextscout.pro/achievements.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="NextScout">
    <meta property="og:title" content="Başarılarım - NextScout">
    <meta property="og:description" content="NextScout achievements sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta property="og:url" content="https://nextscout.pro/achievements.html">
    <meta property="og:image" content="https://nextscout.pro/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Başarılarım - NextScout">
    <meta name="twitter:description" content="NextScout achievements sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta name="twitter:image" content="https://nextscout.pro/assets/img/og-default.jpg">
    <meta name="theme-color" content="#0B3B8A">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #fff;
      --line: #dbeafe;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --gold: #d97706;
      --shadow: 0 10px 28px rgba(37, 99, 235, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .title { margin: 0; font-size: 30px; font-weight: 800; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--primary);
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .sum-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .sum-k { font-size: 12px; color: var(--muted); font-weight: 700; }
    .sum-v { margin-top: 6px; font-size: 24px; font-weight: 800; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }
    .badge {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: var(--gold);
    }
    .name { font-size: 17px; font-weight: 800; margin: 0; }
    .desc { color: #374151; font-size: 13px; line-height: 1.55; }
    .meta { color: var(--muted); font-size: 12px; font-weight: 700; }
    .empty {
      border: 1px dashed #bfdbfe;
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      font-weight: 600;
    }

    @media (max-width: 920px) {
      .summary { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      .summary { grid-template-columns: 1fr; }
      .title { font-size: 24px; }
    }
  </style>
    <link rel="stylesheet" href="assets/css/mobile-unified.css">
    <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Başarılarım</h1>
        <div class="sub">Sezon boyunca kazandığın bireysel ve takım başarıları.</div>
      </div>
      <a href="DASHBOARD_DESIGN.html" class="btn">← Dashboard</a>
    </div>

    <div class="summary" id="summary"></div>
    <div id="list"></div>
  </div>

  <script>
    const profileRaw = localStorage.getItem('playerProfile');
    let p = {};
    try { p = profileRaw ? JSON.parse(profileRaw) : {}; } catch { p = {}; }

    const goals = Number(p.goals || 15);
    const assists = Number(p.assists || 6);
    const rating = Number(p.rating || 4.8);
    const matches = Number(p.matches || 28);

    const baseAchievements = [
      {
        icon: '🏆',
        title: 'Lig Şampiyonu',
        desc: 'Sezon sonunda takımınla birlikte ligi şampiyon tamamladın.',
        date: '2026 Sezonu'
      },
      {
        icon: '⚽',
        title: 'Gol Katkısı Lideri',
        desc: `Toplam ${goals} gol ve ${assists} asist ile hücum katkısında öne çıktın.`,
        date: 'Son 12 Ay'
      },
      {
        icon: '⭐',
        title: 'Haftanın 11\'i',
        desc: `Ortalama ${rating.toFixed(1)} rating ile haftanın 11\'ine seçildin.`,
        date: '3 Kez'
      },
      {
        icon: '📈',
        title: 'Form İstikrarı',
        desc: `${matches} maçta düzenli forma giyerek performans istikrarı sağladın.`,
        date: 'Sezon Geneli'
      }
    ];

    const summaryEl = document.getElementById('summary');
    summaryEl.innerHTML = `
      <div class="sum-card"><div class="sum-k">Toplam Başarı</div><div class="sum-v">${baseAchievements.length}</div></div>
      <div class="sum-card"><div class="sum-k">Öne Çıkan Gol</div><div class="sum-v">${goals}</div></div>
      <div class="sum-card"><div class="sum-k">Öne Çıkan Asist</div><div class="sum-v">${assists}</div></div>
      <div class="sum-card"><div class="sum-k">Ortalama Rating</div><div class="sum-v">${rating.toFixed(1)}</div></div>
    `;

    const listEl = document.getElementById('list');
    if (!baseAchievements.length) {
      listEl.innerHTML = '<div class="empty">Henüz başarı eklenmedi.</div>';
    } else {
      listEl.innerHTML = `
        <div class="grid">
          ${baseAchievements.map(a => `
            <article class="card">
              <div class="badge">${a.icon}</div>
              <h3 class="name">${a.title}</h3>
              <div class="desc">${a.desc}</div>
              <div class="meta">${a.date}</div>
            </article>
          `).join('')}
        </div>
      `;
    }
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
</html>
