  <style>
    :root {
      --bg: #07111f;
      --card: linear-gradient(180deg, rgba(12, 21, 38, 0.94), rgba(9, 16, 29, 0.9));
      --line: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --muted: #b8c4d9;
      --primary: #f97316;
      --primary-2: #fb923c;
      --accent: #38bdf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --shadow: 0 24px 60px rgba(2, 8, 23, 0.42);
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.18), transparent 0 30%),
        radial-gradient(circle at 88% 14%, rgba(249, 115, 22, 0.16), transparent 0 34%),
        radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.08), transparent 0 38%),
        linear-gradient(180deg, #08111f 0%, #0b172a 52%, #09111d 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.18), transparent 0 30%),
        radial-gradient(circle at 88% 14%, rgba(249, 115, 22, 0.16), transparent 0 34%),
        radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.08), transparent 0 38%),
        linear-gradient(180deg, #08111f 0%, #0b172a 52%, #09111d 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      color: var(--text);
    }
    .wrap {
      position: relative;
      max-width: 1150px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .header {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 16px;
      padding: 28px 30px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(10, 18, 32, 0.92));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }
    .header::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
    .title { margin: 0; font-size: 32px; font-weight: 800; font-family: Poppins, Inter, sans-serif; letter-spacing: -0.02em; }
    .subtitle { margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(148, 163, 184, 0.12);
      color: #e2e8f0;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
      box-shadow: 0 16px 36px rgba(2, 8, 23, 0.25);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(56, 189, 248, 0.4); background: rgba(148, 163, 184, 0.2); color: #fff; }
    .btn-primary {
      border-color: rgba(249, 115, 22, 0.38);
      background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
      color: #fff7ed;
    }
    .btn-primary:hover { border-color: rgba(251, 146, 60, 0.62); background: linear-gradient(135deg, #ea580c 0%, #f97316 100%); }
    .btn-secondary {
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      border: 1px solid rgba(255,126,34,.45);
      box-shadow: 0 12px 24px rgba(8,19,29,.24);
    }
    .btn-secondary:hover {
      color: #102746;
      border-color: rgba(255,126,34,.6);
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(219,234,254,0.96) 100%);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(16px);
    }
    .card::before,
    .chart-wrap::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, rgba(249, 115, 22, 0.95), rgba(56, 189, 248, 0.95));
    }
    .k { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .v { margin-top: 6px; font-size: 28px; font-weight: 800; }
    .delta { margin-top: 6px; font-size: 12px; font-weight: 700; }
    .up { color: var(--green); }
    .mid { color: var(--amber); }
    .panel {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }
    .chart-wrap {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(16px);
    }
    .panel-title {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 800;
      font-family: Poppins, Inter, sans-serif;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .row {
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }
    .row .rk { color: var(--muted); }
    .row .rv { font-weight: 700; }
    canvas {
      width: 100%;
      height: 260px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.92) 0%, rgba(17, 24, 39, 0.96) 100%);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .panel { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .title { font-size: 24px; }
      .wrap { padding: 14px 10px 28px; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; padding: 20px 18px; border-radius: 22px; }
      .actions { width: 100%; }
      .btn { width: 100%; text-align: center; }
      .chart-wrap { padding: 12px; }
      canvas { height: 220px; }
    }

<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">İstatistikler</h1>
        <div class="subtitle">Sezon performansın ve son form durumun.</div>
      </div>
      <div class="actions">
        <a class="btn btn-primary" href="index.html">
          <i class="fas fa-house"></i>
          <span>Ana Sayfa</span>
        </a>
        <a class="btn btn-secondary" href="coach-dashboard.html">
          <i class="fas fa-table-columns"></i>
          <span>Dashboard</span>
        </a>
      </div>
    </div>

    <div class="grid" id="statsCards"></div>

    <div class="panel">
      <div class="chart-wrap">
        <h2 class="panel-title">Son 6 Ma� Form Grafigi</h2>
        <canvas id="formChart" width="760" height="260"></canvas>
      </div>

      <div class="chart-wrap">
        <h2 class="panel-title">Detay Dagilim</h2>
        <div class="list" id="detailList"></div>
      </div>
    </div>
  </div>

  <script>
    const profileRaw = localStorage.getItem('playerProfile');
    let p = {};
    try { p = profileRaw ? JSON.parse(profileRaw) : {}; } catch { p = {}; }

    const stats = {
      matches: Number(p.matches || 28),
      goals: Number(p.goals || 15),
      assists: Number(p.assists || 6),
      rating: Number(p.rating || 4.8),
      keyPasses: Number(p.keyPasses || 19),
      duelsWon: Number(p.duelsWon || 42)
    };

    const cards = [
      { k: 'Ma�', v: stats.matches, d: '+3 bu ay', c: 'up' },
      { k: 'Gol', v: stats.goals, d: '+2 son hafta', c: 'up' },
      { k: 'Asist', v: stats.assists, d: '+1 son hafta', c: 'up' },
      { k: 'Rating', v: stats.rating.toFixed(1), d: 'stabil', c: 'mid' }
    ];

    const statsCards = document.getElementById('statsCards');
    statsCards.innerHTML = cards.map(x => `
      <div class="card">
        <div class="k">${x.k}</div>
        <div class="v">${x.v}</div>
        <div class="delta ${x.c}">${x.d}</div>
      </div>
    `).join('');

    const detailList = document.getElementById('detailList');
    detailList.innerHTML = `
      <div class="row"><span class="rk">Toplam Ma�</span><span class="rv">${stats.matches}</span></div>
      <div class="row"><span class="rk">Toplam Gol</span><span class="rv">${stats.goals}</span></div>
      <div class="row"><span class="rk">Toplam Asist</span><span class="rv">${stats.assists}</span></div>
      <div class="row"><span class="rk">Kilit Pas</span><span class="rv">${stats.keyPasses}</span></div>
      <div class="row"><span class="rk">Kazanilan Ikili M�cadele</span><span class="rv">${stats.duelsWon}</span></div>
      <div class="row"><span class="rk">Ortalama Rating</span><span class="rv">${stats.rating.toFixed(1)}</span></div>
    `;

    const form = [6.8, 7.2, 7.6, 8.1, 7.9, Math.max(6.5, Math.min(9.8, stats.rating + 2))];
    const labels = ['M1', 'M2', 'M3', 'M4', 'M5', 'M6'];

    function applyTurkishTextFixes() {
      document.title = 'İstatistikler - NextScout';
      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) metaDescription.setAttribute('content', 'NextScout istatistik sayfası: futbol scout, kulüp ve oyuncu odaklı platform içeriği.');
      const ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute('content', 'İstatistikler - NextScout');
      const ogDescription = document.querySelector('meta[property="og:description"]');
      if (ogDescription) ogDescription.setAttribute('content', 'NextScout istatistik sayfası: futbol scout, kulüp ve oyuncu odaklı platform içeriği.');
      const twitterTitle = document.querySelector('meta[name="twitter:title"]');
      if (twitterTitle) twitterTitle.setAttribute('content', 'İstatistikler - NextScout');
      const twitterDescription = document.querySelector('meta[name="twitter:description"]');
      if (twitterDescription) twitterDescription.setAttribute('content', 'NextScout istatistik sayfası: futbol scout, kulüp ve oyuncu odaklı platform içeriği.');

      const title = document.querySelector('.title');
      if (title) title.textContent = 'İstatistikler';
      const subtitle = document.querySelector('.subtitle');
      if (subtitle) subtitle.textContent = 'Sezon performansın ve son form durumun.';
      const panelTitles = document.querySelectorAll('.panel-title');
      if (panelTitles[0]) panelTitles[0].textContent = 'Son 6 Maç Form Grafiği';
      if (panelTitles[1]) panelTitles[1].textContent = 'Detay Dağılım';

      document.querySelectorAll('.card .k').forEach((el) => {
        if (el.textContent.includes('Ma')) el.textContent = 'Maç';
      });

      document.querySelectorAll('.row .rk').forEach((el) => {
        const text = el.textContent || '';
        if (text.includes('Toplam Ma')) el.textContent = 'Toplam Maç';
        if (text.includes('Kazanilan') || text.includes('Ikili') || text.includes('Mï¿½cadele')) {
          el.textContent = text
            .replace('Kazanilan', 'Kazanılan')
            .replace('Ikili', 'İkili')
            .replace('Mï¿½cadele', 'Mücadele');
        }
      });
    }

    const canvas = document.getElementById('formChart');
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;

    function drawChart() {
      ctx.clearRect(0, 0, w, h);

      const pad = { l: 46, r: 20, t: 22, b: 34 };
      const cw = w - pad.l - pad.r;
      const ch = h - pad.t - pad.b;

      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.t + (ch / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(w - pad.r, y);
        ctx.stroke();
      }

      ctx.fillStyle = '#94a3b8';
      ctx.font = '12px Inter, Arial';
      for (let i = 0; i < labels.length; i++) {
        const x = pad.l + (cw / (labels.length - 1)) * i;
        ctx.fillText(labels[i], x - 10, h - 12);
      }

      const minY = 6.0;
      const maxY = 10.0;
      const toX = i => pad.l + (cw / (form.length - 1)) * i;
      const toY = v => pad.t + (1 - (v - minY) / (maxY - minY)) * ch;

      const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
      grad.addColorStop(0, 'rgba(37,99,235,0.30)');
      grad.addColorStop(1, 'rgba(37,99,235,0.05)');

      ctx.beginPath();
      ctx.moveTo(toX(0), h - pad.b);
      form.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
      ctx.lineTo(toX(form.length - 1), h - pad.b);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      form.forEach((v, i) => {
        const x = toX(i), y = toY(v);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = 3;
      ctx.stroke();

      form.forEach((v, i) => {
        const x = toX(i), y = toY(v);
        ctx.beginPath();
        ctx.arc(x, y, 4.5, 0, Math.PI * 2);
        ctx.fillStyle = '#0f172a';
        ctx.fill();
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#bfdbfe';
        ctx.font = '11px Inter, Arial';
        ctx.fillText(v.toFixed(1), x - 10, y - 10);
      });
    }

    drawChart();
    applyTurkishTextFixes();
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
