        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #F8FAFC 0%, #EFF6FF 100%); color: #0F172A; min-height: 100vh; }
        .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: #FFFFFF; border-bottom: 1px solid #DBEAFE; }
        .brand { font-family: 'Poppins', sans-serif; font-size: 24px; color: #1D4ED8; text-decoration: none; }
        .btn { border: 1px solid #BFDBFE; background: #EFF6FF; color: #1E3A8A; padding: 9px 14px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; }

        .page { max-width: 1200px; margin: 26px auto; padding: 0 20px; }
        .hero { background: #FFFFFF; border: 1px solid #DBEAFE; border-radius: 18px; padding: 24px; margin-bottom: 18px; box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08); }

        .job { background: #FFFFFF; border: 1px solid #DBEAFE; border-radius: 14px; padding: 16px; }
        .job-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
        .job-head h3 { font-size: 19px; }
        .time { color: #475569; font-size: 13px; }
        .meta { display: flex; flex-wrap: wrap; gap: 8px; color: #475569; font-size: 13px; margin-bottom: 10px; }
        .content { color: #1E293B; line-height: 1.55; }
        .empty { background: #FFFFFF; border: 1px solid #DBEAFE; border-radius: 12px; padding: 16px; color: #64748B; }
    </style>
    <link rel="stylesheet" href="assets/css/mobile-unified.css">

<body>
<header class="topbar">
    <a class="brand" href="./index.html">NextScout</a>
    <div style="display:flex; gap:10px;">
        <a class="btn" href="./weekly-digest.html"><i class="fa-solid fa-arrow-left"></i> Haftalik Bulten</a>
        <a class="btn primary" href="./coach-dashboard.html">Coach DASHBOARD</a>
    </div>
</header>

<main class="page">
    <section class="hero">
        <h1><i class="fa-solid fa-chalkboard-user"></i> ANTRENÖR Ilanlari</h1>
        <p>Coach DASHBOARD'da kaydedilen ilanlar burada listelenir.</p>
    </section>

    <section class="list" id="jobList"></section>
</main>

<script>
    function getApiBaseUrl() {
        const query = new URLSearchParams(window.location.search);
        const fromQuery = (query.get('api_base') || '').trim();
        if (fromQuery) return fromQuery.replace(/\/$/, '');
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        return '/api';
    }

    async function loadJobs() {
        const apiBase = getApiBaseUrl();
        const response = await fetch(`${apiBase}/discovery/coach-needs`, {
            headers: { Accept: 'application/json' },
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        return Array.isArray(payload?.data) ? payload.data : [];
    }

    function formatDate(dateValue) {
        const date = new Date(dateValue || '');
        if (!Number.isFinite(date.getTime())) return '-';
        return date.toLocaleString('tr-TR');
    }

    function render(data) {
        const root = document.getElementById('jobList');
        if (!data.length) {
            root.innerHTML = '<div class="empty">Henuz ANTRENÖR ilani yok.</div>';
            return;
        }

        root.innerHTML = data.map((job) => `
            <article class="job">
                <div class="job-head">
                    <h3>${job.title || 'ANTRENÖR ilani'}</h3>
                    <span class="time">${formatDate(job.created_at)}</span>
                </div>
                <div class="meta">
                    <span><i class="fa-solid fa-user"></i> ANTRENÖR: ${job.author_name || '-'}</span>
                </div>
                <div class="content">${job.description || 'Aciklama yok.'}</div>
            </article>
        `).join('');
    }

    async function init() {
        try {
            const jobs = await loadJobs();
            render(jobs.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)));
        } catch (error) {
            render([]);
        }
    }

    init();
</script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
