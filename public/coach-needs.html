<head>

    <meta property="og:description" content="Antrenör ilanları haftalık bülten stilinde tek sayfada listelenir.">
    <meta property="og:url" content="https://nextscout.pro/coach-needs.html">

    <style>
        :root {
          --bg: #08131d;
          --panel: #0f1f2e;
          --panel-2: #12293d;
          --line: #2b4660;
          --text: #f5fbff;
          --muted: #9bb5cb;
          --cta: #ff5a1f;
          --cta-2: #ff7e22;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          margin: 0;
          color: var(--text);
          font-family: "Space Grotesk", sans-serif;
          background:
            radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
            radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
            var(--bg);
          min-height: 100vh;
        }
        .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(7, 18, 36, 0.78); border-bottom: 1px solid rgba(148, 163, 184, 0.24); color: #f5fbff; backdrop-filter: blur(18px); }
        .brand { font-family: 'Poppins', sans-serif; font-size: 24px; color: #BFDBFE; text-decoration: none; }
        .top-actions { display: flex; gap: 10px; }
        .page { max-width: 1180px; margin: 26px auto; padding: 0 20px; }
        .hero { background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 22px; padding: 24px; box-shadow: 0 18px 36px rgba(8, 19, 29, 0.34); margin-bottom: 14px; color: var(--text); }
        .hero h1 { font-size: 30px; margin-bottom: 8px; }
        .hero p { color: var(--muted); }
        .btn, a.btn, button.btn { display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; border: 1px solid rgba(255, 126, 34, 0.45) !important; background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%) !important; color: #16325c !important; padding: 10px 16px !important; border-radius: 12px !important; text-decoration: none !important; font-weight: 800 !important; font-size: 13px !important; box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24) !important; transition: transform .18s ease, box-shadow .18s ease, filter .18s ease !important; }
        .btn:hover, a.btn:hover, button.btn:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(8, 19, 29, 0.3) !important; filter: saturate(1.05); }
        .jobs-grid { display: grid; gap: 14px; }
        .job-card { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 18px; padding: 18px; color: var(--text); box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28); transition: all .2s ease; }
        .job-card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 4px; background: linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%); }
        .job-card:hover { border-color: #ff7e22; box-shadow: 0 18px 34px rgba(8, 19, 29, 0.34); transform: translateY(-2px); }
        .job-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
        .job-title { font-size: 19px; font-weight: 800; color: #f8fbff; }
        .job-time { color: var(--muted); font-size: 13px; white-space: nowrap; }
        .job-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; color: var(--muted); font-size: 13px; }
        .job-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid #2b4660; border-radius: 999px; padding: 6px 10px; background: rgba(255, 255, 255, 0.04); color: #d6e8f7; font-size: 12px; font-weight: 700; }
        .job-content { color: #d6e8f7; line-height: 1.6; font-size: 14px; }
        .empty { background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 16px; padding: 16px; color: var(--muted); box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28); }
        @media (max-width: 768px) {
          .topbar { padding: 10px 12px; }
          .brand { font-size: 18px; }
          .page { margin: 12px auto 18px; padding: 0 12px; }
          .hero { padding: 14px; border-radius: 12px; }
          .hero h1 { font-size: 22px; }
          .job-card { padding: 12px; border-radius: 12px; }
          .job-head { flex-direction: column; }
          .job-time { white-space: normal; }
        }
    </style>
    <link rel="stylesheet" href="assets/css/mobile-unified.css">
    <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="./index.html">NextScout</a>
    <div class="top-actions">
        <a class="home-btn-global" href="./weekly-digest.html" style="display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:10px;border:1px solid #ff7e22;background:linear-gradient(135deg,#ff5a1f 0%,#ff7e22 100%);color:#fff;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 16px 28px rgba(255,90,31,0.28);">Haftalık Bülten</a>
    </div>
</header>

<main class="page">
    <section class="hero">
        <h1><i class="fa-solid fa-chalkboard-user"></i> Antrenör İlanları</h1>
        <p>Haftalık bültendeki görünümle aynı stilde, yayındaki antrenör ilanları burada kart olarak listelenir.</p>
    </section>

    <section class="jobs-grid" id="jobList"></section>
</main>

<script>
    function getApiBaseUrl() {
        const query = new URLSearchParams(window.location.search);
        const fromQuery = (query.get('api_base') || '').trim();
        if (fromQuery) return fromQuery.replace(/\/$/, '');
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        return '/api';
    }

    async function loadJobs() {
        const apiBase = getApiBaseUrl();
        const response = await fetch(`${apiBase}/discovery/coach-needs`, {
            headers: { Accept: 'application/json' },
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        return Array.isArray(payload?.data) ? payload.data : [];
    }

    function formatDate(dateValue) {
        const date = new Date(dateValue || '');
        if (!Number.isFinite(date.getTime())) return '-';
        return date.toLocaleString('tr-TR');
    }

    function render(data) {
        const root = document.getElementById('jobList');
        if (!data.length) {
            root.innerHTML = '<div class="empty">Henüz antrenör ilanı yok.</div>';
            return;
        }

        root.innerHTML = data.map((job) => `
            <article class="job-card">
                <div class="job-head">
                    <div class="job-title">${job.title || 'Antrenör ilanı'}</div>
                    <div class="job-time">${formatDate(job.created_at)}</div>
                </div>
                <div class="job-meta">
                    <span class="job-chip"><i class="fa-solid fa-user"></i> ${job.author_name || 'Bilinmeyen kullanici'}</span>
                    <span class="job-chip"><i class="fa-solid fa-briefcase"></i> Teknik ekip ilani</span>
                </div>
                <div class="job-content">${job.description || 'Açıklama yok.'}</div>
            </article>
        `).join('');
    }

    async function init() {
        try {
            const jobs = await loadJobs();
            render(jobs.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)));
        } catch (error) {
            render([]);
        }
    }

    init();
</script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
</html>
