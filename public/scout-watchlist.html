<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Takip Listem - NextScout</title>
    <meta name="description" content="NextScout scout watchlist sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://nextscout.pro/scout-watchlist.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="NextScout">
    <meta property="og:title" content="Scout Takip Listem - NextScout">
    <meta property="og:description" content="NextScout scout watchlist sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta property="og:url" content="https://nextscout.pro/scout-watchlist.html">
    <meta property="og:image" content="https://nextscout.pro/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Scout Takip Listem - NextScout">
    <meta name="twitter:description" content="NextScout scout watchlist sayfasi: futbol scout, KULÜP ve oyuncu odakli platform icerigi.">
    <meta name="twitter:image" content="https://nextscout.pro/assets/img/og-default.jpg">
    <meta name="theme-color" content="#0B3B8A">
  <style>
    :root { --bg:#1f252d; --card:#232a33; --line:#334155; --text:#e2e8f0; --muted:#94a3b8; --primary:#1d4ed8; --shadow:0 12px 28px rgba(2,6,23,.24); }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Segoe UI,Arial,sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.12), transparent 34%),
        radial-gradient(circle at 100% 0%, rgba(96, 165, 250, 0.10), transparent 36%),
        var(--bg);
      color:var(--text)
    }
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .title{margin:0;font-size:30px;font-weight:800}
    .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .btn{
      border:1px solid #2563eb;
      background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
      font-size:13px;
      cursor:pointer
    }
    .table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;text-align:left;font-size:13px;border-bottom:1px solid #2f3a48}
    th{background:#1f2937;color:#cbd5e1;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
    td{color:#e2e8f0}
    .inline-btn{
      border:1px solid #475569;
      background:#1f2937;
      color:#dbeafe;
      border-radius:8px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      cursor:pointer
    }
    .inline-btn:hover{border-color:#60a5fa;background:#334155;color:#fff}
    .empty{padding:18px;color:var(--muted)}
    @media (max-width:840px){
      .wrap{padding:14px 10px}
      .head{flex-direction:column;align-items:flex-start;gap:8px}
      .title{font-size:24px}
      .btn{width:100%;text-align:center}
      .table-wrap{padding:8px}
      table, thead, tbody, tr, td { display:block; width:100%; }
      thead { display:none; }
      tr{
        background:#2b3440;
        border:1px solid #475569;
        border-radius:12px;
        padding:10px;
        margin-bottom:10px;
      }
      td{
        border-bottom:1px solid #3a4758;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        padding:8px 4px;
      }
      td:last-child{border-bottom:none}
      td::before{
        content: attr(data-label);
        color:#94a3b8;
        font-size:11px;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.25px;
      }
    }
  </style>
    <link rel="stylesheet" href="assets/css/mobile-unified.css">
    <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Takip Listem</h1>
        <div class="sub">Scout olarak izlemek istedigin oyuncular.</div>
      </div>
      <a class="btn" href="index.html">Ana Sayfa</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Oyuncu</th>
            <th>Pozisyon</th>
            <th>Yas</th>
            <th>Rating</th>
            <th>KULÜP</th>
            <th>Islem</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none;">Takip listesinde oyuncu yok.</div>
    </div>
  </div>

  <script>
    const KEY = 'nextscout_scout_watchlist';
    const API_BASE = (function() {
      const p = new URLSearchParams(window.location.search);
      const fromQuery = (p.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    })();

    function authToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function loadItemsLocal(){
      try {
        const parsed = JSON.parse(localStorage.getItem(KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch { return []; }
    }

    function saveItemsLocal(items){ localStorage.setItem(KEY, JSON.stringify(Array.isArray(items) ? items : [])); }

    async function loadItemsFromApi() {
      const token = authToken();
      if (!token || token === 'local-session-token') throw new Error('Auth required');
      const response = await fetch(`${API_BASE}/favorites`, {
        headers: {
          Accept: 'application/json',
          Authorization: `Bearer ${token}`,
        },
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json().catch(() => ({}));
      const rows = Array.isArray(payload?.data) ? payload.data : [];
      return rows.map((item) => {
        const target = item?.target_user || item?.player || item?.user || {};
        return {
          id: Number(item?.target_user_id || item?.player_id || target?.id || item?.id || 0),
          name: (target?.name || item?.player_name || item?.name || '-'),
          position: (target?.position || item?.position || '-'),
          age: (target?.age || item?.age || '-'),
          rating: Number(target?.rating || item?.rating || 0),
          club: (target?.club_name || item?.club_name || item?.club || '-'),
        };
      });
    }

    let rows = [];

    function render(){
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      if(!rows.length){
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = rows.map((x) => `
        <tr>
          <td data-label="Oyuncu">${x.name || '-'}</td>
          <td data-label="Pozisyon">${x.position || '-'}</td>
          <td data-label="Yas">${x.age || '-'}</td>
          <td data-label="Rating">${Number(x.rating || 0).toFixed(1)}</td>
          <td data-label="KULÜP">${x.club || '-'}</td>
          <td data-label="Islem">
            <button class="inline-btn" onclick="openProfile(${Number(x.id) || 0})">Profil</button>
            <button class="inline-btn" onclick="removeItem(${Number(x.id) || 0})">Kaldir</button>
          </td>
        </tr>
      `).join('');
    }

    function openProfile(id){
      if(!id) return;
      window.location.href = `player-profile.html?user_id=${encodeURIComponent(id)}`;
    }

    async function removeItem(id){
      const token = authToken();
      if (token && token !== 'local-session-token') {
        try {
          const response = await fetch(`${API_BASE}/favorites/${encodeURIComponent(id)}/toggle`, {
            method: 'POST',
            headers: {
              Accept: 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          rows = await loadItemsFromApi();
          render();
          return;
        } catch (error) {
          nsAlert(`API hatasi: ${error.message}`);
          return;
        }
      }
      rows = rows.filter((x) => Number(x.id) !== Number(id));
      saveItemsLocal(rows);
      render();
    }

    async function init() {
      try {
        rows = await loadItemsFromApi();
      } catch (error) {
        rows = loadItemsLocal();
      }
      render();
    }

    init();
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
</html>
