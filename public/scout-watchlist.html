  <style>
    :root { --bg:#08131d; --card:#0f1f2e; --line:#2b4660; --text:#f5fbff; --muted:#9bb5cb; --primary:#ff7e22; --shadow:0 18px 36px rgba(8,19,29,.34); }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;background:linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:24px;position:relative;overflow:hidden}
    .head::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,#ff5a1f 0%,#ff7e22 55%,#60a5fa 100%)}
    .title{margin:0;font-size:30px;font-weight:800}
    .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .header-actions{display:flex;gap:8px;margin-top:0}
    .btn{
      border:1px solid rgba(255, 126, 34, 0.45);
      background:linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color:#16325c;
      padding:10px 14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:800;
      font-size:13px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      line-height:1;
      box-shadow:0 12px 24px rgba(8,19,29,.24)
    }
    .btn-primary{background:linear-gradient(135deg,#ff5a1f 0%,#ff7e22 100%);color:#fff;border-color:rgba(255,126,34,.6);box-shadow:0 16px 28px rgba(255,90,31,.28)}
    .btn-secondary{background:linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);color:#16325c;border:1px solid rgba(255,126,34,.45);box-shadow:0 12px 24px rgba(8,19,29,.24)}
    .table-wrap{background:linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;position:relative}
    .table-wrap::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,#ff5a1f 0%,#ff7e22 55%,#60a5fa 100%)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;text-align:left;font-size:13px;border-bottom:1px solid #2f3a48}
    th{background:rgba(255,255,255,.04);color:#cbd5e1;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
    td{color:#e2e8f0}
    .inline-btn{
      border:1px solid rgba(96,165,250,.24);
      background:rgba(255,255,255,.04);
      color:#dbeafe;
      border-radius:12px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      cursor:pointer
    }
    .inline-btn:hover{border-color:#ff7e22;background:rgba(255,255,255,.06);color:#fff}
    .empty{padding:18px;color:var(--muted)}
    @media (max-width:840px){
      .wrap{padding:14px 10px}
      .head{flex-direction:column;align-items:flex-start;gap:8px;padding:16px 14px;border-radius:14px}
      .title{font-size:24px}
      .header-actions{display:grid;grid-template-columns:1fr 1fr;width:100%}
      .btn{width:100%;justify-content:center}
      .table-wrap{padding:8px}
      table, thead, tbody, tr, td { display:block; width:100%; }
      thead { display:none; }
      tr{
        background:#2b3440;
        border:1px solid #475569;
        border-radius:12px;
        padding:10px;
        margin-bottom:10px;
      }
      td{
        border-bottom:1px solid #3a4758;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        padding:8px 4px;
      }
      td:last-child{border-bottom:none}
      td::before{
        content: attr(data-label);
        color:#94a3b8;
        font-size:11px;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.25px;
      }
    }
    .head,
    .table-wrap,
    .btn,
    .btn-primary,
    .btn-secondary,
    .inline-btn,
    .empty,
    table,
    tr,
    td,
    th {
      border-radius: 0 !important;
    }

<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Scout Watchlist</h1>
        <div class="sub">Takip ettigin oyunculari tek panelde izle, profillerini ac ve listeni hizlica yonet.</div>
      </div>
      <div class="header-actions">
        <a class="btn btn-primary" href="index.html"><i class="fas fa-house"></i><span>Ana Sayfa</span></a>
        <a class="btn btn-secondary" href="scout-dashboard.html"><i class="fas fa-table-columns"></i><span>Dashboard</span></a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Oyuncu</th>
            <th>Pozisyon</th>
            <th>Yas</th>
            <th>Rating</th>
            <th>KULÜP</th>
            <th>Islem</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none;">Takip listesinde oyuncu yok.</div>
    </div>
  </div>

  <script>
    const KEY = 'nextscout_scout_watchlist';
    const API_BASE = (function() {
      const p = new URLSearchParams(window.location.search);
      const fromQuery = (p.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    })();

    function authToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function loadItemsLocal(){
      try {
        const parsed = JSON.parse(localStorage.getItem(KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch { return []; }
    }

    function saveItemsLocal(items){ localStorage.setItem(KEY, JSON.stringify(Array.isArray(items) ? items : [])); }

    async function loadItemsFromApi() {
      const token = authToken();
      if (!token || token === 'local-session-token') throw new Error('Auth required');
      const response = await fetch(`${API_BASE}/favorites`, {
        headers: {
          Accept: 'application/json',
          Authorization: `Bearer ${token}`,
        },
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json().catch(() => ({}));
      const rows = Array.isArray(payload?.data) ? payload.data : [];
      return rows.map((item) => {
        const target = item?.target_user || item?.player || item?.user || {};
        return {
          id: Number(item?.target_user_id || item?.player_id || target?.id || item?.id || 0),
          name: (target?.name || item?.player_name || item?.name || '-'),
          position: (target?.position || item?.position || '-'),
          age: (target?.age || item?.age || '-'),
          rating: Number(target?.rating || item?.rating || 0),
          club: (target?.club_name || item?.club_name || item?.club || '-'),
        };
      });
    }

    let rows = [];

    function render(){
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      if(!rows.length){
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = rows.map((x) => `
        <tr>
          <td data-label="Oyuncu">${x.name || '-'}</td>
          <td data-label="Pozisyon">${x.position || '-'}</td>
          <td data-label="Yas">${x.age || '-'}</td>
          <td data-label="Rating">${Number(x.rating || 0).toFixed(1)}</td>
          <td data-label="KULÜP">${x.club || '-'}</td>
          <td data-label="Islem">
            <button class="inline-btn" onclick="openProfile(${Number(x.id) || 0})">Profil</button>
            <button class="inline-btn" onclick="removeItem(${Number(x.id) || 0})">Kaldir</button>
          </td>
        </tr>
      `).join('');
    }

    function openProfile(id){
      if(!id) return;
      window.location.href = `player-profile.html?user_id=${encodeURIComponent(id)}`;
    }

    async function removeItem(id){
      const token = authToken();
      if (token && token !== 'local-session-token') {
        try {
          const response = await fetch(`${API_BASE}/favorites/${encodeURIComponent(id)}/toggle`, {
            method: 'POST',
            headers: {
              Accept: 'application/json',
              Authorization: `Bearer ${token}`,
            },
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          rows = await loadItemsFromApi();
          render();
          return;
        } catch (error) {
          nsAlert(`API hatasi: ${error.message}`);
          return;
        }
      }
      rows = rows.filter((x) => Number(x.id) !== Number(id));
      saveItemsLocal(rows);
      render();
    }

    async function init() {
      try {
        rows = await loadItemsFromApi();
      } catch (error) {
        rows = loadItemsLocal();
      }
      render();
    }

    init();
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
