<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Son 7 günde eklenen oyuncu kartları NextScout haftalık bülten stilinde listelenir.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://nextscout.app/weekly-new-players.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="NextScout">
    <meta property="og:title" content="NextScout - Bu Hafta Eklenen Oyuncular">
    <meta property="og:description" content="Son 7 günde eklenen oyuncu kartları tek sayfada.">
    <meta property="og:url" content="https://nextscout.app/weekly-new-players.html">
    <meta property="og:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NextScout - Bu Hafta Eklenen Oyuncular">
    <meta name="twitter:description" content="Son 7 günde eklenen oyuncu kartları tek sayfada.">
    <meta name="twitter:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="theme-color" content="#0B3B8A">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
          --bg: #08131d;
          --panel: #0f1f2e;
          --panel-2: #12293d;
          --line: #2b4660;
          --text: #f5fbff;
          --muted: #9bb5cb;
          --cta: #ff5a1f;
          --cta-2: #ff7e22;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          margin: 0;
          color: var(--text);
          font-family: "Space Grotesk", sans-serif;
          background:
            radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
            radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
            var(--bg);
          min-height: 100vh;
        }
        .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(7, 18, 36, 0.78); border-bottom: 1px solid rgba(148, 163, 184, 0.24); color: #f5fbff; backdrop-filter: blur(18px); }
        .brand { font-family: 'Poppins', sans-serif; font-size: 24px; color: #BFDBFE; text-decoration: none; }
        .top-actions { display: flex; gap: 10px; }
        .page { max-width: 1180px; margin: 26px auto; padding: 0 20px; }
        .hero { background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 22px; padding: 24px; box-shadow: 0 18px 36px rgba(8, 19, 29, 0.34); margin-bottom: 14px; color: var(--text); }
        .hero h1 { font-size: 30px; margin-bottom: 8px; }
        .hero p { color: var(--muted); }
        .btn, a.btn, button.btn { display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; border: 1px solid rgba(255, 126, 34, 0.45) !important; background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%) !important; color: #16325c !important; padding: 10px 16px !important; border-radius: 12px !important; text-decoration: none !important; font-weight: 800 !important; font-size: 13px !important; box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24) !important; transition: transform .18s ease, box-shadow .18s ease, filter .18s ease !important; }
        .btn:hover, a.btn:hover, button.btn:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(8, 19, 29, 0.3) !important; filter: saturate(1.05); }
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .player-card { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 18px; padding: 18px; color: var(--text); box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28); cursor: pointer; transition: all .2s ease; }
        .player-card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 4px; background: linear-gradient(90deg, var(--cta) 0%, var(--cta-2) 55%, #60a5fa 100%); }
        .player-card:hover { border-color: #ff7e22; box-shadow: 0 18px 34px rgba(8, 19, 29, 0.34); transform: translateY(-2px); }
        .player-name { font-size: 18px; font-weight: 800; margin-bottom: 6px; color: #f8fbff; }
        .player-meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
        .player-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .info-box { border: 1px solid #2b4660; border-radius: 12px; padding: 10px; background: rgba(255, 255, 255, 0.04); }
        .info-label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
        .info-value { font-size: 14px; font-weight: 700; color: #d6e8f7; }
        .player-note { font-size: 13px; color: #d6e8f7; line-height: 1.5; }
        .empty { background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 16px; padding: 16px; color: var(--muted); box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28); }
        @media (max-width: 768px) {
          .topbar { padding: 10px 12px; }
          .brand { font-size: 18px; }
          .page { margin: 12px auto 18px; padding: 0 12px; }
          .hero { padding: 14px; border-radius: 12px; }
          .hero h1 { font-size: 22px; }
          .player-card { padding: 12px; border-radius: 12px; }
        }
    </style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="./index.html">NextScout</a>
    <div class="top-actions">
        <a class="home-btn-global" href="./weekly-digest.html" style="display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:10px;border:1px solid #ff7e22;background:linear-gradient(135deg,#ff5a1f 0%,#ff7e22 100%);color:#fff;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 16px 28px rgba(255,90,31,0.28);">Haftalık Bülten</a>
    </div>
</header>

<main class="page">
    <section class="hero">
        <h1><i class="fa-solid fa-user-plus"></i> Bu Hafta Eklenen Oyuncular</h1>
        <p>Sadece son 7 gün içinde eklenen oyuncu kartları burada listelenir.</p>
    </section>

    <section class="players-grid" id="weeklyPlayersGrid"></section>
</main>

<script>
    function getApiBaseUrl() {
        const query = new URLSearchParams(window.location.search);
        const fromQuery = (query.get('api_base') || '').trim();
        if (fromQuery) return fromQuery.replace(/\/$/, '');
        if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
        return '/api';
    }

    function isWithinLastSevenDays(value) {
        if (!value) return false;
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return false;
        const now = Date.now();
        const diff = now - date.getTime();
        return diff >= 0 && diff <= 7 * 24 * 60 * 60 * 1000;
    }

    function playerProfileUrl(player) {
        if (player?.id) return `./player-profile.html?user_id=${encodeURIComponent(player.id)}`;
        return './professional-players.html';
    }

    function renderPlayers(players) {
        const root = document.getElementById('weeklyPlayersGrid');
        if (!players.length) {
            root.innerHTML = '<div class="empty">Son 7 günde eklenen oyuncu bulunamadı.</div>';
            return;
        }

        root.innerHTML = players.map((player) => `
            <article class="player-card" onclick="window.location.href='${playerProfileUrl(player)}'">
                <div class="player-name">${player.name || 'Oyuncu'}</div>
                <div class="player-meta">${player.position || 'Pozisyon'} • ${player.club || 'Kulüp bilgisi yok'}</div>
                <div class="player-info">
                    <div class="info-box">
                        <span class="info-label">Yaş</span>
                        <span class="info-value">${player.age || '-'}</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Lig</span>
                        <span class="info-value">${player.league || '-'}</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Skor</span>
                        <span class="info-value">${player.rating || 0}/10</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Eklenme</span>
                        <span class="info-value">${new Date(player.created_at || player.updated_at || Date.now()).toLocaleDateString('tr-TR')}</span>
                    </div>
                </div>
                <div class="player-note">${player.description || player.bio || 'Oyuncu kartı detayları profil sayfasında görülebilir.'}</div>
            </article>
        `).join('');
    }

    async function loadWeeklyPlayers() {
        const apiBase = getApiBaseUrl();
        const response = await fetch(`${apiBase}/public/players?limit=300&per_page=300&sort=updated_desc`, {
            headers: { Accept: 'application/json' },
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const rows = Array.isArray(payload?.data) ? payload.data : [];
        return rows.filter((player) => isWithinLastSevenDays(player.created_at || player.updated_at));
    }

    async function initWeeklyPlayers() {
        try {
            const players = await loadWeeklyPlayers();
            renderPlayers(players);
        } catch (error) {
            renderPlayers([]);
        }
    }

    initWeeklyPlayers();
</script>
</body>
</html>
