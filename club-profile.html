<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kulup Profili - NextScout</title>
    <meta name="description" content="NextScout club profile sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://nextscout.app/club-profile.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="NextScout">
    <meta property="og:title" content="Kulup Profili - NextScout">
    <meta property="og:description" content="NextScout club profile sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta property="og:url" content="https://nextscout.app/club-profile.html">
    <meta property="og:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Kulup Profili - NextScout">
    <meta name="twitter:description" content="NextScout club profile sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta name="twitter:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="theme-color" content="#0B3B8A">
  <style>
    :root {
      --bg: #f4f7fc;
      --card: #ffffff;
      --line: #dbe3f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --shadow: 0 12px 32px rgba(37, 99, 235, 0.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1020px; margin: 0 auto; padding: 24px 16px; }
    .head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .title { margin: 0; font-size: 30px; font-weight: 800; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .btn { border: 1px solid var(--line); background: #fff; color: var(--primary); padding: 10px 14px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; }
    .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 14px; }
    .section-title { margin: 0 0 10px 0; font-size: 16px; font-weight: 800; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .label { font-size: 12px; font-weight: 700; color: #334155; }
    .input, .select, .textarea { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 13px; background: #fff; color: var(--text); }
    .textarea { min-height: 94px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: #334155; background: #f8fbff; }
    .act { display: flex; gap: 8px; margin-top: 12px; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .summary-row { display: flex; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid #edf2f7; font-size: 13px; }
    .summary-row:last-child { border-bottom: 0; }
    .muted { color: var(--muted); }
    .ok { color: #059669; font-weight: 700; font-size: 12px; min-height: 18px; margin-top: 8px; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Kulup Profili</h1>
        <div class="sub">Kulube ozel bilgiler: butce, kadro ihtiyaci, sehir ve tesis.</div>
      </div>
      <a class="btn" href="team-dashboard.html">Dashboard</a>
    </div>

    <div class="layout">
      <div class="card">
        <h2 class="section-title">Kulup Bilgileri</h2>

        <form id="clubForm" class="form-grid">
          <div class="field">
            <label class="label" for="clubName">Kulup Adi</label>
            <input class="input" id="clubName" name="clubName" type="text" placeholder="Ornek SK" required>
          </div>

          <div class="field">
            <label class="label" for="city">Sehir</label>
            <input class="input" id="city" name="city" type="text" placeholder="Istanbul" required>
          </div>

          <div class="field">
            <label class="label" for="branch">Brans</label>
            <select class="select" id="branch" name="branch">
              <option value="">Seciniz</option>
              <option value="Futbol">Futbol</option>
              <option value="Basketbol">Basketbol</option>
              <option value="Voleybol">Voleybol</option>
              <option value="Coklu Brans">Coklu Brans</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="budget">Transfer Butcesi (EUR)</label>
            <input class="input" id="budget" name="budget" type="number" min="0" step="1000" placeholder="5000000" required>
          </div>

          <div class="field">
            <label class="label" for="wageBudget">Maas Butcesi (Aylik EUR)</label>
            <input class="input" id="wageBudget" name="wageBudget" type="number" min="0" step="1000" placeholder="300000" required>
          </div>

          <div class="field full">
            <label class="label" for="squadNeed">Kadro Ihtiyaci</label>
            <select class="select" id="squadNeed" name="squadNeed" required>
              <option value="">Seciniz</option>
              <option value="Forvet">Forvet</option>
              <option value="Orta Saha">Orta Saha</option>
              <option value="Defans">Defans</option>
              <option value="Kaleci">Kaleci</option>
              <option value="Coklu Pozisyon">Coklu Pozisyon</option>
            </select>
          </div>

          <div class="field full">
            <label class="label" for="facilityLevel">Tesis Seviyesi</label>
            <select class="select" id="facilityLevel" name="facilityLevel" required>
              <option value="">Seciniz</option>
              <option value="Elite">Elite</option>
              <option value="Gelismis">Gelismis</option>
              <option value="Orta">Orta</option>
              <option value="Temel">Temel</option>
            </select>
          </div>

          <div class="field full">
            <label class="label" for="facilities">Tesisler</label>
            <textarea class="textarea" id="facilities" name="facilities" placeholder="Antrenman sahasi, analiz odasi, rehabilitasyon merkezi..."></textarea>
          </div>

          <div class="field full">
            <label class="label" for="notes">Kulup Notlari</label>
            <textarea class="textarea" id="notes" name="notes" placeholder="Transfer stratejisi, hedef yas araligi, oyun tarzi..."></textarea>
          </div>

          <div class="act full">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <button type="button" id="resetBtn" class="btn">Sifirla</button>
          </div>
        </form>

        <div id="saveMsg" class="ok"></div>
      </div>

      <div class="card">
        <h2 class="section-title">Profil Ozeti</h2>
        <div class="summary-row"><span class="muted">Kulup</span><strong id="sumClub">-</strong></div>
        <div class="summary-row"><span class="muted">Sehir</span><strong id="sumCity">-</strong></div>
        <div class="summary-row"><span class="muted">Brans</span><strong id="sumBranch">-</strong></div>
        <div class="summary-row"><span class="muted">Transfer Butcesi</span><strong id="sumBudget">-</strong></div>
        <div class="summary-row"><span class="muted">Maas Butcesi</span><strong id="sumWage">-</strong></div>
        <div class="summary-row"><span class="muted">Kadro Ihtiyaci</span><strong id="sumNeed">-</strong></div>
        <div class="summary-row"><span class="muted">Tesis Seviyesi</span><strong id="sumFacilityLevel">-</strong></div>

        <h3 class="section-title" style="margin-top:14px;">Odak Etiketleri</h3>
        <div class="chips" id="focusChips"></div>
      </div>
    </div>
  </div>

  <script>
    const CLUB_KEY = 'nextscout_club_profile';
    let currentUserId = null;

    function getApiBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function getToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function authHeaders() {
      const token = getToken();
      if (!token) return null;
      return {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': `Bearer ${token}`,
      };
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      return new Intl.NumberFormat('tr-TR').format(num) + ' EUR';
    }

    function getDefaultProfile() {
      return {
        clubName: 'Ornek SK',
        city: 'Istanbul',
        branch: 'Futbol',
        budget: 5000000,
        wageBudget: 300000,
        squadNeed: 'Forvet',
        facilityLevel: 'Gelismis',
        facilities: '2 antrenman sahasi, performans laboratuvari, video analiz odasi',
        notes: '22-27 yas bandinda oyuncu onceligi.',
      };
    }

    function parseNeedsText(needsText) {
      const defaults = getDefaultProfile();
      if (!needsText) return defaults;
      try {
        const parsed = JSON.parse(needsText);
        return Object.assign(defaults, parsed || {});
      } catch (error) {
        return Object.assign(defaults, { notes: String(needsText) });
      }
    }

    function buildNeedsText(profile) {
      return JSON.stringify({
        branch: profile.branch || '',
        budget: Number(profile.budget) || 0,
        wageBudget: Number(profile.wageBudget) || 0,
        squadNeed: profile.squadNeed || '',
        facilityLevel: profile.facilityLevel || '',
        facilities: profile.facilities || '',
        notes: profile.notes || '',
      });
    }

    function loadProfileLocal() {
      try {
        const raw = localStorage.getItem(CLUB_KEY);
        if (!raw) return getDefaultProfile();
        const parsed = JSON.parse(raw);
        return Object.assign(getDefaultProfile(), parsed || {});
      } catch (error) {
        return getDefaultProfile();
      }
    }

    function saveProfileLocal(data) {
      localStorage.setItem(CLUB_KEY, JSON.stringify(data));
    }

    function profileFromApi(user, team) {
      const parsedNeeds = parseNeedsText(team?.needs_text || '');
      return Object.assign(getDefaultProfile(), parsedNeeds, {
        clubName: team?.team_name || user?.name || parsedNeeds.clubName,
        city: team?.team_city || user?.user_city || user?.city || parsedNeeds.city,
      });
    }

    function setForm(profile) {
      document.getElementById('clubName').value = profile.clubName || '';
      document.getElementById('city').value = profile.city || '';
      document.getElementById('branch').value = profile.branch || '';
      document.getElementById('budget').value = Number(profile.budget) || 0;
      document.getElementById('wageBudget').value = Number(profile.wageBudget) || 0;
      document.getElementById('squadNeed').value = profile.squadNeed || '';
      document.getElementById('facilityLevel').value = profile.facilityLevel || '';
      document.getElementById('facilities').value = profile.facilities || '';
      document.getElementById('notes').value = profile.notes || '';
    }

    function readForm() {
      return {
        clubName: document.getElementById('clubName').value.trim(),
        city: document.getElementById('city').value.trim(),
        branch: document.getElementById('branch').value,
        budget: Number(document.getElementById('budget').value || 0),
        wageBudget: Number(document.getElementById('wageBudget').value || 0),
        squadNeed: document.getElementById('squadNeed').value,
        facilityLevel: document.getElementById('facilityLevel').value,
        facilities: document.getElementById('facilities').value.trim(),
        notes: document.getElementById('notes').value.trim(),
      };
    }

    function renderSummary(profile) {
      document.getElementById('sumClub').textContent = profile.clubName || '-';
      document.getElementById('sumCity').textContent = profile.city || '-';
      document.getElementById('sumBranch').textContent = profile.branch || '-';
      document.getElementById('sumBudget').textContent = formatMoney(profile.budget);
      document.getElementById('sumWage').textContent = formatMoney(profile.wageBudget);
      document.getElementById('sumNeed').textContent = profile.squadNeed || '-';
      document.getElementById('sumFacilityLevel').textContent = profile.facilityLevel || '-';

      const chips = [];
      if (profile.branch) chips.push(`Brans: ${profile.branch}`);
      if (profile.squadNeed) chips.push(`Ihtiyac: ${profile.squadNeed}`);
      if (profile.facilityLevel) chips.push(`Tesis: ${profile.facilityLevel}`);
      if (profile.city) chips.push(`Sehir: ${profile.city}`);
      chips.push(profile.budget >= 10000000 ? 'Yuksek Butce' : 'Kontrollu Butce');
      document.getElementById('focusChips').innerHTML = chips.map((c) => `<span class="chip">${c}</span>`).join('');
    }

    async function fetchMeAndTeam() {
      const headers = authHeaders();
      if (!headers) return null;
      const api = getApiBaseUrl();
      const meRes = await fetch(`${api}/auth/me`, { headers });
      if (!meRes.ok) return null;
      const meData = await meRes.json();
      const user = meData?.data || null;
      if (!user?.id) return null;
      currentUserId = user.id;

      const teamRes = await fetch(`${api}/teams/${encodeURIComponent(user.id)}`, { headers: { 'Accept': 'application/json', 'Authorization': headers.Authorization } });
      if (!teamRes.ok) return { user, team: null };
      const teamData = await teamRes.json();
      return { user, team: teamData?.data || null };
    }

    async function saveProfileBackend(profile) {
      const headers = authHeaders();
      if (!headers || !currentUserId) return false;
      const api = getApiBaseUrl();
      const payload = {
        name: profile.clubName,
        city: profile.city,
        team_name: profile.clubName,
        team_city: profile.city,
        league_level: profile.facilityLevel || '',
        needs_text: buildNeedsText(profile),
      };
      const res = await fetch(`${api}/teams/${encodeURIComponent(currentUserId)}`, {
        method: 'PUT',
        headers,
        body: JSON.stringify(payload),
      });
      return res.ok;
    }

    function bind() {
      const form = document.getElementById('clubForm');
      const saveMsg = document.getElementById('saveMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = readForm();
        if (!data.clubName || !data.city || !data.squadNeed || !data.facilityLevel) {
          saveMsg.textContent = 'Zorunlu alanlari doldurun.';
          return;
        }

        let backendSaved = false;
        try {
          backendSaved = await saveProfileBackend(data);
        } catch (error) {
          backendSaved = false;
        }

        saveProfileLocal(data);
        renderSummary(data);
        saveMsg.textContent = backendSaved ? 'Kulup profili backend'e kaydedildi.' : 'Kaydedildi (local). Backend baglantisi yok.';
        setTimeout(() => { saveMsg.textContent = ''; }, 2200);
      });

      document.getElementById('resetBtn')?.addEventListener('click', () => {
        const defaults = getDefaultProfile();
        setForm(defaults);
        saveProfileLocal(defaults);
        renderSummary(defaults);
        saveMsg.textContent = 'Profil varsayilan degerlere dondu.';
        setTimeout(() => { saveMsg.textContent = ''; }, 2000);
      });
    }

    async function init() {
      let profile = loadProfileLocal();
      try {
        const remote = await fetchMeAndTeam();
        if (remote?.user) {
          const merged = profileFromApi(remote.user, remote.team);
          profile = Object.assign(profile, merged);
        }
      } catch (error) {
        // local fallback
      }
      setForm(profile);
      renderSummary(profile);
      saveProfileLocal(profile);
      bind();
    }

    init();
  </script>
    <script src="assets/js/core-stability.js"></script>
</body>
</html>
