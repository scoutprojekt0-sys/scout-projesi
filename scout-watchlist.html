<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Takip Listem - NextScout</title>
    <meta name="description" content="NextScout scout watchlist sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://nextscout.app/scout-watchlist.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="NextScout">
    <meta property="og:title" content="Scout Takip Listem - NextScout">
    <meta property="og:description" content="NextScout scout watchlist sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta property="og:url" content="https://nextscout.app/scout-watchlist.html">
    <meta property="og:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Scout Takip Listem - NextScout">
    <meta name="twitter:description" content="NextScout scout watchlist sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta name="twitter:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="theme-color" content="#0B3B8A">
  <style>
    :root { --bg:#f6f8fc; --card:#fff; --line:#dbe3f0; --text:#0f172a; --muted:#64748b; --primary:#2563eb; --shadow:0 10px 28px rgba(37,99,235,.08); }
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .title{margin:0;font-size:30px;font-weight:800}
    .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .btn{border:1px solid var(--line);background:#fff;color:var(--primary);padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700;font-size:13px;cursor:pointer}
    .table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;text-align:left;font-size:13px;border-bottom:1px solid #edf2f7}
    th{background:#f8fbff;color:#334155;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
    .inline-btn{border:1px solid var(--line);background:#fff;color:#334155;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
    .inline-btn:hover{border-color:#c8d6ea}
    .empty{padding:18px;color:var(--muted)}
    @media (max-width:840px){table{display:block;overflow-x:auto}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Takip Listem</h1>
        <div class="sub">Scout olarak izlemek istedigin oyuncular.</div>
      </div>
      <a class="btn" href="coach-dashboard.html">Dashboard</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Oyuncu</th>
            <th>Pozisyon</th>
            <th>Yas</th>
            <th>Rating</th>
            <th>Kulup</th>
            <th>Islem</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none;">Takip listesinde oyuncu yok.</div>
    </div>
  </div>

  <script>
    const KEY = 'nextscout_scout_watchlist';

    function loadItems(){
      try {
        const parsed = JSON.parse(localStorage.getItem(KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch { return []; }
    }

    function saveItems(items){ localStorage.setItem(KEY, JSON.stringify(Array.isArray(items) ? items : [])); }

    let rows = loadItems();

    function render(){
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      if(!rows.length){
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = rows.map((x) => `
        <tr>
          <td>${x.name || '-'}</td>
          <td>${x.position || '-'}</td>
          <td>${x.age || '-'}</td>
          <td>${Number(x.rating || 0).toFixed(1)}</td>
          <td>${x.club || '-'}</td>
          <td>
            <button class="inline-btn" onclick="openProfile(${Number(x.id) || 0})">Profil</button>
            <button class="inline-btn" onclick="removeItem(${Number(x.id) || 0})">Kaldir</button>
          </td>
        </tr>
      `).join('');
    }

    function openProfile(id){
      if(!id) return;
      window.location.href = `player-profile.html?user_id=${encodeURIComponent(id)}`;
    }

    function removeItem(id){
      rows = rows.filter((x) => Number(x.id) !== Number(id));
      saveItems(rows);
      render();
    }

    render();
  </script>
    <script src="assets/js/core-stability.js"></script>
</body>
</html>
