    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; color: var(--text-main); font-family: "Space Grotesk", sans-serif; background: radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%), radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%), #08131d; min-height: 100vh; }
        .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(7, 18, 36, 0.78); border-bottom: 1px solid rgba(148, 163, 184, 0.24); color: #f5fbff; backdrop-filter: blur(18px); }
        .brand { font-family: 'Poppins', sans-serif; font-size: 24px; color: #BFDBFE; text-decoration: none; }
        .top-actions { display: flex; gap: 10px; }
        .btn, a.btn, button.btn { display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; border: 1px solid rgba(255, 126, 34, 0.45) !important; background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%) !important; color: #16325c !important; padding: 10px 16px !important; border-radius: 12px !important; text-decoration: none !important; font-weight: 800 !important; font-size: 13px !important; box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24) !important; transition: transform .18s ease, box-shadow .18s ease, filter .18s ease !important; }
        .btn:hover, a.btn:hover, button.btn:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(8, 19, 29, 0.3) !important; filter: saturate(1.05); }
        .btn.primary, a.btn.primary, button.btn.primary { background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%) !important; border-color: #ff7e22 !important; color: #FFFFFF !important; box-shadow: 0 16px 28px rgba(255, 90, 31, 0.28) !important; }
        .page { max-width: 1180px; margin: 26px auto; padding: 0 20px; }
        .hero { background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 22px; padding: 24px; box-shadow: 0 18px 36px rgba(8, 19, 29, 0.34); margin-bottom: 14px; color: #f5fbff; }
        .hero h1 { font-size: 30px; margin-bottom: 8px; }
        .hero p { color: #9bb5cb; }
        .filters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 16px; }
        .control { width: 100%; padding: 10px 12px; border: 1px solid #2b4660; border-radius: 10px; background: #12293d; font-size: 14px; color: #f5fbff; }
        .results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .card { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%); border: 1px solid #2b4660; border-radius: 18px; padding: 18px; color: #f5fbff; box-shadow: 0 16px 30px rgba(8, 19, 29, 0.28); }
        .card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 4px; background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%); }
        .card:hover { border-color: #ff7e22; box-shadow: 0 18px 34px rgba(8, 19, 29, 0.34); transform: translateY(-2px); }
        .name { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
        .name strong { font-size: 20px; line-height: 1.15; }
        .badge { display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; background: rgba(47, 212, 176, 0.18); color: #8ff0d8; border: 1px solid rgba(47, 212, 176, 0.3); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 900; box-shadow: none; }
        .meta { color: #9bb5cb; font-size: 13px; display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .meta-chip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 10px; border-radius: 999px; background: rgba(255, 255, 255, 0.04); border: 1px solid #2b4660; color: #d6e8f7; font-weight: 700; }
        .reference-line { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 10px 12px; border-radius: 14px; background: rgba(255, 255, 255, 0.04); border: 1px solid #2b4660; color: #d6e8f7; font-size: 13px; font-weight: 700; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat { background: rgba(255, 255, 255, 0.04); border: 1px solid #2b4660; border-radius: 16px; padding: 12px 10px; text-align: center; box-shadow: none; }
        .stat span { display: block; font-size: 11px; color: #9bb5cb; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
        .stat strong { font-size: 20px; }
        @media (max-width: 900px) {
            .filters { grid-template-columns: 1fr 1fr; }
            .results { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="./index.html">NextScout</a>
        <div class="top-actions">
            <a class="home-btn-global" href="./index.html" style="display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:10px;border:1px solid #ff7e22;background:linear-gradient(135deg,#ff5a1f 0%,#ff7e22 100%);color:#fff;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 16px 28px rgba(255,90,31,0.28);">Ana Sayfa</a>
        </div>
    </header>

    <main class="page">
        <section class="hero">
            <h1><i class="fa-solid fa-clone"></i> Benzerini Bul (Look-alike)</h1>
            <p>Referans havuzu: Futbol 50 + Basketbol 50 + Voleybol 50 profesyonel oyuncu.</p>
            <div class="filters">
                <select class="control" id="sportInput"></select>
                <select class="control" id="referenceInput"></select>
                <select class="control" id="positionInput"></select>
                <select class="control" id="footInput">
                    <option value="">Dominant Taraf (Tümü)</option>
                    <option value="Sol">Sol</option>
                    <option value="Sag">Sağ</option>
                </select>
                <button class="btn primary" id="runSearch"><i class="fa-solid fa-magnifying-glass"></i> Analizi Çalıştır</button>
            </div>
        </section>

        <section class="results" id="results"></section>
    </main>

    <script>
        const SPORTS = {
            Futbol: {
                positions: ['GK', 'CB', 'LB', 'RB', 'DM', 'CM', 'AM', 'LW', 'RW', 'ST'],
                names: ['Arda Güler', 'Hakan Çalhanoğlu', 'Kenan Yıldız', 'İrfan Can Kahveci', 'Cengiz Ünder', 'Orkun Kökçü', 'Ferdi Kadıoğlu', 'Merih Demiral', 'Çağlar Söyüncü', 'Zeki Çelik', 'Barış Alper Yılmaz', 'Kerem Aktürkoğlu', 'Yunus Akgün', 'Can Uzun', 'Semih Kılıçsoy', 'Ronaldo', 'Messi', 'Mbappe', 'Haaland', 'Vinicius Jr', 'Bellingham', 'De Bruyne', 'Pedri', 'Musiala', 'Saka']
            },
            Basketbol: {
                positions: ['PG', 'SG', 'SF', 'PF', 'C'],
                names: ['Alperen Sengun', 'Cedi Osman', 'Furkan Korkmaz', 'Shane Larkin', 'Scottie Wilbekin', 'LeBron James', 'Stephen Curry', 'Kevin Durant', 'Nikola Jokic', 'Luka Doncic', 'Giannis Antetokounmpo', 'Jayson Tatum', 'Devin Booker', 'Ja Morant', 'Kawhi Leonard', 'Damian Lillard', 'Joel Embiid', 'Anthony Davis', 'Jimmy Butler', 'Kyrie Irving', 'Jaylen Brown', 'Tyrese Haliburton', 'Donovan Mitchell', 'Trae Young', 'Brunson']
            },
            Voleybol: {
                positions: ['Pasör', 'Smaçör', 'Orta Oyuncu', 'Libero', 'Çapraz'],
                names: ['Ebrar Karakurt', 'Melissa Vargas', 'Zehra Güneş', 'Hande Baladın', 'Simge Aköz', 'Meliha Diken', 'Cansu Özbay', 'Eda Erdem', 'Ayça Aykaç', 'Naz Aydemir', 'Gabi Guimaraes', 'Paola Egonu', 'Zhu Ting', 'Kelsey Robinson', 'Jordan Larson', 'Brankica Mihajlovic', 'Tijana Boskovic', 'Kim Yeon-koung', 'Alessia Orro', 'Monica De Gennaro', 'Ana Cristina', 'Isabelle Haak', 'Maja Ognjenovic', 'Myrtha', 'Nika Daalderop']
            }
        };

        const CITIES = ['İstanbul', 'Ankara', 'İzmir', 'Bursa', 'Antalya', 'Trabzon', 'Konya', 'Adana', 'Samsun', 'Kayseri'];

        function buildProPlayers(sportName) {
            const { names, positions } = SPORTS[sportName];
            const rows = [];
            for (let i = 0; i < 50; i++) {
                const baseName = names[i % names.length];
                const suffix = i >= names.length ? ` ${Math.floor(i / names.length) + 1}` : '';
                rows.push({
                    id: `${sportName}-pro-${i + 1}`,
                    sport: sportName,
                    name: `${baseName}${suffix}`,
                    position: positions[i % positions.length],
                    foot: i % 3 === 0 ? 'Sol' : 'Sağ',
                    speed: 70 + ((i * 7) % 28),
                    technique: 72 + ((i * 5) % 26),
                    physical: 68 + ((i * 9) % 30)
                });
            }
            return rows;
        }

        function buildCandidates(sportName) {
            const { positions } = SPORTS[sportName];
            const rows = [];
            for (let i = 0; i < 50; i++) {
                rows.push({
                    id: `${sportName}-cand-${i + 1}`,
                    sport: sportName,
                    name: `${sportName} Aday ${i + 1}`,
                    city: CITIES[i % CITIES.length],
                    position: positions[i % positions.length],
                    foot: i % 2 === 0 ? 'Sağ' : 'Sol',
                    speed: 65 + ((i * 6) % 30),
                    technique: 66 + ((i * 8) % 28),
                    physical: 64 + ((i * 10) % 30)
                });
            }
            return rows;
        }

        const PRO_PLAYERS = [...buildProPlayers('Futbol'), ...buildProPlayers('Basketbol'), ...buildProPlayers('Voleybol')];
        const CANDIDATES = [...buildCandidates('Futbol'), ...buildCandidates('Basketbol'), ...buildCandidates('Voleybol')];

        function setSportOptions() {
            const sportInput = document.getElementById('sportInput');
            sportInput.innerHTML = Object.keys(SPORTS).map((s) => `<option value="${s}">${s}</option>`).join('');
            sportInput.value = 'Futbol';
        }

        function setReferenceOptions() {
            const sport = document.getElementById('sportInput').value;
            const select = document.getElementById('referenceInput');
            const refs = PRO_PLAYERS.filter((p) => p.sport === sport);
            select.innerHTML = refs.map((p) => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        function setPositionOptions() {
            const sport = document.getElementById('sportInput').value;
            const positionInput = document.getElementById('positionInput');
            const opts = SPORTS[sport].positions;
            positionInput.innerHTML = `<option value="">Pozisyon (Tümü)</option>${opts.map((p) => `<option value="${p}">${p}</option>`).join('')}`;
        }

        function getSelectedReference() {
            const refId = document.getElementById('referenceInput').value;
            return PRO_PLAYERS.find((p) => p.id === refId) || PRO_PLAYERS[0];
        }

        function computeSimilarity(candidate, ref) {
            const speedDiff = Math.abs(candidate.speed - ref.speed);
            const techDiff = Math.abs(candidate.technique - ref.technique);
            const physDiff = Math.abs(candidate.physical - ref.physical);
            const weightedDiff = (speedDiff * 0.35) + (techDiff * 0.45) + (physDiff * 0.20);
            return Math.max(50, Math.round(100 - weightedDiff));
        }

        function render(data, refName) {
            const root = document.getElementById('results');
            if (!data.length) {
                root.innerHTML = '<article class="card"><strong>Sonuç bulunamadı.</strong><div class="meta">Filtreleri gevşetip tekrar dene.</div></article>';
                return;
            }

            root.innerHTML = data.map((p) => `
                <article class="card">
                    <div class="name"><strong>${p.name}</strong><span class="badge">%${p.similarity} benzer</span></div>
                    <div class="meta">
                        <span class="meta-chip"><i class="fa-solid fa-futbol"></i> ${p.sport}</span>
                        <span class="meta-chip"><i class="fa-solid fa-location-dot"></i> ${p.city}</span>
                        <span class="meta-chip"><i class="fa-solid fa-shield"></i> ${p.position}</span>
                        <span class="meta-chip"><i class="fa-solid fa-shoe-prints"></i> ${p.foot}</span>
                    </div>
                    <div class="reference-line"><i class="fa-solid fa-user"></i> Referans: ${refName}</div>
                    <div class="stats">
                        <div class="stat"><span>Hiz</span><strong>${p.speed}</strong></div>
                        <div class="stat"><span>Teknik</span><strong>${p.technique}</strong></div>
                        <div class="stat"><span>Fizik</span><strong>${p.physical}</strong></div>
                    </div>
                </article>
            `).join('');
        }

        function runAnalysis() {
            const sport = document.getElementById('sportInput').value;
            const ref = getSelectedReference();
            const position = document.getElementById('positionInput').value;
            const foot = document.getElementById('footInput').value;

            const filtered = CANDIDATES
                .filter((p) => p.sport === sport)
                .filter((p) => (position ? p.position === position : true))
                .filter((p) => (foot ? p.foot === foot : true))
                .map((p) => ({ ...p, similarity: computeSimilarity(p, ref) }))
                .sort((a, b) => b.similarity - a.similarity);

            render(filtered, ref.name);
        }

        setSportOptions();
        setPositionOptions();
        setReferenceOptions();

        document.getElementById('sportInput')?.addEventListener('change', () => {
            setPositionOptions();
            setReferenceOptions();
            runAnalysis();
        });

        document.getElementById('runSearch')?.addEventListener('click', runAnalysis);
        runAnalysis();
    </script>
    <script src="assets/js/core-stability.js"></script>
</body>
</html>
