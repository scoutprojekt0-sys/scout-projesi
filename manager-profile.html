<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Profili - NextScout</title>
    <meta name="description" content="NextScout manager profile sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://nextscout.app/manager-profile.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="NextScout">
    <meta property="og:title" content="Manager Profili - NextScout">
    <meta property="og:description" content="NextScout manager profile sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta property="og:url" content="https://nextscout.app/manager-profile.html">
    <meta property="og:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Manager Profili - NextScout">
    <meta name="twitter:description" content="NextScout manager profile sayfasi: futbol scout, kulup ve oyuncu odakli platform icerigi.">
    <meta name="twitter:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="theme-color" content="#0B3B8A">
  <style>
    :root { --bg:#f4f7fc; --card:#fff; --line:#dbe3f0; --text:#0f172a; --muted:#64748b; --primary:#2563eb; --shadow:0 12px 32px rgba(37,99,235,.08); }
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:22px 16px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .title{margin:0;font-size:30px;font-weight:800}
    .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .btn{border:1px solid var(--line);background:#fff;color:var(--primary);padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700;font-size:13px;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .layout{display:grid;grid-template-columns:2fr 1fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px}
    .section-title{margin:0 0 10px 0;font-size:16px;font-weight:800}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{display:flex;flex-direction:column;gap:6px}
    .label{font-size:12px;font-weight:700;color:#334155}
    .input,.textarea,.select{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;background:#fff;color:var(--text)}
    .textarea{min-height:90px;resize:vertical}
    .full{grid-column:1/-1}
    .act{display:flex;gap:8px;margin-top:12px}
    .photo-box{display:flex;flex-direction:column;align-items:center;gap:10px}
    .photo{width:120px;height:120px;border-radius:14px;border:1px solid var(--line);object-fit:cover;background:#eef2ff}
    .row{display:flex;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid #edf2f7;font-size:13px}
    .row:last-child{border-bottom:0}
    .muted{color:var(--muted)}
    .ok{color:#059669;font-size:12px;min-height:16px;margin-top:8px;font-weight:700}
    @media (max-width:900px){.layout{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 class="title">Manager Profili</h1>
        <div class="sub">Isim ve foto dahil profil bilgilerini duzenle.</div>
      </div>
      <div style="display:flex;gap:8px;">
        <a class="btn" href="manager-public-profile.html">Public Gorunum</a>
        <a class="btn" href="manager-dashboard.html">Dashboard</a>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h2 class="section-title">Profil Bilgileri</h2>
        <form id="managerForm" class="form-grid">
          <div class="field">
            <label class="label" for="name">Isim Soyisim</label>
            <input class="input" id="name" required placeholder="Ad Soyad">
          </div>
          <div class="field">
            <label class="label" for="agency">Sirket / Ajans</label>
            <input class="input" id="agency" placeholder="Ornek Sports Management">
          </div>
          <div class="field">
            <label class="label" for="city">Sehir</label>
            <input class="input" id="city" placeholder="Istanbul">
          </div>
          <div class="field">
            <label class="label" for="country">Ulke</label>
            <input class="input" id="country" placeholder="Turkiye">
          </div>
          <div class="field">
            <label class="label" for="phone">Telefon</label>
            <input class="input" id="phone" placeholder="+90 5xx xxx xx xx">
          </div>
          <div class="field full">
            <label class="label" for="branch">Brans</label>
            <select class="select" id="branch">
              <option value="">Seciniz</option>
              <option value="Futbol">Futbol</option>
              <option value="Basketbol">Basketbol</option>
              <option value="Voleybol">Voleybol</option>
              <option value="Coklu Brans">Coklu Brans</option>
            </select>
          </div>
          <div class="field full">
            <label class="label" for="bio">Hakkimda</label>
            <textarea class="textarea" id="bio" placeholder="Kisa manager tanitimi..."></textarea>
          </div>
          <div class="act full">
            <button class="btn btn-primary" type="submit">Kaydet</button>
            <button class="btn" type="button" id="resetBtn">Sifirla</button>
          </div>
        </form>
        <div id="saveMsg" class="ok"></div>
      </div>

      <div class="card">
        <h2 class="section-title">Profil Fotografi</h2>
        <div class="photo-box">
          <img id="photoPreview" class="photo" alt="Manager Fotograf">
          <input type="file" id="photoInput" accept="image/*">
          <button class="btn" type="button" id="clearPhotoBtn">Fotografi Kaldir</button>
        </div>

        <h2 class="section-title" style="margin-top:14px;">Public Ozet</h2>
        <div class="row"><span class="muted">Isim</span><strong id="sumName">-</strong></div>
        <div class="row"><span class="muted">Brans</span><strong id="sumBranch">-</strong></div>
        <div class="row"><span class="muted">Ajans</span><strong id="sumAgency">-</strong></div>
        <div class="row"><span class="muted">Sehir</span><strong id="sumCity">-</strong></div>
        <div class="row"><span class="muted">Ulke</span><strong id="sumCountry">-</strong></div>
      </div>
    </div>
  </div>

  <script>
    const KEY = 'nextscout_manager_profile';

    function getApiBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    }

    function getToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function authHeaders() {
      const token = getToken();
      if (!token) return null;
      return {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': `Bearer ${token}`,
      };
    }

    function defaults(){
      return { name:'Manager', agency:'', city:'', country:'Turkiye', phone:'', branch:'Futbol', bio:'', photo:'' };
    }

    function loadProfile(){
      try {
        const raw = localStorage.getItem(KEY);
        if(!raw) return defaults();
        const parsed = JSON.parse(raw);
        return Object.assign(defaults(), parsed || {});
      } catch { return defaults(); }
    }

    function saveProfile(p){ localStorage.setItem(KEY, JSON.stringify(p)); }

    function setForm(p){
      document.getElementById('name').value = p.name || '';
      document.getElementById('agency').value = p.agency || '';
      document.getElementById('city').value = p.city || '';
      document.getElementById('country').value = p.country || '';
      document.getElementById('phone').value = p.phone || '';
      document.getElementById('branch').value = p.branch || '';
      document.getElementById('bio').value = p.bio || '';
      document.getElementById('photoPreview').src = p.photo || 'https://via.placeholder.com/120x120?text=Manager';
    }

    function readForm(current){
      return {
        name: document.getElementById('name').value.trim(),
        agency: document.getElementById('agency').value.trim(),
        city: document.getElementById('city').value.trim(),
        country: document.getElementById('country').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        branch: document.getElementById('branch').value,
        bio: document.getElementById('bio').value.trim(),
        photo: current.photo || ''
      };
    }

    function renderSummary(p){
      document.getElementById('sumName').textContent = p.name || '-';
      document.getElementById('sumBranch').textContent = p.branch || '-';
      document.getElementById('sumAgency').textContent = p.agency || '-';
      document.getElementById('sumCity').textContent = p.city || '-';
      document.getElementById('sumCountry').textContent = p.country || '-';
    }

    async function loadBackendProfile() {
      const headers = authHeaders();
      if (!headers) return null;
      const res = await fetch(`${getApiBaseUrl()}/staff-profiles/me`, { headers: { 'Accept': 'application/json', 'Authorization': headers.Authorization } });
      if (!res.ok) return null;
      const payload = await res.json();
      const data = payload?.data || {};
      return {
        name: data.name || '',
        agency: data.organization || '',
        city: data.city || '',
        country: data.country || '',
        phone: data.phone || '',
        branch: data.branch || '',
        bio: data.bio || '',
        photo: data.profile_photo_url || '',
      };
    }

    async function saveBackendProfile(p) {
      const headers = authHeaders();
      if (!headers) return false;
      const body = {
        name: p.name,
        city: p.city,
        phone: p.phone,
        organization: p.agency,
        experience_years: null,
        bio: p.bio,
        country: p.country,
        branch: p.branch,
        profile_photo_url: p.photo || '',
      };
      const res = await fetch(`${getApiBaseUrl()}/staff-profiles/me`, {
        method: 'PUT',
        headers,
        body: JSON.stringify(body),
      });
      return res.ok;
    }

    let profile = loadProfile();

    async function init() {
      const remote = await loadBackendProfile();
      if (remote) {
        profile = Object.assign(profile, remote);
        saveProfile(profile);
      }
      setForm(profile);
      renderSummary(profile);
    }

    document.getElementById('managerForm')?.addEventListener('submit', async function(e){
      e.preventDefault();
      profile = readForm(profile);
      if(!profile.name){
        document.getElementById('saveMsg').textContent = 'Isim zorunlu.';
        return;
      }

      let backendSaved = false;
      try {
        backendSaved = await saveBackendProfile(profile);
      } catch (error) {
        backendSaved = false;
      }

      saveProfile(profile);
      renderSummary(profile);
      document.getElementById('saveMsg').textContent = backendSaved ? 'Profil backend kaydedildi.' : 'Profil local kaydedildi.';
      setTimeout(() => { document.getElementById('saveMsg').textContent = ''; }, 1800);
    });

    document.getElementById('resetBtn')?.addEventListener('click', function(){
      profile = defaults();
      saveProfile(profile);
      setForm(profile);
      renderSummary(profile);
      document.getElementById('saveMsg').textContent = 'Profil sifirlandi.';
      setTimeout(() => { document.getElementById('saveMsg').textContent = ''; }, 1500);
    });

    document.getElementById('photoInput')?.addEventListener('change', async function(e){
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async function(evt){
        profile.photo = String((evt.target && evt.target.result) || '');
        document.getElementById('photoPreview').src = profile.photo || 'https://via.placeholder.com/120x120?text=Manager';
        saveProfile(profile);
        try { await saveBackendProfile(profile); } catch (error) {}
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('clearPhotoBtn')?.addEventListener('click', async function(){
      profile.photo = '';
      saveProfile(profile);
      document.getElementById('photoPreview').src = 'https://via.placeholder.com/120x120?text=Manager';
      document.getElementById('photoInput').value = '';
      try { await saveBackendProfile(profile); } catch (error) {}
    });

    init();
  </script>
    <script src="assets/js/core-stability.js"></script>
</body>
</html>
