            }

                grid-template-columns: 1fr;
            }

        // Initialize page
        function initPage() {
            renderLeagueTabs();
            loadFirstLeague();
        }

        // Render League Tabs
        function renderLeagueTabs() {
            const container = document.getElementById('leagueTabs');
            container.innerHTML = '';

            Object.keys(LEAGUES_DATABASE).forEach((country, index) => {
                const tab = document.createElement('button');
                tab.className = 'league-tab' + (index === 0 ? ' active' : '');
                tab.textContent = LEAGUES_DATABASE[country].flag + ' ' + LEAGUES_DATABASE[country].division;
                tab.onclick = () => switchLeague(country);
                container.appendChild(tab);
            });
        }

        // Switch League
        function switchLeague(country) {
            // Update tabs
            document.querySelectorAll('.league-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Load league data
            loadLeagueData(country);
        }

        // Load First League
        function loadFirstLeague() {
            const firstCountry = Object.keys(LEAGUES_DATABASE)[0];
            loadLeagueData(firstCountry);
        }

        // Load League Data
        function loadLeagueData(country) {
            const league = LEAGUES_DATABASE[country];
            const container = document.getElementById('tabsContent');
            container.innerHTML = '';

            // Create tab pane
            const tabPane = document.createElement('div');
            tabPane.className = 'tab-pane active';

            // Standings Section
            const standingsSection = createStandingsSection(league);
            tabPane.appendChild(standingsSection);

            // Matches Section
            const matchesSection = createMatchesSection(league);
            tabPane.appendChild(matchesSection);

            // Fixtures Section
            const fixturesSection = createFixturesSection(league);
            tabPane.appendChild(fixturesSection);

            container.appendChild(tabPane);
        }

        // Create Standings Section
        function createStandingsSection(league) {
            const card = document.createElement('div');
            card.className = 'standings-card';

            let html = `
                <h2>
                    <i class="fas fa-list-ol"></i>
                    ${league.flag} ${league.name} - Puan Durumu
                </h2>
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th style="text-align: center; width: 40px;">S</th>
                            <th style="text-align: left;">TakÄ±m</th>
                            <th style="text-align: center;">O</th>
                            <th style="text-align: center;">G</th>
                            <th style="text-align: center;">B</th>
                            <th style="text-align: center;">M</th>
                            <th style="text-align: center;">A</th>
                            <th style="text-align: center;">Y</th>
                            <th style="text-align: center;">P</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            league.teams.forEach((team, index) => {
                const gd = team.gf - team.ga;
                html += `
                    <tr>
                        <td class="position">${index + 1}</td>
                        <td>
                            <div class="team-name">
                                <div class="team-logo">${team.name.substring(0, 2).toUpperCase()}</div>
                                <span>${team.name}</span>
                            </div>
                        </td>
                        <td class="played">${team.played}</td>
                        <td class="wins">${team.wins}</td>
                        <td class="draws">${team.draws}</td>
                        <td class="losses">${team.losses}</td>
                        <td class="played">${team.gf}-${team.ga}</td>
                        <td class="played">${gd > 0 ? '+' + gd : gd}</td>
                        <td class="points">${team.points}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            card.innerHTML = html;
            return card;
        }

        // Create Matches Section
        function createMatchesSection(league) {
            const card = document.createElement('div');
            card.className = 'matches-card';

            let html = `
                <h2>
                    <i class="fas fa-futbol"></i>
                    ${league.flag} ${league.name} - Son MaÃ§lar
                </h2>
            `;

            league.matches.forEach(match => {
                const statusClass = match.status === 'finished' ? 'finished' : match.status === 'live' ? 'live' : 'upcoming';
                const statusText = match.status === 'finished' ? 'Bitti' : match.status === 'live' ? 'ğŸ”´ CANLI' : 'YaklaÅŸan';

                html += `
                    <div class="match-item ${statusClass}">
                        <div class="match-date">${new Date(match.date).toLocaleDateString('tr-TR', { month: 'short', day: 'numeric' })}</div>
                        <div class="match-teams">
                            <div class="team">
                                <div class="team-info">
                                    <div class="team-name-small">${match.home}</div>
                                    <div class="team-division">vs</div>
                                </div>
                                <div class="logo">${match.home.substring(0, 2)}</div>
                            </div>
                            <div class="match-score">
                                <div class="score">${match.score}</div>
                            </div>
                            <div class="team">
                                <div class="logo">${match.away.substring(0, 2)}</div>
                                <div class="team-info">
                                    <div class="team-name-small">${match.away}</div>
                                    <div class="team-division">vs</div>
                                </div>
                            </div>
                        </div>
                        <div class="match-status ${match.status}">${statusText}</div>
                    </div>
                `;
            });

            card.innerHTML = html;
            return card;
        }

        // Create Fixtures Section
        function createFixturesSection(league) {
            const card = document.createElement('div');
            card.className = 'matches-card';

            let html = `
                <h2>
                    <i class="fas fa-calendar-alt"></i>
                    ${league.flag} ${league.name} - FikstÃ¼r
                </h2>
                <div class="fixtures-grid">
            `;

            league.fixtures.forEach(fixture => {
                html += `
                    <div class="fixture-week">
                        <div class="fixture-week-header">
                            <i class="fas fa-calendar"></i>
                            ${fixture.week}
                        </div>
                `;

                fixture.matches.forEach(match => {
                    html += `
                        <div class="fixture-match">
                            <div class="fixture-teams">
                                <div class="fixture-team">${match.home}</div>
                                <div class="fixture-vs">vs</div>
                                <div class="fixture-team">${match.away}</div>
                            </div>
                            <div class="fixture-date">
                                <i class="fas fa-clock"></i> ${match.date}
                            </div>
                        </div>
                    `;
                });

                html += `
                    </div>
                `;
            });

            html += `
                </div>
            `;

            card.innerHTML = html;
            return card;
        }

        // Initialize on page load
        window.addEventListener('load', initPage);
