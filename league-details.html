        // Get URL Parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                country: params.get('country') || 'Turkiye',
                sport: params.get('sport') || 'Futbol',
                gender: params.get('gender') || 'Bay',
                league: params.get('league') || '',
                amateur: params.get('amateur') === '1'
            };
        }

        function getApiBaseUrl() {
            if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
            return '/api';
        }

        async function fetchAmateurStandingsFromApi(params) {
            const apiBase = getApiBaseUrl();
            const query = new URLSearchParams();
            if (params.country) query.set('city', params.country);

            const response = await fetch(`${apiBase}/amateur/standings?${query.toString()}`, {
                headers: { Accept: 'application/json' },
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const body = await response.json();
            const rows = Array.isArray(body?.data) ? body.data : [];
            if (!rows.length) return null;

            return {
                flag: 'ğŸŸï¸',
                name: `${params.league || 'Amator Lig'} (API)` ,
                teams: rows.map((r) => ({
                    name: r.team_name,
                    played: Number(r.played || 0),
                    wins: Number(r.won || 0),
                    draws: Number(r.drawn || 0),
                    losses: Number(r.lost || 0),
                    gf: Number(r.gf || 0),
                    ga: Number(r.ga || 0),
                    points: Number(r.points || 0),
                })),
                matches: [],
                fixtures: [],
            };
        }

        function getCommunityLeagueData(params) {
            let rows = [];
            try {
                rows = JSON.parse(localStorage.getItem('nextscout_amateur_standings') || '[]');
            } catch (error) {
                rows = [];
            }
            if (!Array.isArray(rows) || rows.length === 0) return null;

            const countryKey = (params.country || 'Turkiye').toLowerCase();
            const sportKey = (params.sport || 'futbol').toLowerCase();
            const leagueKey = (params.league || '').toLowerCase();

            const picked = rows.find((row) => {
                const group = (row?.group || '').toLowerCase(); // country__sport__league__season
                if (!group) return false;
                if (!group.includes(`${countryKey}__`)) return false;
                if (!group.includes(`__${sportKey}__`)) return false;
                if (leagueKey && !group.includes(`__${leagueKey}__`)) return false;
                return true;
            });

            if (!picked || !Array.isArray(picked.standings)) return null;
            const segments = (picked.group || '').split('__');
            const leagueName = segments[2] || params.league || 'Amator Lig';
            const season = segments[3] || '-';

            return {
                flag: 'ğŸŸï¸',
                name: `${leagueName} (Topluluk/Dogrulanmis)`,
                teams: picked.standings.map((t) => ({
                    name: t.team,
                    played: Number(t.played || 0),
                    wins: Number(t.won || 0),
                    draws: Number(t.drawn || 0),
                    losses: Number(t.lost || 0),
                    gf: Number(t.gf || 0),
                    ga: Number(t.ga || 0),
                    points: Number(t.points || 0),
                })),
                matches: [],
                fixtures: [],
                season
            };
        }

        // Initialize Page
        async function initializePage() {
            const params = getUrlParams();
            let leagueData = LEAGUES_DATABASE[params.country]?.[params.gender]?.[params.sport] || getCommunityLeagueData(params);
            if (params.amateur) {
                try {
                    const apiData = await fetchAmateurStandingsFromApi(params);
                    if (apiData) leagueData = apiData;
                } catch (error) {}
            }

            if (!leagueData) {
                document.querySelector('.container').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>Lig BulunamadÄ±</h2>
                        <p>Ä°stenilen lig iÃ§in veri yok.</p>
                    </div>
                `;
                return;
            }

            // Set Header
            document.getElementById('leagueFlagPlaceholder').textContent = leagueData.flag;
            document.getElementById('leagueName').textContent = leagueData.name;
            document.getElementById('leagueInfo').textContent = `${params.sport} - ${params.gender}${params.league ? ` - ${params.league}` : ''}`;

            // Render Standings
            renderStandings(leagueData.teams);

            // Render Matches
            renderMatches(leagueData.matches);

            // Render Fixtures
            renderFixtures(leagueData.fixtures);
        }

        // Render Standings
        function renderStandings(teams) {
            const tbody = document.getElementById('standingsBody');
            tbody.innerHTML = teams.map((team, index) => `
                <tr>
                    <td class="team-rank">${index + 1}</td>
                    <td class="team-name">${team.name}</td>
                    <td>${team.played}</td>
                    <td>${team.wins}</td>
                    <td>${team.draws}</td>
                    <td>${team.losses}</td>
                    <td>${team.gf} - ${team.ga}</td>
                    <td>${team.gf - team.ga > 0 ? '+' : ''}${team.gf - team.ga}</td>
                    <td><strong>${team.points}</strong></td>
                </tr>
            `).join('');
        }

        // Render Matches
        function renderMatches(matches) {
            const container = document.getElementById('matchesContainer');
            if (!matches || matches.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar"></i>
                        <p>MaÃ§ bulunmamaktadÄ±r.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = matches.map(match => {
                let statusBadge = '';
                let statusClass = '';
                
                if (match.status === 'finished') {
                    statusBadge = 'âœ“ Bitti';
                    statusClass = 'status-finished';
                } else if (match.status === 'live') {
                    statusBadge = 'ğŸ”´ CANLI';
                    statusClass = 'status-live';
                } else {
                    statusBadge = 'â° YaklaÅŸan';
                    statusClass = 'status-upcoming';
                }

                return `
                    <div class="match-week">
                        <div class="match-item">
                            <div class="match-teams">
                                <span class="match-team">${match.home}</span>
                                <span class="match-score">${match.score}</span>
                                <span class="match-team">${match.away}</span>
                            </div>
                            <div style="display: flex; gap: 15px; align-items: center;">
                                <span class="match-date">${match.date}</span>
                                <span class="status-badge ${statusClass}">${statusBadge}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render Fixtures
        function renderFixtures(fixtures) {
            const container = document.getElementById('fixturesContainer');
            if (!fixtures || fixtures.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-alt"></i>
                        <p>FixtÃ¼r bulunmamaktadÄ±r.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = fixtures.map(week => `
                <div class="fixture-week">
                    <div class="fixture-week-title">${week.week}</div>
                    ${week.matches.map(match => `
                        <div class="fixture-match">
                            <div class="fixture-matchup">
                                <span class="fixture-team">${match.home}</span>
                                <span class="fixture-vs">vs</span>
                                <span class="fixture-team">${match.away}</span>
                            </div>
                            <div class="fixture-time">${match.date}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        // Switch Tabs
        function switchTab(button, tabName) {
            // Remove active from all buttons and contents
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Add active to clicked button and corresponding content
            button.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
