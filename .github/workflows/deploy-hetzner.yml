name: Deploy Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch/tag/sha) to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Before Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
        env:
          APP_ENV: local
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

      - name: Prepare test environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate
          php artisan migrate --force

      - name: Execute tests
        run: php artisan test

  deploy:
    name: Deploy To Hetzner
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p "${HETZNER_PORT}" "${HETZNER_HOST}" >> ~/.ssh/known_hosts
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || '22' }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/hetzner_deploy_key -p "${HETZNER_PORT}" "${HETZNER_USER}@${HETZNER_HOST}" <<'EOF'
          set -euo pipefail

          cd "$HOME/apps/scout_api"

          git fetch origin main
          git reset --hard origin/main

          docker compose --env-file .env.production -f compose.prod.yml build app --no-cache
          docker compose --env-file .env.production -f compose.prod.yml up -d --force-recreate app queue scheduler nginx
          docker compose --env-file .env.production -f compose.prod.yml exec -T app php artisan migrate --force
          docker compose --env-file .env.production -f compose.prod.yml exec -T app php artisan optimize:clear
          docker compose --env-file .env.production -f compose.prod.yml exec -T app php artisan config:cache
          docker compose --env-file .env.production -f compose.prod.yml exec -T app php artisan route:cache
          EOF
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || '22' }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsS "${HETZNER_HEALTHCHECK_URL}" > /dev/null; then
              echo "Hetzner deployment is healthy."
              exit 0
            fi
            sleep 2
          done

          echo "Hetzner health check failed." >&2
          exit 1
        env:
          HETZNER_HEALTHCHECK_URL: ${{ secrets.HETZNER_HEALTHCHECK_URL }}
