services:
  ai-worker:
    build:
      context: .
      dockerfile: ai-worker/Dockerfile.prod
    image: scout-api/ai-worker:prod
    restart: unless-stopped
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8010/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: scout-api/app:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      CONTAINER_ROLE: app
    depends_on:
      ai-worker:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/up >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue:
    image: scout-api/app:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      CONTAINER_ROLE: queue
    depends_on:
      ai-worker:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache

  scheduler:
    image: scout-api/app:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      CONTAINER_ROLE: scheduler
    depends_on:
      ai-worker:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
        aliases:
          - api

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app_storage:
  app_cache:
  db_data:
  redis_data:
