<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesajlarım - NextScout</title>
  <meta name="description" content="Mesaj ve bildirim merkezi: teklifler, duyurular ve sistem bildirimlerini tek ekranda görün.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://nextscout.pro/notifications.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:site_name" content="NextScout">
  <meta property="og:title" content="Mesajlar ve Bildirimler | NextScout">
  <meta property="og:description" content="Mesaj ve bildirim merkezi: teklifler, duyurular ve sistem bildirimlerini tek ekranda görün.">
  <meta property="og:url" content="https://nextscout.pro/notifications.html">
    <meta property="og:image" content="https://nextscout.pro/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://nextscout.pro/assets/img/og-default.jpg">
  <meta name="theme-color" content="#2563eb">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #08131d;
      --card: #0f1f2e;
      --line: #2b4660;
      --text: #f5fbff;
      --muted: #9bb5cb;
      --primary: #8fd3ff;
      --primary-soft: rgba(255, 255, 255, 0.04);
      --success: #2fd4b0;
      --warning: #ff7e22;
      --danger: #f87171;
      --shadow: 0 12px 28px rgba(2, 6, 23, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, #1a3f63 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #3d1f2e 0%, transparent 28%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
    }

    .title-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(255, 126, 34, 0.45);
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.92) 100%);
      color: #16325c;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(8, 19, 29, 0.24);
    }
    .home-btn {
      background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%);
      border: 1px solid rgba(255, 126, 34, 0.6);
      color: #ffffff;
      border-radius: 12px;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 16px 28px rgba(255,90,31,0.28);
    }

    .dashboard-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 14px;
    }
    .quick-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .quick-bar::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }
    .quick-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .quick-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      color: #dbeafe;
    }
    .quick-pill strong { color: #fff; }
    .quick-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .layout > * { min-width: 0; }

    .panel {
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .panel-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: #dbeafe;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: linear-gradient(135deg, #ff5a1f 0%, #ff7e22 100%);
      color: #fff;
      border-color: rgba(255, 126, 34, 0.6);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 8px;
      width: 100%;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 13px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .list {
      max-height: 70vh;
      overflow: auto;
    }

    .msg-item {
      border-bottom: 1px solid #334155;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.2s ease;
      position: relative;
    }

    .msg-item:hover { background: rgba(255, 255, 255, 0.04); }
    .msg-item.active { background: rgba(255, 255, 255, 0.06); }
    .msg-item.unread::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      position: absolute;
      top: 16px;
      right: 14px;
    }

    .msg-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .msg-name {
      font-size: 13px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .msg-time {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .msg-subject {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .msg-preview {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      border-radius: 999px;
      padding: 3px 8px;
      font-weight: 700;
      border: 1px solid;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge.read { color: #a7f3d0; background: rgba(16, 185, 129, 0.16); border-color: #2fd4b0; }
    .badge.unread { color: #fde68a; background: rgba(245, 158, 11, 0.16); border-color: #ff7e22; }
    .badge.inbox { color: #bfdbfe; background: rgba(59, 130, 246, 0.14); border-color: #60a5fa; }
    .badge.sent { color: #ddd6fe; background: rgba(139, 92, 246, 0.14); border-color: #8b5cf6; }

    .detail {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      padding: 28px;
    }

    .detail-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .detail-title {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
      word-break: normal;
      overflow-wrap: anywhere;
      hyphens: auto;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-body {
      padding: 16px;
      color: #e2e8f0;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-line;
      flex: 1;
      word-break: normal;
      overflow-wrap: anywhere;
      hyphens: auto;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-danger {
      background: #2b3440;
      color: var(--danger);
      border-color: #7f1d1d;
    }

    .empty-list {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .compose-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.62);
      z-index: 1700;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    .compose-modal.show { display: flex; }

    .compose-card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(18, 41, 61, 0.98) 0%, rgba(15, 31, 46, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .compose-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #ff5a1f 0%, #ff7e22 55%, #60a5fa 100%);
    }

    .compose-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .compose-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #dbeafe;
    }

    .compose-body {
      padding: 16px 18px;
      display: grid;
      gap: 10px;
    }

    .compose-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 10px;
    }

    .compose-body textarea {
      min-height: 160px;
      resize: vertical;
    }

    .compose-note {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .compose-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 18px 18px;
      flex-wrap: wrap;
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .detail { min-height: 45vh; }
      .list { max-height: 45vh; }
      .wrap { padding: 14px 12px; }
      .title { font-size: 24px; }
      .header { align-items: flex-start; flex-direction: column; }
      .header-actions { width: 100%; }
      .quick-bar { flex-direction: column; align-items: flex-start; }
      .quick-actions { width: 100%; }
    }

    @media (max-width: 560px) {
      .title { font-size: 22px; }
      .title-sub { font-size: 13px; }
      .btn { padding: 8px 10px; font-size: 12px; }
      .panel-head { padding: 12px; }
      .search-row { grid-template-columns: 1fr; }
      .wrap { padding: 12px 10px 18px; overflow-x: hidden; }
      .layout { gap: 10px; }
      .panel, .detail { width: 100%; min-width: 0; overflow-x: hidden; }
      .msg-item { padding-right: 10px; }
      .msg-item.unread::before { right: 10px; }
      .msg-top { align-items: flex-start; }
      .msg-time { max-width: 42%; text-align: right; }
      .detail-head { padding: 12px; }
      .detail-title { font-size: 18px; }
      .detail-body { padding: 12px; font-size: 13px; }
      .detail-actions { padding: 12px; }
      .detail-actions .btn { width: 100%; }
      .compose-grid { grid-template-columns: 1fr; }
      .compose-actions .btn { width: 100%; }
    }
  </style>
    <link rel="stylesheet" href="assets/css/mobile-unified.css">
    <link rel="stylesheet" href="assets/css/mobile-polish.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Mesajlarım</h1>
        <div class="title-sub">Gelen, giden, okundu ve okunmadı mesajları buradan yönetebilirsin.</div>
      </div>
      <div class="header-actions">
        <a class="btn home-btn" href="index.html"><i class="fas fa-house"></i><span>Ana Sayfa</span></a>
        <a class="btn dashboard-btn" id="dashboardBtn" href="player-dashboard.html"><i class="fas fa-table-columns"></i><span>Dashboard</span></a>
      </div>
    </div>

    <div class="quick-bar">
      <div class="quick-stats">
        <div class="quick-pill"><span>Toplam</span><strong id="quickTotal">0</strong></div>
        <div class="quick-pill"><span>Okunmadı</span><strong id="quickUnread">0</strong></div>
        <div class="quick-pill"><span>Okundu</span><strong id="quickRead">0</strong></div>
      </div>
      <div class="quick-actions">
        <button class="btn" id="composeBtn">Yeni Mesaj</button>
        <button class="btn" id="filterUnreadBtn">Okunmadı</button>
        <button class="btn" id="filterReadBtn">Okundu</button>
        <button class="btn btn-primary" id="markAllReadBtn">Tümünü Oku</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <div class="tabs" id="tabs"></div>
          <div class="search-row">
            <input id="searchInput" type="text" placeholder="Mesaj ara (konu, içerik, kişi)">
            <select id="statusFilter">
              <option value="all">Tümü</option>
              <option value="unread">Okunmadı</option>
              <option value="read">Okundu</option>
            </select>
          </div>
        </div>
        <div class="list" id="messageList"></div>
      </section>

      <section class="panel detail" id="detailPanel">
        <div class="detail-empty">Soldan bir mesaj seç.</div>
      </section>
    </div>
  </div>

  <div class="compose-modal" id="composeModal" onclick="if(event.target.id==='composeModal') closeComposeModal()">
    <div class="compose-card" onclick="event.stopPropagation()">
      <div class="compose-head">
        <h3 class="compose-title">Yeni Mesaj</h3>
        <button class="btn" type="button" id="composeCloseBtn">Kapat</button>
      </div>
      <form id="composeForm">
        <div class="compose-body">
          <div class="compose-grid">
            <input id="composeRecipientName" type="text" placeholder="Alici oyuncu adi" required>
            <input id="composeRecipientId" name="to_user_id" type="hidden">
            <input id="composeSubject" name="subject" type="text" maxlength="150" placeholder="Konu" required>
          </div>
          <textarea id="composeBody" name="message" placeholder="Mesajini yaz..." required></textarea>
          <div class="compose-note" id="composeNotice">Alici adini yaz. Sistem uygun hesabi otomatik bulur.</div>
        </div>
        <div class="compose-actions">
          <button class="btn" type="button" id="composeCancelBtn">Vazgec</button>
          <button class="btn btn-primary" type="submit">Mesaj Gonder</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const USER_RAW = localStorage.getItem('nextscout_user');
    const USER = USER_RAW ? JSON.parse(USER_RAW) : { name: 'Oyuncu', email: 'oyuncu@nextscout.com' };
    const USER_ROLE = String((localStorage.getItem('nextscout_user_role') || USER?.role || '')).trim().toLowerCase();
    const API_BASE = (function() {
      const p = new URLSearchParams(window.location.search);
      const fromQuery = (p.get('api_base') || '').trim();
      if (fromQuery) return fromQuery.replace(/\/$/, '');
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000/api';
      return '/api';
    })();

    function authToken() {
      return (localStorage.getItem('nextscout_token') || '').trim();
    }

    function parseDate(value) {
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? new Date() : d;
    }

    function formatDate(value) {
      return parseDate(value).toLocaleString('tr-TR', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    async function fetchJson(url, options = {}) {
      const token = authToken();
      const headers = {
        Accept: 'application/json',
        ...(options.headers || {}),
      };
      if (token && token !== 'local-session-token') {
        headers.Authorization = `Bearer ${token}`;
      }
      const response = await fetch(url, { ...options, headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload?.message || `HTTP ${response.status}`);
      return payload;
    }

    function normalizeContact(item, box) {
      const status = (item?.status || '').toLowerCase();
      const read = status === 'read' || status === 'resolved' || Boolean(item?.read_at) || Boolean(item?.read);
      const fromName = item?.from_name || item?.sender_name || item?.name || item?.author_name || (box === 'sent' ? USER.name : 'Kullanıcı');
      const toName = item?.to_name || item?.receiver_name || (box === 'sent' ? (item?.name || 'Alıcı') : USER.name);
      return {
        id: `contact-${box}-${item?.id || Date.now()}`,
        rawId: Number(item?.id || 0),
        apiType: 'contact',
        box,
        read,
        fromUserId: Number(item?.from_user_id || item?.sender_user_id || item?.user_id || 0) || null,
        toUserId: Number(item?.to_user_id || item?.receiver_user_id || 0) || null,
        from: String(fromName || '-'),
        to: String(toName || '-'),
        subject: String(item?.subject || 'Mesaj'),
        body: String(item?.body || item?.message || ''),
        time: item?.created_at || item?.time || new Date().toISOString(),
      };
    }

    function getNotificationTitle(item) {
      const type = String(item?.type || '').trim().toLowerCase();
      const payload = item?.payload && typeof item.payload === 'object' ? item.payload : {};
      const playerName = String(payload?.player_name || '').trim();

      if (type === 'scout_tip_shortlisted') {
        return playerName
          ? `${playerName} shortlist'e eklendi`
          : 'Scout ihbari shortlist'e eklendi';
      }

      if (type === 'scout_tip_created') {
        return playerName
          ? `${playerName} icin yeni scout ihbari`
          : 'Yeni scout ihbari';
      }

      if (type === 'scout_tip_role_requested') {
        return playerName
          ? `${playerName} icin rol talebi geldi`
          : 'Scout ihbari icin rol talebi geldi';
      }

      if (type === 'scout_tip_dual_role_match') {
        return playerName
          ? `${playerName} menajer listesine dustu`
          : 'Scout ihbari menajer listesine dustu';
      }

      return String(item?.title || item?.type || 'Bildirim');
    }

    function getNotificationBody(item) {
      const type = String(item?.type || '').trim().toLowerCase();
      const payload = item?.payload && typeof item.payload === 'object' ? item.payload : {};
      const playerName = String(payload?.player_name || 'Bu oyuncu').trim();
      const position = String(payload?.position || '').trim();
      const city = String(payload?.city || '').trim();
      const role = String(payload?.requested_role || '').trim();
      const requestedBy = String(payload?.requested_by?.name || '').trim();
      const meta = [position, city].filter(Boolean).join(' · ');

      if (type === 'scout_tip_shortlisted') {
        return meta
          ? `${playerName} icin shortlist kaydi olustu. ${meta}`
          : `${playerName} icin shortlist kaydi olustu.`;
      }

      if (type === 'scout_tip_created') {
        return meta
          ? `${playerName} icin yeni scout ihbari olusturuldu. ${meta}`
          : `${playerName} icin yeni scout ihbari olusturuldu.`;
      }

      if (type === 'scout_tip_role_requested') {
        const roleText = role ? `${role} talebi` : 'rol talebi';
        const byText = requestedBy ? ` ${requestedBy} tarafindan gonderildi.` : ' gonderildi.';
        return `${playerName} icin ${roleText}${byText}`;
      }

      if (type === 'scout_tip_dual_role_match') {
        return meta
          ? `${playerName} hem kulup hem antrenor tarafindan istendi. ${meta}`
          : `${playerName} hem kulup hem antrenor tarafindan istendi.`;
      }

      return String(item?.body || item?.message || '');
    }

    function normalizeNotification(item) {
      return {
        id: `notification-${item?.id || Date.now()}`,
        rawId: Number(item?.id || 0),
        apiType: 'notification',
        box: 'inbox',
        read: Boolean(item?.is_read) || Boolean(item?.read_at) || Boolean(item?.read),
        from: 'Sistem',
        to: USER.name,
        subject: getNotificationTitle(item),
        body: getNotificationBody(item),
        time: item?.created_at || item?.time || new Date().toISOString(),
      };
    }

    function toRows(payload) {
      if (Array.isArray(payload?.data?.data)) return payload.data.data;
      if (Array.isArray(payload?.data)) return payload.data;
      if (Array.isArray(payload)) return payload;
      return [];
    }

    async function safeFetchRows(url) {
      try {
        const payload = await fetchJson(url);
        return toRows(payload);
      } catch (error) {
        return [];
      }
    }

    async function loadMessagesFromApi() {
      const token = authToken();
      if (!token || token === 'local-session-token') {
        throw new Error('Mesajlar için giriş gerekli.');
      }

      const [inboxRowsRaw, sentRowsRaw, notifRowsRaw] = await Promise.all([
        safeFetchRows(`${API_BASE}/contacts/inbox?per_page=100`),
        safeFetchRows(`${API_BASE}/contacts/sent?per_page=100`),
        safeFetchRows(`${API_BASE}/notifications?limit=100`),
      ]);

      const inboxRows = inboxRowsRaw.map((x) => normalizeContact(x, 'inbox'));
      const sentRows = sentRowsRaw.map((x) => normalizeContact(x, 'sent'));
      const notifRows = notifRowsRaw.map(normalizeNotification);
      return [...inboxRows, ...sentRows, ...notifRows].sort((a, b) => parseDate(b.time) - parseDate(a.time));
    }

    async function updateReadState(msg, makeRead) {
      if (!msg?.rawId) return;
      if (msg.apiType === 'notification') {
        if (!makeRead) return;
        await fetchJson(`${API_BASE}/notifications/${encodeURIComponent(msg.rawId)}/read`, { method: 'PATCH' });
        return;
      }
      const status = makeRead ? 'read' : 'unread';
      await fetchJson(`${API_BASE}/contacts/${encodeURIComponent(msg.rawId)}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
    }

    async function deleteMessageApi(msg) {
      if (!msg?.rawId) return;
      if (msg.apiType === 'notification') {
        await fetchJson(`${API_BASE}/notifications/${encodeURIComponent(msg.rawId)}`, { method: 'DELETE' });
        return;
      }
      await fetchJson(`${API_BASE}/contacts/${encodeURIComponent(msg.rawId)}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'archived' }),
      });
    }

    let state = {
      tab: 'all',
      status: 'all',
      query: '',
      selectedId: null,
      messages: []
    };

    const tabsEl = document.getElementById('tabs');
    const listEl = document.getElementById('messageList');
    const detailEl = document.getElementById('detailPanel');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const quickTotal = document.getElementById('quickTotal');
    const quickUnread = document.getElementById('quickUnread');
    const quickRead = document.getElementById('quickRead');
    const composeModal = document.getElementById('composeModal');
    const composeForm = document.getElementById('composeForm');
    const composeNotice = document.getElementById('composeNotice');
    const composeRecipientName = document.getElementById('composeRecipientName');
    const composeRecipientId = document.getElementById('composeRecipientId');
    const composeSubject = document.getElementById('composeSubject');
    const composeBody = document.getElementById('composeBody');
    const composePrefillParams = new URLSearchParams(window.location.search);
    const composeReturnUrl = String(composePrefillParams.get('return_to') || '').trim();
    let composeCloseBtn = document.getElementById('composeCloseBtn');
    let composeCancelBtn = document.getElementById('composeCancelBtn');

    async function resolveRecipientByName(name) {
      const query = String(name || '').trim();
      if (!query) return null;

      try {
        const rows = await safeFetchRows(`${API_BASE}/contacts/recipients/search?q=${encodeURIComponent(query)}&limit=10`);
        const exact = rows.find((row) => String(row?.name || '').trim().toLowerCase() === query.toLowerCase());
        const pick = exact || rows[0] || null;
        if (!pick?.id) return null;
        return {
          id: Number(pick.id),
          name: String(pick?.name || query),
          role: String(pick?.role || ''),
        };
      } catch (error) {
        return null;
      }
    }

    function openComposeModal(prefill = {}) {
      if (composeRecipientName) composeRecipientName.value = prefill.to_name || '';
      if (composeRecipientId) composeRecipientId.value = prefill.to_user_id || '';
      if (composeSubject) composeSubject.value = prefill.subject || '';
      if (composeBody) composeBody.value = prefill.message || '';
      if (composeNotice) composeNotice.textContent = prefill.notice || 'Alici adini yaz. Sistem uygun hesabi otomatik bulur.';
      composeModal?.classList.add('show');
    }

    function returnToComposeOrigin() {
      if (composePrefillParams.get('compose') !== '1' || !composeReturnUrl) return false;
      const absoluteReturnUrl = new URL(composeReturnUrl, window.location.href).href;
      window.location.replace(absoluteReturnUrl);
      return true;
    }

    function closeComposeModal(skipRedirect = false) {
      composeModal?.classList.remove('show');
      if (!skipRedirect) {
        returnToComposeOrigin();
      }
    }

    function bootstrapComposeFromQuery() {
      if (composePrefillParams.get('compose') !== '1') return;
      const absoluteReturnUrl = composeReturnUrl ? new URL(composeReturnUrl, window.location.href).href : '';
      if (composeModal && composeReturnUrl) {
        composeModal.onclick = function (event) {
          if (event.target && event.target.id === 'composeModal') {
            returnToComposeOrigin();
          }
        };
      }
      if (composeCloseBtn && absoluteReturnUrl) {
        const closeLink = document.createElement('a');
        closeLink.id = 'composeCloseBtn';
        closeLink.className = composeCloseBtn.className;
        closeLink.href = absoluteReturnUrl;
        closeLink.textContent = composeCloseBtn.textContent || 'Kapat';
        composeCloseBtn.replaceWith(closeLink);
        composeCloseBtn = closeLink;
      }
      if (composeCancelBtn && absoluteReturnUrl) {
        const cancelLink = document.createElement('a');
        cancelLink.id = 'composeCancelBtn';
        cancelLink.className = composeCancelBtn.className;
        cancelLink.href = absoluteReturnUrl;
        cancelLink.textContent = composeCancelBtn.textContent || 'Vazgec';
        composeCancelBtn.replaceWith(cancelLink);
        composeCancelBtn = cancelLink;
      }
      if (absoluteReturnUrl) {
        window.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            window.location.href = absoluteReturnUrl;
          }
        });
      }
      openComposeModal({
        to_name: String(composePrefillParams.get('to_name') || '').trim(),
        to_user_id: String(composePrefillParams.get('to_user_id') || '').trim(),
        subject: String(composePrefillParams.get('subject') || '').trim(),
        message: String(composePrefillParams.get('message') || '').trim(),
        notice: String(composePrefillParams.get('notice') || 'Alici ve metin otomatik dolduruldu.').trim(),
      });
    }

    async function sendComposeMessage(event) {
      event.preventDefault();
      const recipientName = String(composeRecipientName?.value || '').trim();
      let toUserId = Number(composeRecipientId?.value || 0);
      const subject = String(composeSubject?.value || '').trim();
      const message = String(composeBody?.value || '').trim();

      if (!recipientName || !subject || !message) {
        if (composeNotice) composeNotice.textContent = 'Alici adi, konu ve mesaj zorunlu.';
        return;
      }

      let resolvedRecipientName = recipientName;
      if (!toUserId) {
        const resolved = await resolveRecipientByName(recipientName);
        if (!resolved?.id) {
          if (composeNotice) composeNotice.textContent = 'Alici bulunamadi. Tam adini veya e-postasini yazmayi dene.';
          return;
        }
        toUserId = resolved.id;
        resolvedRecipientName = resolved.name;
        if (composeRecipientId) composeRecipientId.value = String(resolved.id);
        if (composeRecipientName) composeRecipientName.value = resolved.name;
      }

      try {
        const payload = await fetchJson(`${API_BASE}/contacts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to_user_id: toUserId,
            subject,
            message,
          }),
        });

        const created = payload?.data || payload || {};
        state.messages.unshift({
          id: `contact-sent-${created?.id || Date.now()}`,
          rawId: Number(created?.id || 0),
          apiType: 'contact',
          box: 'sent',
          read: true,
          fromUserId: USER?.id ? Number(USER.id) : null,
          toUserId,
          from: String(USER?.name || 'Sen'),
          to: String(created?.to_name || created?.receiver_name || resolvedRecipientName || `User #${toUserId}`),
          subject,
          body: message,
          time: created?.created_at || new Date().toISOString(),
        });
        state.tab = 'sent';
        state.selectedId = state.messages[0].id;
        closeComposeModal(true);
        composeForm?.reset();
        render();
        if (returnToComposeOrigin()) {
          return;
        }
      } catch (error) {
        if (composeNotice) composeNotice.textContent = `Mesaj gonderilemedi: ${String(error.message || 'Bilinmeyen hata')}`;
      }
    }

    (function syncDashboardButton() {
      const btn = document.getElementById('dashboardBtn');
      if (!btn) return;
      if (USER_ROLE === 'manager') {
        btn.href = 'manager-dashboard.html';
        return;
      }
      if (USER_ROLE === 'team' || USER_ROLE === 'club') {
        btn.href = 'team-dashboard.html';
        return;
      }
      if (USER_ROLE === 'coach') {
        btn.href = 'coach-dashboard.html';
        return;
      }
      if (USER_ROLE === 'scout') {
        btn.href = 'scout-dashboard.html';
        return;
      }
      btn.href = 'player-dashboard.html';
    })();

    function getTabCounts(messages) {
      const unread = messages.filter(m => !m.read).length;
      const inbox = messages.filter(m => m.box === 'inbox').length;
      const sent = messages.filter(m => m.box === 'sent').length;
      return {
        all: messages.length,
        inbox,
        sent,
        unread
      };
    }

    function filteredMessages() {
      const q = state.query.trim().toLowerCase();
      return state.messages
        .filter(m => {
          if (state.tab === 'inbox' && m.box !== 'inbox') return false;
          if (state.tab === 'sent' && m.box !== 'sent') return false;
          if (state.tab === 'unread' && m.read) return false;
          if (state.status === 'read' && !m.read) return false;
          if (state.status === 'unread' && m.read) return false;
          if (!q) return true;
          return [m.from, m.to, m.subject, m.body].some(v => (v || '').toLowerCase().includes(q));
        })
        .sort((a, b) => parseDate(b.time) - parseDate(a.time));
    }

    function renderTabs() {
      const counts = getTabCounts(state.messages);
      const tabs = [
        { id: 'all', label: 'Tümü', count: counts.all },
        { id: 'inbox', label: 'Gelen', count: counts.inbox },
        { id: 'sent', label: 'Giden', count: counts.sent },
        { id: 'unread', label: 'Okunmadı', count: counts.unread }
      ];

      tabsEl.innerHTML = tabs.map(t => `
        <button class="tab ${state.tab === t.id ? 'active' : ''}" data-tab="${t.id}">
          ${t.label} (${t.count})
        </button>
      `).join('');

      tabsEl.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.dataset.tab;
          state.selectedId = null;
          render();
        });
      });
    }

    function renderQuickStats() {
      const total = state.messages.length;
      const unread = state.messages.filter((m) => !m.read).length;
      const read = total - unread;
      if (quickTotal) quickTotal.textContent = String(total);
      if (quickUnread) quickUnread.textContent = String(unread);
      if (quickRead) quickRead.textContent = String(read);
    }

    function renderList() {
      const rows = filteredMessages();
      if (!rows.length) {
        listEl.innerHTML = '<div class="empty-list">Bu filtrede mesaj bulunamadı.</div>';
        return;
      }

      if (!state.selectedId) state.selectedId = rows[0].id;

      listEl.innerHTML = rows.map(m => `
        <div class="msg-item ${m.read ? '' : 'unread'} ${state.selectedId === m.id ? 'active' : ''}" data-id="${m.id}">
          <div class="msg-top">
            <div class="msg-name">${m.box === 'inbox' ? m.from : m.to}</div>
            <div class="msg-time">${formatDate(m.time)}</div>
          </div>
          <div class="msg-subject">${m.subject}</div>
          <div class="msg-preview">${m.body.replace(/\n/g, ' ')}</div>
        </div>
      `).join('');

      listEl.querySelectorAll('[data-id]').forEach(row => {
        row.addEventListener('click', async () => {
          state.selectedId = row.dataset.id;
          const msg = state.messages.find(x => x.id === state.selectedId);
          if (msg && msg.box === 'inbox' && !msg.read) {
            try { await updateReadState(msg, true); } catch (error) {}
            msg.read = true;
          }
          render();
        });
      });
    }

    function renderDetail() {
      const msg = state.messages.find(x => x.id === state.selectedId);
      if (!msg) {
        detailEl.innerHTML = '<div class="detail-empty">Soldan bir mesaj seç.</div>';
        return;
      }

      detailEl.innerHTML = `
        <div class="detail-head">
          <h2 class="detail-title">${msg.subject}</h2>
          <div class="meta">
            <span class="badge ${msg.box === 'inbox' ? 'inbox' : 'sent'}">${msg.box === 'inbox' ? 'GELEN' : 'GİDEN'}</span>
            <span class="badge ${msg.read ? 'read' : 'unread'}">${msg.read ? 'OKUNDU' : 'OKUNMADI'}</span>
            <span><strong>Kimden:</strong> ${msg.from}</span>
            <span><strong>Kime:</strong> ${msg.to}</span>
            <span>${formatDate(msg.time)}</span>
          </div>
        </div>
        <div class="detail-body">${msg.body}</div>
        <div class="detail-actions">
          ${msg.apiType === 'contact' ? '<button class="btn" id="replyBtn">Yanitla</button>' : ''}
          <button class="btn ${msg.read ? '' : 'btn-primary'}" id="toggleReadBtn">${msg.read ? 'Okunmadı Yap' : 'Okundu Yap'}</button>
          <button class="btn btn-danger" id="deleteBtn">Mesajı Sil</button>
        </div>
      `;

      document.getElementById('replyBtn')?.addEventListener('click', () => {
        const replyTargetId = msg.box === 'inbox' ? msg.fromUserId : msg.toUserId;
        openComposeModal({
          to_name: msg.box === 'inbox' ? msg.from : msg.to,
          to_user_id: replyTargetId || '',
          subject: msg.subject ? `Re: ${msg.subject}` : 'Re: Mesaj',
          message: '',
          notice: replyTargetId ? `Yanit ${msg.box === 'inbox' ? msg.from : msg.to} kisina gidecek.` : 'Bu mesaji yanitlamak icin alici adini yazman gerekebilir.',
        });
      });

      document.getElementById('toggleReadBtn')?.addEventListener('click', async () => {
        const nextRead = !msg.read;
        try { await updateReadState(msg, nextRead); } catch (error) {}
        msg.read = nextRead;
        render();
      });

      document.getElementById('deleteBtn')?.addEventListener('click', async () => {
        try { await deleteMessageApi(msg); } catch (error) {}
        state.messages = state.messages.filter(x => x.id !== msg.id);
        state.selectedId = null;
        render();
      });
    }

    function render() {
      renderQuickStats();
      renderTabs();
      renderList();
      renderDetail();
    }

    searchInput.addEventListener('input', () => {
      state.query = searchInput.value;
      state.selectedId = null;
      render();
    });

    statusFilter.addEventListener('change', () => {
      state.status = statusFilter.value;
      state.selectedId = null;
      render();
    });

    document.getElementById('filterUnreadBtn')?.addEventListener('click', () => {
      state.status = 'unread';
      statusFilter.value = 'unread';
      state.selectedId = null;
      render();
    });

    document.getElementById('filterReadBtn')?.addEventListener('click', () => {
      state.status = 'read';
      statusFilter.value = 'read';
      state.selectedId = null;
      render();
    });

    document.getElementById('markAllReadBtn')?.addEventListener('click', async () => {
      const unreadRows = state.messages.filter((msg) => !msg.read);
      for (const msg of unreadRows) {
        try { await updateReadState(msg, true); } catch (error) {}
        msg.read = true;
      }
      state.status = 'all';
      statusFilter.value = 'all';
      render();
    });

    document.getElementById('composeBtn')?.addEventListener('click', () => openComposeModal());
    if (composePrefillParams.get('compose') !== '1') {
      composeCloseBtn?.addEventListener('click', () => closeComposeModal());
      composeCancelBtn?.addEventListener('click', () => closeComposeModal());
    }
    composeForm?.addEventListener('submit', sendComposeMessage);
    bootstrapComposeFromQuery();

    async function init() {
      try {
        state.messages = await loadMessagesFromApi();
        if (!Array.isArray(state.messages) || !state.messages.length) {
          listEl.innerHTML = '<div class="empty-list">Mesaj bulunamadı.</div>';
          detailEl.innerHTML = '<div class="detail-empty">Hesabında henüz mesaj/bildirim yok.</div>';
          return;
        }
        render();
      } catch (error) {
        listEl.innerHTML = `<div class="empty-list">API mesajları yüklenemedi: ${String(error.message || 'Bilinmeyen hata')}</div>`;
        detailEl.innerHTML = '<div class="detail-empty">Mesajları görüntülemek için giriş yap.</div>';
      }
    }

    init();
  </script>
    <script src="assets/js/core-stability.js"></script>
    <script src="assets/js/mobile-professional.js" defer></script>
</body>
