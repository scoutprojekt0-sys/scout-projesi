<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesajlarım - NextScout</title>
  <meta name="description" content="Mesaj ve bildirim merkezi: teklifler, duyurular ve sistem bildirimlerini tek ekranda gorun.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://nextscout.app/notifications.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:site_name" content="NextScout">
  <meta property="og:title" content="Mesajlar ve Bildirimler | NextScout">
  <meta property="og:description" content="Mesaj ve bildirim merkezi: teklifler, duyurular ve sistem bildirimlerini tek ekranda gorun.">
  <meta property="og:url" content="https://nextscout.app/notifications.html">
    <meta property="og:image" content="https://nextscout.app/assets/img/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://nextscout.app/assets/img/og-default.jpg">
  <meta name="theme-color" content="#2563eb">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #dbeafe;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
    }

    .title-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--primary);
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 14px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: #1e3a8a;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 8px;
      width: 100%;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .list {
      max-height: 70vh;
      overflow: auto;
    }

    .msg-item {
      border-bottom: 1px solid #eef2ff;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.2s ease;
      position: relative;
    }

    .msg-item:hover { background: #f8fbff; }
    .msg-item.active { background: #eff6ff; }
    .msg-item.unread::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      position: absolute;
      top: 16px;
      right: 14px;
    }

    .msg-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .msg-name {
      font-size: 13px;
      font-weight: 700;
    }

    .msg-time {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .msg-subject {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .msg-preview {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      border-radius: 999px;
      padding: 3px 8px;
      font-weight: 700;
      border: 1px solid;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge.read { color: var(--success); background: #ecfdf5; border-color: #a7f3d0; }
    .badge.unread { color: var(--warning); background: #fffbeb; border-color: #fde68a; }
    .badge.inbox { color: #1e40af; background: #eff6ff; border-color: #bfdbfe; }
    .badge.sent { color: #7c3aed; background: #f5f3ff; border-color: #ddd6fe; }

    .detail {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      padding: 28px;
    }

    .detail-head {
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
    }

    .detail-title {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-body {
      padding: 16px;
      color: #1f2937;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-line;
      flex: 1;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-danger {
      background: #fff;
      color: var(--danger);
      border-color: #fecaca;
    }

    .empty-list {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .detail { min-height: 45vh; }
      .list { max-height: 45vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Mesajlarım</h1>
        <div class="title-sub">Gelen, giden, okundu ve okunmadı mesajları buradan yönetebilirsin.</div>
      </div>
      <a class="btn" href="DASHBOARD_DESIGN.html">← Dashboard</a>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <div class="tabs" id="tabs"></div>
          <div class="search-row">
            <input id="searchInput" type="text" placeholder="Mesaj ara (konu, içerik, kişi)">
            <select id="statusFilter">
              <option value="all">Tümü</option>
              <option value="unread">Okunmadı</option>
              <option value="read">Okundu</option>
            </select>
          </div>
        </div>
        <div class="list" id="messageList"></div>
      </section>

      <section class="panel detail" id="detailPanel">
        <div class="detail-empty">Soldan bir mesaj seç.</div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'nextscout_messages';
    const LOCAL_NOTIF_KEY = 'nextscout_local_notifications';
    const USER_RAW = localStorage.getItem('nextscout_user');
    const USER = USER_RAW ? JSON.parse(USER_RAW) : { name: 'Oyuncu', email: 'oyuncu@nextscout.com' };

    const seedMessages = [
      {
        id: 'm1',
        box: 'inbox',
        read: false,
        from: 'Galatasaray Scout Ekibi',
        to: USER.name,
        subject: 'Canlı maç performansın hakkında',
        body: 'Merhaba ' + USER.name + ',\n\nSon 3 maç performansını inceledik. Özellikle geçiş oyunundaki hızın dikkat çekti. Önümüzdeki hafta bir online görüşme planlamak istiyoruz.\n\nUygun olduğun saatleri iletir misin?',
        time: '2026-03-04T17:15:00'
      },
      {
        id: 'm2',
        box: 'sent',
        read: true,
        from: USER.name,
        to: 'Fenerbahçe U23 Analiz',
        subject: 'Video portföy paylaşımı',
        body: 'Merhaba,\n\nProfilimdeki yeni sezon videolarını güncelledim. Uygun olduğunuzda değerlendirmenizi rica ederim.\n\nİyi çalışmalar.',
        time: '2026-03-04T14:40:00'
      },
      {
        id: 'm3',
        box: 'inbox',
        read: true,
        from: 'Trabzonspor Gözlemci Birimi',
        to: USER.name,
        subject: 'Profil değerlendirme sonucu',
        body: 'Merhaba,\n\nFiziksel ve teknik parametrelerin olumlu. Takip listemize eklendin.\n\nGüncel maç takvimini paylaşabilirsen seviniriz.',
        time: '2026-03-03T10:05:00'
      },
      {
        id: 'm4',
        box: 'inbox',
        read: false,
        from: 'Menajer Ağı Destek',
        to: USER.name,
        subject: 'Yeni bağlantı isteği',
        body: 'Bir menajer seni izleme listesine ekledi. Profilini güncel tutman önerilir.',
        time: '2026-03-02T19:22:00'
      }
    ];

    function parseDate(value) {
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? new Date() : d;
    }

    function formatDate(value) {
      return parseDate(value).toLocaleString('tr-TR', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function loadMessages() {
      try {
        const localNotifs = (() => {
          try {
            const rows = JSON.parse(localStorage.getItem(LOCAL_NOTIF_KEY) || '[]');
            if (!Array.isArray(rows)) return [];
            return rows.map((n) => ({
              id: `trial-${n.id}`,
              box: 'inbox',
              from: 'Sistem',
              to: USER.name,
              subject: n.title || 'Bildirim',
              body: n.message || '',
              read: !!n.read,
              createdAt: n.created_at || new Date().toISOString(),
            }));
          } catch (error) {
            return [];
          }
        })();

        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const all = [...localNotifs, ...seedMessages];
          localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
          return all;
        }
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [...localNotifs, ...seedMessages];
        const existingIds = new Set(parsed.map((x) => String(x.id)));
        const merged = [...parsed];
        localNotifs.forEach((n) => {
          if (!existingIds.has(String(n.id))) merged.unshift(n);
        });
        return merged;
      } catch {
        return [...seedMessages];
      }
    }

    function saveMessages(messages) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    let state = {
      tab: 'all',
      status: 'all',
      query: '',
      selectedId: null,
      messages: loadMessages()
    };

    const tabsEl = document.getElementById('tabs');
    const listEl = document.getElementById('messageList');
    const detailEl = document.getElementById('detailPanel');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');

    function getTabCounts(messages) {
      const unread = messages.filter(m => !m.read).length;
      const inbox = messages.filter(m => m.box === 'inbox').length;
      const sent = messages.filter(m => m.box === 'sent').length;
      return {
        all: messages.length,
        inbox,
        sent,
        unread
      };
    }

    function filteredMessages() {
      const q = state.query.trim().toLowerCase();
      return state.messages
        .filter(m => {
          if (state.tab === 'inbox' && m.box !== 'inbox') return false;
          if (state.tab === 'sent' && m.box !== 'sent') return false;
          if (state.tab === 'unread' && m.read) return false;
          if (state.status === 'read' && !m.read) return false;
          if (state.status === 'unread' && m.read) return false;
          if (!q) return true;
          return [m.from, m.to, m.subject, m.body].some(v => (v || '').toLowerCase().includes(q));
        })
        .sort((a, b) => parseDate(b.time) - parseDate(a.time));
    }

    function renderTabs() {
      const counts = getTabCounts(state.messages);
      const tabs = [
        { id: 'all', label: 'Tümü', count: counts.all },
        { id: 'inbox', label: 'Gelen', count: counts.inbox },
        { id: 'sent', label: 'Giden', count: counts.sent },
        { id: 'unread', label: 'Okunmadı', count: counts.unread }
      ];

      tabsEl.innerHTML = tabs.map(t => `
        <button class="tab ${state.tab === t.id ? 'active' : ''}" data-tab="${t.id}">
          ${t.label} (${t.count})
        </button>
      `).join('');

      tabsEl.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.dataset.tab;
          state.selectedId = null;
          render();
        });
      });
    }

    function renderList() {
      const rows = filteredMessages();
      if (!rows.length) {
        listEl.innerHTML = '<div class="empty-list">Bu filtrede mesaj bulunamadı.</div>';
        return;
      }

      if (!state.selectedId) state.selectedId = rows[0].id;

      listEl.innerHTML = rows.map(m => `
        <div class="msg-item ${m.read ? '' : 'unread'} ${state.selectedId === m.id ? 'active' : ''}" data-id="${m.id}">
          <div class="msg-top">
            <div class="msg-name">${m.box === 'inbox' ? m.from : m.to}</div>
            <div class="msg-time">${formatDate(m.time)}</div>
          </div>
          <div class="msg-subject">${m.subject}</div>
          <div class="msg-preview">${m.body.replace(/\n/g, ' ')}</div>
        </div>
      `).join('');

      listEl.querySelectorAll('[data-id]').forEach(row => {
        row.addEventListener('click', () => {
          state.selectedId = row.dataset.id;
          const msg = state.messages.find(x => x.id === state.selectedId);
          if (msg && msg.box === 'inbox' && !msg.read) {
            msg.read = true;
            saveMessages(state.messages);
          }
          render();
        });
      });
    }

    function renderDetail() {
      const msg = state.messages.find(x => x.id === state.selectedId);
      if (!msg) {
        detailEl.innerHTML = '<div class="detail-empty">Soldan bir mesaj seç.</div>';
        return;
      }

      detailEl.innerHTML = `
        <div class="detail-head">
          <h2 class="detail-title">${msg.subject}</h2>
          <div class="meta">
            <span class="badge ${msg.box === 'inbox' ? 'inbox' : 'sent'}">${msg.box === 'inbox' ? 'GELEN' : 'GİDEN'}</span>
            <span class="badge ${msg.read ? 'read' : 'unread'}">${msg.read ? 'OKUNDU' : 'OKUNMADI'}</span>
            <span><strong>Kimden:</strong> ${msg.from}</span>
            <span><strong>Kime:</strong> ${msg.to}</span>
            <span>${formatDate(msg.time)}</span>
          </div>
        </div>
        <div class="detail-body">${msg.body}</div>
        <div class="detail-actions">
          <button class="btn ${msg.read ? '' : 'btn-primary'}" id="toggleReadBtn">${msg.read ? 'Okunmadı Yap' : 'Okundu Yap'}</button>
          <button class="btn btn-danger" id="deleteBtn">Mesajı Sil</button>
        </div>
      `;

      document.getElementById('toggleReadBtn')?.addEventListener('click', () => {
        msg.read = !msg.read;
        saveMessages(state.messages);
        render();
      });

      document.getElementById('deleteBtn')?.addEventListener('click', () => {
        state.messages = state.messages.filter(x => x.id !== msg.id);
        saveMessages(state.messages);
        state.selectedId = null;
        render();
      });
    }

    function render() {
      renderTabs();
      renderList();
      renderDetail();
    }

    searchInput.addEventListener('input', () => {
      state.query = searchInput.value;
      state.selectedId = null;
      render();
    });

    statusFilter.addEventListener('change', () => {
      state.status = statusFilter.value;
      state.selectedId = null;
      render();
    });

    render();
  </script>
    <script src="assets/js/core-stability.js"></script>
</body>
</html>
